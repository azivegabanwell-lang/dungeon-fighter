  ctx.beginPath(); ctx.moveTo(x-11,y-46); ctx.quadraticCurveTo(x-26,y-66, x-17,y-70); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+11,y-46); ctx.quadraticCurveTo(x+26,y-66, x+17,y-70); ctx.stroke();

  ctx.fillRect(x-6, y-24, 4, 6); ctx.fillRect(x+2, y-24, 4, 6);

  if (charging) {
    for (let f = 0; f < 5; f++) {
      const fx = x + (facing > 0 ? 1 : -1) * (10 + f * 8);

      ctx.globalAlpha = 0.8 - f*0.14;

      ctx.beginPath(); ctx.ellipse(fx, fy, 6-f, 8-f, 0, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  // Gun
  drawBossGun(x, y, facing, '#FF4400');
}

function drawHUD() {
  if (currentMode === 'teamwork') { drawTeamHUD(); return; }

  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, 84);
  ctx.strokeStyle = '#3d1a00'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, 83); ctx.lineTo(W, 83); ctx.stroke();

  // Level / Chapter
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 20px monospace'; ctx.textAlign = 'left';
  ctx.fillText(`LVL ${level}`, 12, 28);
  if (currentMode === 'story') {
    ctx.fillStyle = '#88ccff'; ctx.font = '11px monospace';
    ctx.fillText(`CH.${storyChapter}: ${STORY_CHAPTERS[storyChapter-1].name}`, 12, 82);
  }

  // Weapon
  const wd = getWeaponData(player.weaponTier);
  ctx.fillStyle = wd.glow || '#C0C0C0'; ctx.font = '13px monospace';
  const abilityTag = wd.ability ? `  [${wd.ability}]` : '';
  ctx.fillText(`${player.weapon}  ${player.damage} dmg${abilityTag}`, 12, 50);

  // Monsters
  ctx.fillStyle = '#ff6666';
  ctx.fillText(`Monsters: ${monsters.length}`, 12, 70);

  // Coins
  ctx.fillStyle = '#FFD700';
  ctx.fillText(`🪙 ${coins}`, 160, 70);

  // Time
  ctx.fillStyle = '#888';
  ctx.fillText(`⏱ ${formatTime(playTime)}`, 260, 70);

  // HP label
  ctx.fillStyle = '#ccc'; ctx.font = '13px monospace'; ctx.textAlign = 'right';
  ctx.fillText(`HP: ${Math.max(0,player.hp)} / ${player.maxHp}`, W - 12, 28);
  ctx.textAlign = 'left';

  // HP bar
  const bw = 215, bx = W - bw - 12;
  ctx.fillStyle = '#300000'; ctx.fillRect(bx, 33, bw, 13);
  const pct = Math.max(0, player.hp) / player.maxHp;
  ctx.fillStyle = pct > 0.6 ? '#00cc44' : pct > 0.3 ? '#ffaa00' : '#ff2200';
  ctx.fillRect(bx, 33, bw * pct, 13);
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.strokeRect(bx, 33, bw, 13);

  // Stats
  ctx.fillStyle = '#777'; ctx.font = '11px monospace';
  ctx.fillText(`SPD: ${player.speed.toFixed(1)}   ATK SPEED: ${player.attackSpeed.toFixed(2)}/s`, bx, 60);

  // Controls hint
  ctx.fillStyle = '#444'; ctx.font = '10px monospace';
  ctx.fillText('WASD / Arrows: Move   |   Space: Attack', bx, 76);

  // Boss HP bar at bottom of HUD
  const boss = monsters.find(m => m.isBoss);
  if (boss) {
    const bbw = 400, bbx = W/2 - bbw/2, bby = 84;
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(bbx - 10, bby - 2, bbw + 20, 22);
    ctx.fillStyle = '#300000'; ctx.fillRect(bbx, bby, bbw, 14);
    const bpct = boss.hp / boss.maxHp;
    const bcolor = bpct > 0.6 ? '#cc0000' : bpct > 0.3 ? '#ff6600' : '#ff0000';
    ctx.fillStyle = bcolor; ctx.fillRect(bbx, bby, bbw * bpct, 14);
    // Pulse when low
    if (bpct < 0.3 && Math.floor(Date.now()/200)%2===0) { ctx.fillStyle='rgba(255,0,0,0.3)'; ctx.fillRect(bbx,bby,bbw,14); }
    ctx.strokeStyle = '#880000'; ctx.lineWidth = 1; ctx.strokeRect(bbx, bby, bbw, 14);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`⚔ ${boss.bossName}  ${boss.hp} / ${boss.maxHp} HP`, W/2, bby + 11);
    ctx.textAlign = 'left';
  }

  // Pause button (bottom center)
  const pbw = 140, pbh = 28, pbx = W/2 - pbw/2, pby = H - pbh - 8;
  const pbHovered = mouse.x >= pbx && mouse.x <= pbx+pbw && mouse.y >= pby && mouse.y <= pby+pbh;
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, H - pbh - 16, W, pbh + 16);
  ctx.fillStyle = pbHovered ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.07)';
  ctx.fillRect(pbx, pby, pbw, pbh);
  ctx.strokeStyle = pbHovered ? '#aaa' : '#555'; ctx.lineWidth = 1;
  ctx.strokeRect(pbx, pby, pbw, pbh);
  ctx.fillStyle = '#ccc'; ctx.font = '11px monospace'; ctx.textAlign = 'center';
  ctx.fillText('⏸ PAUSE', pbx + pbw/2, pby + 18);
  ctx.fillStyle = '#555'; ctx.font = '10px monospace';
  ctx.fillText('Shift = Pause', W/2, H - 2);
  ctx.textAlign = 'left';

  // Next milestone
  const toUpgrade = 5 - ((level - 1) % 5);
  ctx.fillStyle = '#666'; ctx.font = '11px monospace'; ctx.textAlign = 'center';
  ctx.fillText(`Upgrade in ${toUpgrade} lvl${toUpgrade!==1?'s':''}`, W/2, 76);
  ctx.textAlign = 'left';
}

function drawTeamHUD() {
  const hudH = 84;
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, hudH);
  ctx.strokeStyle = '#3d1a00'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, hudH - 1); ctx.lineTo(W, hudH - 1); ctx.stroke();

  // Level
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'left';
  ctx.fillText(`LVL ${level}`, 12, 18);

  // Monsters & Coins
  ctx.fillStyle = '#ff6666'; ctx.font = '11px monospace';
  ctx.fillText(`Monsters: ${monsters.length}`, 12, 34);
  ctx.fillStyle = '#FFD700';
  ctx.fillText(`Coins: ${coins}`, 130, 34);
  ctx.fillStyle = '#888';
  ctx.fillText(`⏱ ${formatTime(playTime)}`, 250, 34);

  // Per-player HP bars
  const barW = Math.floor((W - 24) / players.length) - 6;
  players.forEach((p, i) => {
    const bx = 12 + i * (barW + 6);
    const by = 42;
    const colors = PLAYER_COLORS[i];
    const alive = p.alive && p.hp > 0;

    // Name + weapon
    const isDowned = p.downed && !p.permaDead;
    ctx.fillStyle = alive ? colors.armor : (isDowned ? '#ff6600' : '#555');
    ctx.font = 'bold 10px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`${colors.name}: ${p.weapon} (${p.damage}dmg)`, bx, by + 2);

    // HP bar
    ctx.fillStyle = '#300000'; ctx.fillRect(bx, by + 6, barW, 10);
    if (alive) {
      const pct = Math.max(0, p.hp) / p.maxHp;
      ctx.fillStyle = pct > 0.6 ? '#00cc44' : pct > 0.3 ? '#ffaa00' : '#ff2200';
      ctx.fillRect(bx, by + 6, barW * pct, 10);
    }
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.strokeRect(bx, by + 6, barW, 10);

    // HP text / status
    if (alive) {
      ctx.fillStyle = '#ccc'; ctx.font = '9px monospace';
      ctx.fillText(`${p.hp}/${p.maxHp}`, bx + 2, by + 14);
    } else if (p.downed && !p.permaDead) {
      const blink = Math.floor(Date.now() / 400) % 2 === 0;
      ctx.fillStyle = blink ? '#ff6600' : '#aa4400'; ctx.font = 'bold 9px monospace';
      ctx.fillText(`DOWN ${Math.ceil(p.downTimer)}s`, bx + 2, by + 14);
      // Revive progress mini bar
      if (p.reviveProgress > 0) {
        const rpct = p.reviveProgress / REVIVE_TIME;
        ctx.fillStyle = '#44ff88';
        ctx.fillRect(bx, by + 17, barW * rpct, 3);
      }
    } else {
      ctx.fillStyle = '#660000'; ctx.font = 'bold 9px monospace';
      ctx.fillText('LOST', bx + 2, by + 14);
    }

    // Key hint
    ctx.fillStyle = '#444'; ctx.font = '8px monospace';
    ctx.fillText(colors.keyHint, bx, by + 26);
  });
  ctx.textAlign = 'left';

  // Boss HP bar at bottom of HUD
  const boss = monsters.find(m => m.isBoss);
  if (boss) {
    const bbw = 400, bbx = W/2 - bbw/2, bby = hudH;
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(bbx - 10, bby - 2, bbw + 20, 22);
    ctx.fillStyle = '#300000'; ctx.fillRect(bbx, bby, bbw, 14);
    const bpct = boss.hp / boss.maxHp;
    const bcolor = bpct > 0.6 ? '#cc0000' : bpct > 0.3 ? '#ff6600' : '#ff0000';
    ctx.fillStyle = bcolor; ctx.fillRect(bbx, bby, bbw * bpct, 14);
    if (bpct < 0.3 && Math.floor(Date.now()/200)%2===0) { ctx.fillStyle='rgba(255,0,0,0.3)'; ctx.fillRect(bbx,bby,bbw,14); }
    ctx.strokeStyle = '#880000'; ctx.lineWidth = 1; ctx.strokeRect(bbx, bby, bbw, 14);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`${boss.bossName}  ${boss.hp} / ${boss.maxHp} HP`, W/2, bby + 11);
    ctx.textAlign = 'left';
  }

  // Pause button
  const pbw = 140, pbh = 28, pbx = W/2 - pbw/2, pby = H - pbh - 8;
  const pbHovered = mouse.x >= pbx && mouse.x <= pbx+pbw && mouse.y >= pby && mouse.y <= pby+pbh;
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, H - pbh - 16, W, pbh + 16);
  ctx.fillStyle = pbHovered ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.07)';
  ctx.fillRect(pbx, pby, pbw, pbh);
  ctx.strokeStyle = pbHovered ? '#aaa' : '#555'; ctx.lineWidth = 1;
  ctx.strokeRect(pbx, pby, pbw, pbh);
  ctx.fillStyle = '#ccc'; ctx.font = '11px monospace'; ctx.textAlign = 'center';
  ctx.fillText('PAUSE', pbx + pbw/2, pby + 18);
  ctx.fillStyle = '#555'; ctx.font = '10px monospace';
  ctx.fillText('Shift = Pause', W/2, H - 2);

  // Revive hint when teammates are downed
  const downedPlayers = getDownedPlayers();
  if (downedPlayers.length > 0) {
    const blink = Math.floor(Date.now() / 500) % 2 === 0;
    if (blink) {
      ctx.fillStyle = '#ff8844'; ctx.font = 'bold 11px monospace';
      const hasBoss = monsters.some(m => m.isBoss);
      ctx.fillText('Stand near downed teammate + hold ATTACK to revive!', W/2, hudH + (hasBoss ? 26 : 8));
    }
  }
  ctx.textAlign = 'left';
}

function drawShop() {
  const shopTarget = (currentMode === 'teamwork') ? players[teamShopPlayer] : player;

  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 30px monospace';
  ctx.fillText('SHOP', W/2, 80);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 16px monospace';
  ctx.fillText(`${coins} coins`, W/2, 112);

  // Player tabs in teamwork mode
  if (currentMode === 'teamwork') {
    for (let pi = 0; pi < players.length; pi++) {
      const tw = 80, tx = 60 + pi * (tw + 8), ty = 100;
      const selected = pi === teamShopPlayer;
      const colors = PLAYER_COLORS[pi];
      ctx.fillStyle = selected ? colors.armor : 'rgba(255,255,255,0.05)';
      ctx.fillRect(tx, ty, tw, 24);
      ctx.strokeStyle = selected ? '#fff' : '#555'; ctx.lineWidth = selected ? 2 : 1;
      ctx.strokeRect(tx, ty, tw, 24);
      ctx.fillStyle = selected ? '#fff' : '#888'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
      ctx.fillText(colors.name, tx + tw/2, ty + 16);
    }
    ctx.textAlign = 'center';
    ctx.fillStyle = PLAYER_COLORS[teamShopPlayer].armor; ctx.font = '11px monospace';
    ctx.fillText(`Shopping for ${PLAYER_COLORS[teamShopPlayer].name}  |  Weapon: ${shopTarget.weapon}`, W/2, 140);
  }
  ctx.fillStyle = '#3d0000'; ctx.fillRect(100, 145, 600, 2);

  SHOP_ITEMS.forEach((item, i) => {
    const col = i % 3, row = Math.floor(i / 3);
    const bx = 60 + col * 230, by = 148 + row * 125, bw = 210, bh = 110;
    const affordable = coins >= item.cost;
    const buyable = affordable && canBuyItem(item, shopTarget);
    const hov = mouse.x >= bx && mouse.x <= bx+bw && mouse.y >= by && mouse.y <= by+bh;

    ctx.globalAlpha = buyable ? 1 : 0.4;
    ctx.fillStyle = hov && buyable ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = hov && buyable ? item.color : '#444';
    ctx.lineWidth = hov && buyable ? 2 : 1;
    ctx.strokeRect(bx, by, bw, bh);

    ctx.font = '22px monospace'; ctx.fillText(item.icon, bx + bw/2 - 11, by + 30);
    ctx.fillStyle = item.color; ctx.font = 'bold 12px monospace';
    ctx.fillText(item.name, bx + bw/2, by + 50);
    ctx.fillStyle = '#aaa'; ctx.font = '10px monospace';
    ctx.fillText(item.desc, bx + bw/2, by + 66);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 12px monospace';
    ctx.fillText(`🪙 ${item.cost}`, bx + bw/2, by + 84);

    if (!canBuyItem(item, shopTarget)) {
      ctx.fillStyle = '#00ff88'; ctx.font = 'bold 10px monospace';
      ctx.fillText(item.weaponTier !== undefined ? '-- EQUIPPED --' : 'HP IS FULL', bx + bw/2, by + 100);
    } else if (!affordable) {
      ctx.fillStyle = '#ff6666'; ctx.font = '10px monospace';
      ctx.fillText('Not enough coins', bx + bw/2, by + 100);
    } else if (hov) {
      ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace';
      ctx.fillText('[ CLICK TO BUY ]', bx + bw/2, by + 100);
    }
    ctx.globalAlpha = 1;
  });

  // Weapon upgrade bar
  const upLvl  = shopTarget.weaponUpgradeLevel;
  const maxed  = upLvl >= 5;
  const upCost = maxed ? 0 : WEAPON_UPGRADE_COSTS[upLvl];
  const upBuy  = !maxed && coins >= upCost;
  const upHov  = !maxed && mouse.x >= 60 && mouse.x <= W-60 && mouse.y >= 518 && mouse.y <= 562;
  const upColor = maxed ? '#888' : '#FFD700';

  ctx.globalAlpha = maxed ? 0.5 : 1;
  ctx.fillStyle = upHov && upBuy ? 'rgba(255,215,0,0.12)' : 'rgba(255,255,255,0.04)';
  ctx.fillRect(60, 518, W-120, 44);
  ctx.strokeStyle = upHov && upBuy ? '#FFD700' : '#555'; ctx.lineWidth = upHov && upBuy ? 2 : 1;
  ctx.strokeRect(60, 518, W-120, 44);

  // Upgrade pips
  ctx.fillStyle = upColor; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'left';
  ctx.fillText(`UPGRADE: ${shopTarget.weapon}`, 76, 535);
  for (let p = 0; p < 5; p++) {
    ctx.fillStyle = p < upLvl ? '#FFD700' : '#333';
    ctx.fillRect(76 + p * 18, 540, 14, 10);
    ctx.strokeStyle = '#666'; ctx.lineWidth = 1; ctx.strokeRect(76 + p * 18, 540, 14, 10);
  }
  ctx.textAlign = 'center';
  if (maxed) {
    ctx.fillStyle = '#00ff88'; ctx.font = 'bold 12px monospace';
    ctx.fillText('-- FULLY UPGRADED (+15 dmg) --', W/2, 557);
  } else {
    ctx.fillStyle = upBuy ? '#FFD700' : '#ff6666'; ctx.font = '12px monospace';
    ctx.fillText(`+3 dmg  |  🪙 ${upCost}${upHov && upBuy ? '  [ CLICK ]' : !upBuy ? '  (need more coins)' : ''}`, W/2, 557);
  }
  ctx.globalAlpha = 1;

  // Back button
  const backHov = mouse.x >= W/2-60 && mouse.x <= W/2+60 && mouse.y >= H-40 && mouse.y <= H-10;
  ctx.fillStyle = backHov ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.06)';
  ctx.fillRect(W/2-60, H-40, 120, 28);
  ctx.strokeStyle = backHov ? '#aaa' : '#555'; ctx.lineWidth = 1;
  ctx.strokeRect(W/2-60, H-40, 120, 28);
  ctx.fillStyle = backHov ? '#fff' : '#888'; ctx.font = 'bold 13px monospace';
  ctx.fillText('← Back', W/2, H-20);

  ctx.textAlign = 'left';
}

// --- Cutscene Draw ---
function drawCutscene() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#3d1a00'; ctx.lineWidth = 3;
  ctx.strokeRect(12, 12, W-24, H-24);

  if (!cutsceneLines.length) return;
  const line = cutsceneLines[cutsceneIndex];
  const visible = line.t.substring(0, Math.floor(cutsceneChar));

  // Speaker portrait box
  const speakerColors = {
    'Narrator': '#aaaaaa', 'Kael': '#FFD700', 'Ghost': '#88ccff',
    'Lich Lord': '#cc44ff', 'Malachar': '#ff4422', 'Krath': '#ff5544',
    'Iron Tusk': '#44ff44', 'High Priest': '#aa88ff', 'Announcer': '#ffaa44',
  };
  const sc = speakerColors[line.s] || '#cccccc';

  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(60, H - 195, W - 120, 160);
  ctx.strokeStyle = sc; ctx.lineWidth = 2;
  ctx.strokeRect(60, H - 195, W - 120, 160);

  ctx.fillStyle = sc; ctx.font = 'bold 15px monospace'; ctx.textAlign = 'left';
  ctx.fillText(line.s, 78, H - 170);

  ctx.strokeStyle = sc; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(78, H - 162); ctx.lineTo(78 + ctx.measureText(line.s).width, H - 162); ctx.stroke();

  // Wrap text
  ctx.fillStyle = '#ddd'; ctx.font = '14px monospace';
  const words = visible.split(' ');
  let lineStr = '', ly = H - 145;
  for (const w of words) {
    const test = lineStr + w + ' ';
    if (ctx.measureText(test).width > W - 160) {
      ctx.fillText(lineStr, 78, ly); lineStr = w + ' '; ly += 22;
    } else { lineStr = test; }
  }
  if (lineStr) ctx.fillText(lineStr, 78, ly);

  // Blinking prompt if line is done
  if (Math.floor(cutsceneChar) >= line.t.length && Math.floor(Date.now()/500)%2===0) {
    ctx.fillStyle = '#888'; ctx.font = '12px monospace'; ctx.textAlign = 'right';
    const more = cutsceneIndex < cutsceneLines.length - 1 ? 'Space / Click to continue >' : 'Space / Click to finish >';
    ctx.fillText(more, W - 78, H - 50);
  }

  // Progress dots
  ctx.textAlign = 'center';
  for (let i = 0; i < cutsceneLines.length; i++) {
    ctx.fillStyle = i === cutsceneIndex ? sc : '#333';
    ctx.beginPath(); ctx.arc(W/2 + (i - cutsceneLines.length/2 + 0.5) * 14, H - 30, 4, 0, Math.PI*2); ctx.fill();
  }
  ctx.textAlign = 'left';
}

// --- Credits Draw ---
function drawAchievements() {
  ctx.fillStyle = '#0a0a18'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#4400aa'; ctx.lineWidth = 3; ctx.strokeRect(18, 18, W-36, H-36);
  ctx.strokeStyle = '#220055'; ctx.lineWidth = 1; ctx.strokeRect(24, 24, W-48, H-48);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#4400aa'; ctx.font = 'bold 36px monospace'; ctx.fillText('ACHIEVEMENTS', W/2+2, 72);
  ctx.fillStyle = '#bb88ff'; ctx.fillText('ACHIEVEMENTS', W/2, 70);
  ctx.fillStyle = '#4400aa'; ctx.fillRect(80, 84, W-160, 2);

  // Stats bar
  ctx.fillStyle = '#666'; ctx.font = '12px monospace';
  ctx.fillText(`Monsters Killed: ${achStats.kills}   |   Highest Endless Level: ${achStats.endlessLevel}   |   Story: ${achStats.storyBeaten ? 'Complete ✓' : 'Not Yet'}`, W/2, 106);

  // Achievement grid
  const cols = 2, cardW = 330, cardH = 68, padX = (W - cols * cardW) / 2, padY = 130, gap = 10;
  ACHIEVEMENTS.forEach((a, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const cx = padX + col * (cardW + gap), cy = padY + row * (cardH + gap);
    const unlocked = unlockedAch.includes(a.id);

    // Card background
    ctx.fillStyle = unlocked ? 'rgba(80,0,180,0.25)' : 'rgba(255,255,255,0.04)';
    ctx.fillRect(cx, cy, cardW, cardH);
    ctx.strokeStyle = unlocked ? '#bb88ff' : '#333';
    ctx.lineWidth = unlocked ? 2 : 1;
    ctx.strokeRect(cx, cy, cardW, cardH);

    // Icon
    ctx.font = '28px monospace'; ctx.textAlign = 'left';
    ctx.globalAlpha = unlocked ? 1 : 0.3;
    ctx.fillText(a.icon, cx + 12, cy + 42);
    ctx.globalAlpha = 1;

    // Name
    ctx.fillStyle = unlocked ? '#cc99ff' : '#555';
    ctx.font = `bold 14px monospace`;
    ctx.fillText(a.name, cx + 52, cy + 26);

    // Desc
    ctx.fillStyle = unlocked ? '#888' : '#3a3a3a';
    ctx.font = '11px monospace';
    ctx.fillText(a.desc, cx + 52, cy + 46);

    // Unlocked check
    if (unlocked) {
      ctx.fillStyle = '#66ff88'; ctx.font = 'bold 11px monospace';
      ctx.fillText('✓ UNLOCKED', cx + 52, cy + 62);
    }
  });

  // Back button
  const bhov = mouse.x >= W/2-70 && mouse.x <= W/2+70 && mouse.y >= H-54 && mouse.y <= H-18;
  ctx.textAlign = 'center';
  ctx.fillStyle = bhov ? 'rgba(180,130,255,0.2)' : 'rgba(255,255,255,0.06)';
  ctx.fillRect(W/2-70, H-54, 140, 36);
  ctx.strokeStyle = bhov ? '#bb88ff' : '#444'; ctx.lineWidth = bhov ? 2 : 1;
  ctx.strokeRect(W/2-70, H-54, 140, 36);
  ctx.fillStyle = bhov ? '#bb88ff' : '#888'; ctx.font = 'bold 14px monospace';
  ctx.fillText('← BACK', W/2, H-30);

  ctx.textAlign = 'left';
}

function drawAchievementPopup() {
  if (!achPopup) return;
  const pw = 280, ph = 56, px2 = W - pw - 16, py2 = 16;
  const alpha = Math.min(1, achPopup.timer, achPopup.timer < 1 ? achPopup.timer : 1);
  ctx.globalAlpha = Math.min(1, achPopup.timer < 1 ? achPopup.timer : 1) * alpha;
  ctx.fillStyle = '#1a0040'; ctx.fillRect(px2, py2, pw, ph);
  ctx.strokeStyle = '#bb88ff'; ctx.lineWidth = 2; ctx.strokeRect(px2, py2, pw, ph);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#bb88ff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'left';
  ctx.fillText('ACHIEVEMENT UNLOCKED!', px2 + 10, py2 + 18);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 13px monospace';
  ctx.fillText(`${achPopup.icon} ${achPopup.name}`, px2 + 10, py2 + 38);
  ctx.textAlign = 'left';
}

function drawCredits() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#3d0000'; ctx.lineWidth = 3; ctx.strokeRect(18, 18, W-36, H-36);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 36px monospace';
  ctx.fillText('THE END', W/2, 110);
  ctx.fillStyle = '#888'; ctx.font = '13px monospace';
  ctx.fillText('Kael has vanquished the darkness.', W/2, 148);
  ctx.fillText('The dungeon is no more.', W/2, 168);

  ctx.fillStyle = '#3d0000'; ctx.fillRect(160, 188, W-320, 2);

  const lines = [
    { label: 'A game by', value: 'You & Claude' },
    { label: 'Story', value: 'The Last Survivor' },
    { label: 'Chapters', value: '10  |  100 Levels' },
    { label: 'Bosses defeated', value: '10' },
    { label: 'Engine', value: 'HTML5 Canvas' },
  ];
  lines.forEach((l, i) => {
    ctx.fillStyle = '#666'; ctx.font = '12px monospace';
    ctx.fillText(l.label, W/2, 218 + i * 36);
    ctx.fillStyle = '#ccc'; ctx.font = 'bold 14px monospace';
    ctx.fillText(l.value, W/2, 236 + i * 36);
  });

  ctx.fillStyle = '#3d0000'; ctx.fillRect(160, 420, W-320, 2);

  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 13px monospace';
  ctx.fillText('Thank you for playing!', W/2, 450);

  if (Math.floor(Date.now()/600)%2===0) {
    ctx.fillStyle = '#555'; ctx.font = '12px monospace';
    ctx.fillText('Click or Space to return to menu', W/2, 510);
  }
  ctx.textAlign = 'left';
}

// --- Story Boss Draw ---
function drawStoryBoss(x, y, facing, charging, idx) {
  const t = Date.now() / 150;
  // Each chapter boss has a distinct look
  const palettes = [
    { body:'#8B6914', armor:'#5a4010', eye:'#ff4400', trim:'#FFD700' }, // 0 Gatekeeper - gold armored
    { body:'#ddd8cc', armor:'#888880', eye:'#aa44ff', trim:'#ccccff' }, // 1 Tomb Warden - bone silver
    { body:'#226688', armor:'#114455', eye:'#00ffee', trim:'#88ddff' }, // 2 Drowned One - blue
    { body:'#440066', armor:'#220033', eye:'#cc00ff', trim:'#ff88ff' }, // 3 Lich Lord - purple
    { body:'#882200', armor:'#551100', eye:'#ffaa00', trim:'#ff6600' }, // 4 Magma Fiend - lava
    { body:'#5a0000', armor:'#3d0000', eye:'#ff2200', trim:'#880000' }, // 5 General Krath - red demon
    { body:'#2d5a1b', armor:'#1a3a10', eye:'#FF4500', trim:'#88ff44' }, // 6 Iron Tusk - green orc
    { body:'#8B1a1a', armor:'#600000', eye:'#ffdd00', trim:'#ff8888' }, // 7 Champion - blood red
    { body:'#1a1a44', armor:'#0a0a22', eye:'#8888ff', trim:'#4444cc' }, // 8 High Priest - dark blue
    { body:'#000000', armor:'#1a0000', eye:'#ff0000', trim:'#cc0000' }, // 9 Malachar - void black
  ];
  const pal = palettes[idx] || palettes[0];

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.beginPath(); ctx.ellipse(x, y+16, 26, 7, 0, 0, Math.PI*2); ctx.fill();

  // Chapter 9 (Malachar) - void wings
  if (idx === 9) {
    ctx.fillStyle = '#110000';
    ctx.beginPath(); ctx.moveTo(x-10,y-30); ctx.lineTo(x-60,y-60); ctx.lineTo(x-50,y-20); ctx.lineTo(x-60,y+12); ctx.lineTo(x-10,y-5); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+10,y-30); ctx.lineTo(x+60,y-60); ctx.lineTo(x+50,y-20); ctx.lineTo(x+60,y+12); ctx.lineTo(x+10,y-5); ctx.fill();
    ctx.strokeStyle = '#440000'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x-10,y-28); ctx.lineTo(x-56,y-55); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+10,y-28); ctx.lineTo(x+56,y-55); ctx.stroke();
  }

  // Legs
  ctx.fillStyle = pal.body;
  ctx.fillRect(x-13, y, 11, 18); ctx.fillRect(x+2, y, 11, 18);
  ctx.fillStyle = pal.armor;
  ctx.fillRect(x-15, y+12, 13, 8); ctx.fillRect(x+2, y+12, 13, 8);

  // Body
  ctx.fillStyle = pal.body; ctx.fillRect(x-16, y-28, 32, 30);
  ctx.fillStyle = pal.armor; ctx.fillRect(x-14, y-26, 28, 22);
  ctx.fillStyle = pal.trim;
  ctx.fillRect(x-14, y-27, 28, 3);
  ctx.fillRect(x-14, y-6, 28, 3);

  // Shoulders
  ctx.fillStyle = pal.armor;
  ctx.fillRect(x-28, y-30, 14, 14); ctx.fillRect(x+14, y-30, 14, 14);
  // Shoulder spikes
  ctx.fillStyle = pal.trim;
  ctx.beginPath(); ctx.moveTo(x-26,y-30); ctx.lineTo(x-22,y-40); ctx.lineTo(x-18,y-30); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+18,y-30); ctx.lineTo(x+22,y-40); ctx.lineTo(x+26,y-30); ctx.fill();

  // Arms
  ctx.fillStyle = pal.body;
  ctx.fillRect(x-28, y-26, 12, 22); ctx.fillRect(x+16, y-26, 12, 22);

  // Weapon (alternates by chapter)
  if (idx % 2 === 0) {
    // Big sword
    ctx.fillStyle = '#5c3317'; ctx.fillRect(x+26, y-55, 5, 55);
    ctx.fillStyle = pal.trim;
    ctx.beginPath(); ctx.moveTo(x+26,y-55); ctx.lineTo(x+22,y-70); ctx.lineTo(x+28,y-70); ctx.lineTo(x+32,y-55); ctx.fill();
    if (pal.trim !== '#FFD700') { ctx.shadowColor = pal.trim; ctx.shadowBlur = 12; }
    ctx.fillStyle = pal.trim; ctx.fillRect(x+18, y-38, 22, 5);
    ctx.shadowBlur = 0;
  } else {
    // Staff / scythe
    ctx.fillStyle = '#3a2510'; ctx.fillRect(x+24, y-60, 5, 65);
    ctx.shadowColor = pal.eye; ctx.shadowBlur = 16;
    ctx.fillStyle = pal.eye; ctx.beginPath(); ctx.arc(x+26, y-62, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = pal.trim; ctx.beginPath(); ctx.arc(x+26, y-62, 5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Head
  ctx.fillStyle = pal.body; ctx.fillRect(x-14, y-52, 28, 26);

  // Helmet / crown
  ctx.fillStyle = pal.armor; ctx.fillRect(x-16, y-54, 32, 10);
  ctx.fillStyle = pal.trim;
  ctx.fillRect(x-16, y-58, 5, 8); ctx.fillRect(x-5, y-62, 6, 12); ctx.fillRect(x+11, y-58, 5, 8);

  // Eyes
  const eg = 0.8 + Math.sin(t*3)*0.2;
  ctx.fillStyle = `rgba(${parseInt(pal.eye.slice(1,3),16)},${parseInt(pal.eye.slice(3,5),16)},${parseInt(pal.eye.slice(5,7),16)},${eg})`;
  if (facing > 0) { ctx.fillRect(x+2, y-42, 7, 6); } else { ctx.fillRect(x-9, y-42, 7, 6); }
  ctx.fillStyle = '#ffffff';
  if (facing > 0) { ctx.fillRect(x+3, y-41, 3, 3); } else { ctx.fillRect(x-8, y-41, 3, 3); }

  // Gun
  drawBossGun(x, y, facing, pal.eye);
  // Charge effect
  if (charging) {
    ctx.shadowColor = pal.eye; ctx.shadowBlur = 24;
    ctx.strokeStyle = pal.trim; ctx.lineWidth = 3;
    const pulse = 0.6 + Math.sin(t*5)*0.4;
    ctx.beginPath(); ctx.ellipse(x, y+14, 32*pulse, 10*pulse, 0, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = pal.eye; ctx.globalAlpha = 0.25 + Math.sin(t*4)*0.1;
    ctx.fillRect(x-28, y-60, 56, 80);
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }
}

// --- Resize ---
function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
window.addEventListener('resize', resize);
resize();

// --- Start ---
requestAnimationFrame(t => { lastT = t; requestAnimationFrame(gameLoop); });
</script>
</body>
</html>

    const mY = INTRO_GY - 10;
    if (mTypes[i] === 0) { drawSkeleton(gx, mY, mf); drawSkeleton(gx+22, mY, mf); drawSkeleton(gx+44, mY, mf); }
    else if (mTypes[i] === 1) { drawDemon(gx, mY, mf); drawDemon(gx+22, mY, mf); drawDemon(gx+44, mY, mf); }
    else { drawOrc(gx, mY, mf); drawOrc(gx+22, mY, mf); drawOrc(gx+44, mY, mf); }
  });

  // Ash particles
  introAshParts.forEach(p => {
    ctx.globalAlpha = p.life * 0.5;
    ctx.fillStyle = '#6a3010';
    ctx.fillRect(p.x - cx, p.y, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // Demon Lord
  const demonCX  = introDemonX - cx + introDemonFlyDX;
  const bobY     = introPhase === 1 ? Math.sin(introTimer * 7) * 2.5 : 0;
  const demonY   = INTRO_GY - 18 - introDemonFlyY + bobY;
  if (demonCX > -90 && demonCX < W + 130) {
    if (introPhase === 4) { ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 28; }
    drawDemonLord(demonCX, demonY, 1, introPhase === 4);
    ctx.shadowBlur = 0;
  }

  // Dialogue box (phases 3 & 4)
  if (introPhase >= 3 && introPhase <= 4) {
    const dlgY = H - 148;
    ctx.fillStyle = 'rgba(0,0,0,0.90)'; ctx.fillRect(55, dlgY, W-110, 122);
    ctx.strokeStyle = '#880000'; ctx.lineWidth = 2; ctx.strokeRect(55, dlgY, W-110, 122);
    ctx.strokeStyle = '#4a0000'; ctx.lineWidth = 1; ctx.strokeRect(59, dlgY+4, W-118, 114);
    ctx.fillStyle = '#ff4444'; ctx.font = 'bold 13px monospace'; ctx.textAlign = 'left';
    ctx.fillText('Demon Lord', 74, dlgY + 22);
    ctx.strokeStyle = '#550000'; ctx.beginPath(); ctx.moveTo(74, dlgY+26); ctx.lineTo(74+90, dlgY+26); ctx.stroke();
    const vis = INTRO_DIALOG.substring(0, Math.floor(introDialogChar));
    ctx.fillStyle = '#ddd0c0'; ctx.font = '13px monospace';
    let ln = '', ly = dlgY + 48;
    for (const w of vis.split(' ')) {
      const test = ln + w + ' ';
      if (ctx.measureText(test).width > W - 152) { ctx.fillText(ln, 74, ly); ln = w + ' '; ly += 21; }
      else ln = test;
    }
    if (ln) ctx.fillText(ln, 74, ly);
    ctx.textAlign = 'left';
  }

  // Phase 0 fade-in
  if (introPhase === 0) {
    ctx.globalAlpha = Math.max(0, 1 - introPhaseTimer / 1.3);
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1;
  }
  // Phase 5 fade-out
  if (introPhase === 5) {
    ctx.globalAlpha = Math.min(1, introPhaseTimer / 1.2);
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1;
  }

  // Skip hint
  ctx.fillStyle = 'rgba(255,255,255,0.20)';
  ctx.font = '11px monospace'; ctx.textAlign = 'right';
  ctx.fillText('Space / Click to skip', W - 18, H - 12);
  ctx.textAlign = 'left';
}

// =====================================================
// CHAPTER CUTSCENE AMBIENCE SOUNDS
// =====================================================

function csNoiseBuf(ac, secs) {
  const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate * secs), ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function csOsc(ac, type, freq, vol, decay, when) {
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.value = freq;
  const t = (when || 0) + ac.currentTime;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + decay);
  o.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t + decay + 0.02);
}

function csNoiseBurst(ac, vol, decay, lpFreq, when) {
  const buf = csNoiseBuf(ac, decay + 0.05);
  const src = ac.createBufferSource(), g = ac.createGain();
  const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = lpFreq;
  src.buffer = buf;
  const t = (when || 0) + ac.currentTime;
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + decay);
  src.connect(lp); lp.connect(g); g.connect(ac.destination);
  src.start(t); src.stop(t + decay + 0.06);
}

function stopCutsceneAmbience() {
  if (csAmbInterval) { clearInterval(csAmbInterval); csAmbInterval = null; }
  if (csACtx) { try { csACtx.close(); } catch(e) {} csACtx = null; }
}

function playCutsceneAmbience(chIdx) {
  stopCutsceneAmbience();
  try { csACtx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch(e) { return; }
  const ac = csACtx;

  switch (chIdx) {
    case 0: { // Burning Village — crackling fire + distant wind
      const buf = csNoiseBuf(ac, 4);
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
      const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 400; bp.Q.value = 0.5;
      const g  = ac.createGain(); g.gain.value = 0.13;
      src.connect(bp); bp.connect(g); g.connect(ac.destination); src.start();
      csAmbInterval = setInterval(() => {
        if (!csACtx || csACtx.state === 'closed') return;
        csOsc(ac, 'sine', 70 + Math.random()*30, 0.18, 0.14, 0);
      }, 550 + Math.random()*350);
      break;
    }
    case 1: { // Upper Crypts — hollow drone + stone drip echo
      const o = ac.createOscillator(); o.type = 'sine'; o.frequency.value = 48;
      const g = ac.createGain(); g.gain.value = 0.07;
      o.connect(g); g.connect(ac.destination); o.start();
      csAmbInterval = setInterval(() => {
        if (!csACtx || csACtx.state === 'closed') return;
        csOsc(ac, 'sine', 900 + Math.random()*500, 0.14, 0.45, 0);
      }, 1400 + Math.random()*900);
      break;
    }
    case 2: { // Flooded Tunnels — deep water rumble + drip pings
      const buf = csNoiseBuf(ac, 4);
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 140;
      const g  = ac.createGain(); g.gain.value = 0.22;
      src.connect(lp); lp.connect(g); g.connect(ac.destination); src.start();
      csAmbInterval = setInterval(() => {
        if (!csACtx || csACtx.state === 'closed') return;
        csOsc(ac, 'sine', 1400 + Math.random()*400, 0.12, 0.28, 0);
      }, 700 + Math.random()*700);
      break;
    }
    case 3: { // Bone Throne — eerie detuned chord + bone rattle
      [[55, 0], [82, 0.02], [110, -0.01]].forEach(([f, det]) => {
        const o = ac.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f + det;
        const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 350;
        const g = ac.createGain(); g.gain.value = 0.038;
        o.connect(lp); lp.connect(g); g.connect(ac.destination); o.start();
      });
      csAmbInterval = setInterval(() => {
        if (!csACtx || csACtx.state === 'closed') return;
        csNoiseBurst(ac, 0.35, 0.06, 3000, 0);
      }, 1600 + Math.random()*1100);
      break;
    }
    case 4: { // Lava Fields — sub-bass rumble + lava bubble pops
      const buf = csNoiseBuf(ac, 4);
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 65;
      const g  = ac.createGain(); g.gain.value = 0.30;
      src.connect(lp); lp.connect(g); g.connect(ac.destination); src.start();
      csAmbInterval = setInterval(() => {
        if (!csACtx || csACtx.state === 'closed') return;
        csOsc(ac, 'sine', 35 + Math.random()*25, 0.45, 0.18, 0);
      }, 650 + Math.random()*500);
      break;
    }
    case 5: { // Demon Fortress — metal scrape drone + distant clang
      const o = ac.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 42;
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 280;
      const g = ac.createGain(); g.gain.value = 0.09;
      o.connect(lp); lp.connect(g); g.connect(ac.destination); o.start();
      csAmbInterval = setInterval(() => {
        if (!csACtx || csACtx.state === 'closed') return;
        csOsc(ac, 'square', 180 + Math.random()*80, 0.22, 0.5, 0);
      }, 1800 + Math.random()*1400);
      break;
    }
    case 6: { // Orc Pits — tribal drum rhythm
      let beat = 0;
      csAmbInterval = setInterval(() => {
        if (!csACtx || csACtx.state === 'closed') return;
        const isAccent = beat % 4 === 0;
        const freq = isAccent ? 58 : beat % 2 === 0 ? 78 : 92;
        csOsc(ac, 'sine', freq, isAccent ? 0.50 : 0.26, 0.20, 0);
        if (isAccent) csNoiseBurst(ac, 0.25, 0.08, 4000, 0.02);
        beat++;
      }, 275);
      break;
    }
    case 7: { // Blood Arena — roaring crowd + fanfare horn hit
      const buf = csNoiseBuf(ac, 4);
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
      const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 650; bp.Q.value = 0.35;
      const g  = ac.createGain(); g.gain.value = 0.11;
      src.connect(bp); bp.connect(g); g.connect(ac.destination); src.start();
      // Fanfare chord at start
      [220, 277, 330, 440].forEach((f, i) => {
        const o = ac.createOscillator(), gn = ac.createGain();
        o.type = 'sawtooth'; o.frequency.value = f;
        const t = ac.currentTime + 0.3 + i * 0.04;
        gn.gain.setValueAtTime(0, t); gn.gain.linearRampToValueAtTime(0.10, t + 0.08);
        gn.gain.exponentialRampToValueAtTime(0.0001, t + 1.6);
        o.connect(gn); gn.connect(ac.destination); o.start(t); o.stop(t + 1.7);
      });
      break;
    }
    case 8: { // Dark Sanctum — AM chanting + distant bell toll
      const carrier = ac.createOscillator(); carrier.type = 'sine'; carrier.frequency.value = 108;
      const mod = ac.createOscillator(); mod.type = 'sine'; mod.frequency.value = 2.8;
      const modG = ac.createGain(); modG.gain.value = 22;
      mod.connect(modG); modG.connect(carrier.frequency);
      const g = ac.createGain(); g.gain.value = 0.10;
      carrier.connect(g); g.connect(ac.destination);
      carrier.start(); mod.start();
      csAmbInterval = setInterval(() => {
        if (!csACtx || csACtx.state === 'closed') return;
        csOsc(ac, 'sine', 440 + Math.random()*220, 0.18, 2.0, 0);
      }, 3200 + Math.random()*2000);
      break;
    }
    case 9: { // Final Gate — epic power chord + thunder crack
      [[55,0],[110,0.3],[165,0],[220,0.2]].forEach(([f, det]) => {
        const o = ac.createOscillator(); o.type = f < 100 ? 'sawtooth' : 'sine';
        o.frequency.value = f + det;
        const g = ac.createGain(); g.gain.value = 0.038;
        o.connect(g); g.connect(ac.destination); o.start();
      });
      // Thunder crack at entry
      csNoiseBurst(ac, 0.65, 0.55, 320, 0.1);
      csNoiseBurst(ac, 0.40, 0.35, 180, 0.5);
      break;
    }
  }
}

// --- Cutscene helpers ---
function startCutscene(lines, callback, soundId = -1) {
  cutsceneLines = lines;
  cutsceneIndex = 0;
  cutsceneChar = 0;
  cutsceneCallback = callback;
  if (soundId >= 0) playCutsceneAmbience(soundId);
  gameState = 'cutscene';
}

function updateCutscene(dt) {
  if (!cutsceneLines.length) { endCutscene(); return; }
  const line = cutsceneLines[cutsceneIndex];
  cutsceneChar = Math.min(line.t.length, cutsceneChar + dt * 44);
  if (mouseClicked || keys[' ']) {
    keys[' '] = false;
    if (Math.floor(cutsceneChar) < line.t.length) {
      cutsceneChar = line.t.length;
    } else {
      cutsceneIndex++;
      cutsceneChar = 0;
      if (cutsceneIndex >= cutsceneLines.length) endCutscene();
    }
  }
}

function endCutscene() {
  stopCutsceneAmbience();
  cutsceneLines = [];
  if (cutsceneCallback) { const cb = cutsceneCallback; cutsceneCallback = null; cb(); }
  else gameState = 'playing';
}

function spawnStoryBoss(chIdx) {
  const ch = STORY_CHAPTERS[chIdx];
  monsters = [{
    x: W/2, y: ROOM.y + 80,
    w: 44, h: 56,
    hp: ch.hp, maxHp: ch.hp,
    speed: 1.0 + chIdx * 0.08, baseSpeed: 1.0 + chIdx * 0.08,
    damage: 10 + Math.floor(level / 20) * 10,
    atkCooldown: 1.0,
    wobble: 0, type: chIdx % 3, facing: -1,
    isBoss: true, isStoryBoss: true, storyBossIdx: chIdx,
    bossName: ch.bossName,
    chargeTimer: 4.0, charging: false, chargeTime: 0,
    shootTimer: 2.0, shootBurst: 0,
    burnTimer: 0, burnTick: 0, slowTimer: 0, slowMult: 1,
    poisonTimer: 0, poisonTick: 0, kbVx: 0, kbVy: 0,
  }];
  bossProjectiles = [];
}

function retryChapter() {
  level = storyChapterStartLevel;
  player.hp = player.maxHp;
  player.x = W/2; player.y = H/2;
  player.attackCooldown = 0; player.isAttacking = false; player.invincible = 0;
  bannerText = ''; subBannerText = ''; bannerTimer = 0;
  floatingTexts = []; particles = []; shockwaves = []; lightningEffects = []; deathAnims = [];
  postBossTimer = 0; postBossCallback = null;
  spawnMonsters();
  gameState = 'playing';
}

// --- Level Init ---
function initLevel() {
  if (currentMode === 'teamwork') {
    const spawnPositions = [
      { x: W/2 - 60, y: H/2 - 40 },
      { x: W/2 + 60, y: H/2 - 40 },
      { x: W/2 - 60, y: H/2 + 40 },
      { x: W/2 + 60, y: H/2 + 40 },
    ];
    players.forEach((p, i) => {
      if (p.permaDead) return;
      if (p.downed) return; // downed players stay down — teammate must revive
      if (!p.alive || p.hp <= 0) return;
      const pos = spawnPositions[i];
      p.x = pos.x; p.y = pos.y;
      p.attackCooldown = 0;
      p.isAttacking = false;
      p.invincible = 0;
    });
  } else {
    player.x = W/2; player.y = H/2;
    player.attackCooldown = 0;
    player.isAttacking = false;
    player.invincible = 0;
  }
  spawnMonsters();
  particles = []; shockwaves = []; lightningEffects = []; bossProjectiles = []; deathAnims = [];
}

function resetGame() {
  adminMode = false;
  level = 1;
  if (currentMode === 'teamwork') {
    players = [];
    for (let i = 0; i < teamPlayerCount; i++) {
      players.push(createPlayer(i));
    }
    // weaponDamage starts at 5 in solo; match that
    players.forEach(p => { p.weaponDamage = 5; });
  } else {
    player.hp = 20; player.maxHp = 20;
    player.baseSpeed = 2.5; player.speedMult = 1;
    player.weaponDamage = 5; player.strengthBonus = 0;
    player.baseAttackSpeed = 1; player.attackSpeedMult = 1;
    player.weapon = 'Sword'; player.weaponTier = 0; player.weaponUpgradeLevel = 0; player.facing = 1;
    player.vampireSteal = 0;
    players = [player];
  }
  coins = 0; playTime = 0;
  teamUpgradeQueue = [];
  teamShopPlayer = 0;
  bannerText = ''; subBannerText = ''; bannerTimer = 0;
  floatingTexts = []; particles = []; bossProjectiles = []; groundCoins = []; deathAnims = []; screenShake = 0;
  initLevel();
  gameState = 'playing';
}

// Stat caps
const CAP_STRENGTH_BONUS = 20;   // max +20 bonus damage
const CAP_SPEED_MULT     = 2.8;  // max speed = 2.5 * 2.8 = 7.0
const CAP_ATK_SPD_MULT   = 5.0;  // max 5.0 attacks/sec
const CAP_VAMPIRE_STEAL = 10; // max +10 HP per level clear
function statCapped(i, p) {
  const tgt = p || player;
  if (i === 0) return tgt.strengthBonus >= CAP_STRENGTH_BONUS;
  if (i === 1) return tgt.speedMult     >= CAP_SPEED_MULT;
  if (i === 2) return tgt.attackSpeedMult >= CAP_ATK_SPD_MULT;
  if (i === 4) return tgt.vampireSteal >= CAP_VAMPIRE_STEAL;
  return false; // Max HP has no cap
}

function applyUpgrade(i, p) {
  const tgt = p || player;
  if (statCapped(i, tgt)) return;
  if (i === 0) tgt.strengthBonus = Math.min(tgt.strengthBonus + 2, CAP_STRENGTH_BONUS);
  else if (i === 1) tgt.speedMult = Math.min(tgt.speedMult * 1.3, CAP_SPEED_MULT);
  else if (i === 2) tgt.attackSpeedMult = Math.min(tgt.attackSpeedMult * 1.3, CAP_ATK_SPD_MULT);
  else if (i === 4) tgt.vampireSteal = Math.min(tgt.vampireSteal + 1, CAP_VAMPIRE_STEAL);
  else { tgt.maxHp += 10; tgt.hp = Math.min(tgt.hp + 10, tgt.maxHp); }
}

function canBuyItem(item, p) {
  const tgt = p || player;
  if (item.weaponTier !== undefined) return tgt.weaponTier !== item.weaponTier;
  if (item.name === 'Health Potion') return tgt.hp < tgt.maxHp;
  if (item.name === 'Revive Potion') {
    if (currentMode === 'teamwork') {
      // Can buy if: target is at less than full HP, OR any teammate is downed/permaDead
      const anyDowned = players.some(pp => pp.downed || pp.permaDead);
      return tgt.hp < tgt.maxHp || anyDowned;
    }
    return tgt.hp < tgt.maxHp; // solo: acts as full heal
  }
  return true;
}

function applyShopItem(item, p) {
  const tgt = p || player;
  if (item.weaponTier !== undefined) {
    tgt.weaponTier = item.weaponTier;
    const wd = getWeaponData(tgt.weaponTier);
    tgt.weapon = wd.name;
    tgt.weaponDamage = wd.damage;
    tgt.weaponUpgradeLevel = 0;
  } else if (item.name === 'Health Potion') {
    tgt.hp = Math.min(tgt.hp + 15, tgt.maxHp);
  } else if (item.name === 'Revive Potion') {
    if (currentMode === 'teamwork') {
      // Revive the first downed/permaDead teammate, or full heal self
      const deadAlly = players.find(pp => pp !== tgt && (pp.downed || pp.permaDead));
      if (deadAlly) {
        deadAlly.permaDead = false;
        deadAlly.downed = false;
        deadAlly.alive = true;
        deadAlly.hp = deadAlly.maxHp;
        deadAlly.downTimer = 0;
        deadAlly.reviveProgress = 0;
        deadAlly.invincible = 2.0;
        spawnParticles(deadAlly.x, deadAlly.y, '#44ff88', 20, 3);
      } else {
        tgt.hp = tgt.maxHp; // full heal self if no one to revive
      }
    } else {
      tgt.hp = tgt.maxHp; // solo: full heal
    }
  }
}

// --- Effects ---
function spawnParticles(x, y, color, n, spd = 2.5) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = spd * (0.5 + Math.random());
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1, life: 1, size: 2 + Math.random()*3, color });
  }
}
function addText(x, y, text, color) {
  floatingTexts.push({ x, y, vy: -1.3, text, color, life: 1.4 });
}

// --- Main Loop ---
let lastT = 0;
function gameLoop(t) {
  const dt = Math.min((t - lastT) / 1000, 0.05);
  lastT = t;
  update(dt);
  draw();
  mouseClicked = false;
  requestAnimationFrame(gameLoop);
}

function formatTime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  return h > 0 ? `${h}:${m < 10 ? '0' : ''}${m}:${sec < 10 ? '0' : ''}${sec}` : `${m}:${sec < 10 ? '0' : ''}${sec}`;
}

function update(dt) {
  // Admin mode: infinite coins
  if (adminMode) coins = 999999;
  // Track play time during active gameplay
  if (gameState === 'playing' || gameState === 'upgrade' || gameState === 'shop') playTime += dt;
  // Always update particles/texts
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= dt * 2.2;
    return p.life > 0;
  });
  floatingTexts = floatingTexts.filter(t => { t.y += t.vy; t.life -= dt; return t.life > 0; });
  if (bannerTimer > 0) bannerTimer -= dt;
  if (saveFlashTimer > 0) saveFlashTimer -= dt;
  if (achPopup) { achPopup.timer -= dt; if (achPopup.timer <= 0) achPopup = null; }
  if (postBossTimer > 0) {
    postBossTimer -= dt;
    if (postBossTimer <= 0 && postBossCallback) { const cb = postBossCallback; postBossCallback = null; cb(); }
  }
  shockwaves = shockwaves.filter(s => {
    s.radius += 200 * dt; s.life -= dt * 2.5;
    return s.life > 0;
  });
  lightningEffects = lightningEffects.filter(l => { l.life -= dt * 3; return l.life > 0; });
  deathAnims = deathAnims.filter(d => { d.timer += dt; return d.timer < d.duration; });
  if (screenShake > 0) screenShake -= dt;
  // Update boss projectiles
  bossProjectiles = bossProjectiles.filter(b => {
    b.x += b.vx; b.y += b.vy; b.life -= dt;
    // Out of room bounds
    if (b.x < ROOM.x - 10 || b.x > ROOM.x + ROOM.w + 10 || b.y < ROOM.y - 10 || b.y > ROOM.y + ROOM.h + 10) return false;
    // Hit players
    if (currentMode === 'teamwork') {
      for (const p of players) {
        if (p.permaDead || p.downed || !p.alive || p.hp <= 0 || p.invincible > 0) continue;
        if (Math.hypot(b.x - p.x, b.y - p.y) < 16) {
          p.hp = Math.max(0, p.hp - b.dmg);
          p.invincible = 0.5;
          addText(p.x, p.y - 36, `-${b.dmg}`, '#ff4400');
          spawnParticles(p.x, p.y - 8, b.color, 4, 1.5);
          return false;
        }
      }
    } else {
      if (player.invincible <= 0 && Math.hypot(b.x - player.x, b.y - player.y) < 16) {
        player.hp = Math.max(0, player.hp - b.dmg);
        player.invincible = 0.5;
        addText(player.x, player.y - 36, `-${b.dmg}`, '#ff4400');
        spawnParticles(player.x, player.y - 8, b.color, 4, 1.5);
        return false;
      }
    }
    return b.life > 0;
  });

  // Update ground coins
  groundCoins = groundCoins.filter(c => {
    c.life -= dt;
    if (c.settling > 0) {
      c.settling -= dt;
      c.x += c.vx; c.y += c.vy;
      c.vy += 4 * dt; // gravity
      c.vx *= 0.95;
      // Keep in room bounds
      c.x = Math.max(ROOM.x + 5, Math.min(ROOM.x + ROOM.w - 5, c.x));
      c.y = Math.max(ROOM.y + 5, Math.min(ROOM.y + ROOM.h - 5, c.y));
    }
    // Pickup by players
    if (gameState === 'playing') {
      const pickupDist = 22;
      if (currentMode === 'teamwork') {
        for (const p of players) {
          if (p.permaDead || p.downed || !p.alive || p.hp <= 0) continue;
          if (Math.hypot(c.x - p.x, c.y - p.y) < pickupDist) {
            coins += c.value;
            addText(p.x, p.y - 30, `+${c.value}🪙`, '#FFD700');
            return false;
          }
        }
      } else {
        if (Math.hypot(c.x - player.x, c.y - player.y) < pickupDist) {
          coins += c.value;
          addText(player.x, player.y - 30, `+${c.value}🪙`, '#FFD700');
          return false;
        }
      }
    }
    return c.life > 0;
  });

  if (gameState === 'start') {
    if (mouseClicked) {
      const hs = hasSaveGame();
      const off = hs ? 0 : -44;
      function hitBtn(y) { return mouse.x >= W/2-110 && mouse.x <= W/2+110 && mouse.y >= y && mouse.y <= y+36; }
      if (hs && hitBtn(346)) {
        loadGame(); deleteSave();
      }
      if (hitBtn(390 + off)) {
        currentMode = 'endless'; deleteSave(); resetGame();
      }
      if (hitBtn(434 + off)) {
        currentMode = 'story'; storyChapter = 1; storyChapterStartLevel = 1;
        deleteSave(); resetGame(); initStoryIntro();
      }
      if (hitBtn(478 + off)) {
        teamPlayerCount = 2; currentMode = 'teamwork'; deleteSave(); resetGame();
      }
      if (hitBtn(522 + off)) {
        gameState = 'achievements';
      }
      if (hitBtn(566 + off)) {
        lbPrevState = 'start'; gameState = 'leaderboard';
      }
      if (hitBtn(610 + off)) {
        adminCode = ''; gameState = 'adminCode';
      }
    }
    return;
  }
  if (gameState === 'adminCode') {
    if (mouseClicked) {
      // Back button
      if (mouse.x >= W/2-70 && mouse.x <= W/2+70 && mouse.y >= H-54 && mouse.y <= H-18) {
        gameState = 'start';
      }
    }
    return;
  }
  if (gameState === 'adminPanel') {
    if (mouseClicked) {
      // Back button
      if (mouse.x >= W/2-70 && mouse.x <= W/2+70 && mouse.y >= H-54 && mouse.y <= H-18) {
        gameState = 'start';
      }
      // Level input box
      if (mouse.x >= W/2-80 && mouse.x <= W/2+80 && mouse.y >= 170 && mouse.y <= 206) {
        adminField = 'level';
      } else if (adminField === 'level') {
        adminField = 'none';
      }
      // Weapon buttons
      for (let i = 0; i < WEAPONS.length; i++) {
        const bx = 60 + (i % 4) * 175, by = 260 + Math.floor(i / 4) * 60, bw = 160, bh = 48;
        if (mouse.x >= bx && mouse.x <= bx+bw && mouse.y >= by && mouse.y <= by+bh) {
          adminWeapon = i;
        }
      }
      // START button
      if (mouse.x >= W/2-90 && mouse.x <= W/2+90 && mouse.y >= 460 && mouse.y <= 500) {
        const lvl = Math.max(1, parseInt(adminLevel) || 1);
        adminMode = true;
        currentMode = 'endless';
        deleteSave();
        resetGame();
        coins = 999999;
        level = lvl;
        player.weaponTier = adminWeapon;
        const wd = getWeaponData(adminWeapon);
        player.weapon = wd.name;
        player.weaponDamage = wd.damage;
        initLevel();
        gameState = 'playing';
        bannerText = `LEVEL ${level}`;
        subBannerText = 'ADMIN MODE';
        bannerTimer = 2.5;
      }
    }
    return;
  }
  if (gameState === 'achievements') {
    if (mouseClicked) {
      if (mouse.x >= W/2-70 && mouse.x <= W/2+70 && mouse.y >= H-54 && mouse.y <= H-18) {
        gameState = 'start';
      }
    }
    return;
  }
  if (gameState === 'nameEntry') {
    if (mouseClicked) {
      // Submit button
      if (mouse.x >= W/2-80 && mouse.x <= W/2+80 && mouse.y >= 370 && mouse.y <= 406) {
        if (pendingName.trim() === '') pendingName = 'Anonymous';
        lastEndlessRank = submitScore(pendingScoreLevel, pendingScoreCoins, pendingScoreWeapon, pendingName.trim());
        gameState = 'dead';
      }
      // Nevermind button
      if (mouse.x >= W/2-80 && mouse.x <= W/2+80 && mouse.y >= 450 && mouse.y <= 486) {
        lastEndlessRank = 0;
        gameState = 'dead';
      }
    }
    return;
  }
  if (gameState === 'leaderboard') {
    if (mouseClicked) {
      // Delete buttons
      const lb = loadLeaderboard();
      for (let i = 0; i < lb.length; i++) {
        const ry = 150 + i * 42;
        const delX = W - 100, delY = ry - 10, delW = 22, delH = 22;
        if (mouse.x >= delX && mouse.x <= delX + delW && mouse.y >= delY && mouse.y <= delY + delH) {
          lb.splice(i, 1);
          saveLeaderboard(lb);
          break;
        }
      }
      // Back button
      if (mouse.x >= W/2-70 && mouse.x <= W/2+70 && mouse.y >= H-54 && mouse.y <= H-18) {
        gameState = lbPrevState;
      }
    }
    return;
  }
  if (gameState === 'dead') {
    if (currentMode === 'teamwork') {
      if (mouseClicked) {
        const btnY = 220 + players.length * 50;
        const paBtn = { x: W/2 - 150, y: btnY, w: 140, h: 40 };
        const exBtn = { x: W/2 + 10, y: btnY, w: 140, h: 40 };
        if (mouse.x >= paBtn.x && mouse.x <= paBtn.x + paBtn.w && mouse.y >= paBtn.y && mouse.y <= paBtn.y + paBtn.h) {
          resetGame();
        } else if (mouse.x >= exBtn.x && mouse.x <= exBtn.x + exBtn.w && mouse.y >= exBtn.y && mouse.y <= exBtn.y + exBtn.h) {
          gameState = 'start';
        }
      }
      return;
    }
    if (currentMode === 'story') {
      if (mouseClicked || keys[' ']) {
        keys[' '] = false;
        retryChapter();
      }
    } else {
      const panY = 108, panH = 390;
      const paBtn = { x: W/2 - 150, y: panY + panH + 6, w: 140, h: 34 };
      const exBtn = { x: W/2 + 10, y: panY + panH + 6, w: 140, h: 34 };
      if (mouseClicked) {
        if (mouse.x >= paBtn.x && mouse.x <= paBtn.x + paBtn.w && mouse.y >= paBtn.y && mouse.y <= paBtn.y + paBtn.h) {
          resetGame();
        } else if (mouse.x >= exBtn.x && mouse.x <= exBtn.x + exBtn.w && mouse.y >= exBtn.y && mouse.y <= exBtn.y + exBtn.h) {
          gameState = 'start';
        }
      }
      if (keys[' ']) { keys[' '] = false; resetGame(); }
    }
    return;
  }
  if (gameState === 'storyIntro') { updateStoryIntro(dt); return; }
  if (gameState === 'cutscene') { updateCutscene(dt); return; }
  if (gameState === 'credits') {
    creditsTimer += dt;
    if (mouseClicked || keys[' ']) { keys[' '] = false; gameState = 'start'; }
    return;
  }

  if (gameState === 'paused') {
    if (mouseClicked) {
      const yOff = adminMode ? -100 : 0;
      // Continue button
      const cx = W/2 - 90, cy = H/2 + 20 + yOff, cw = 180, ch = 44;
      if (mouse.x >= cx && mouse.x <= cx+cw && mouse.y >= cy && mouse.y <= cy+ch) {
        gameState = prevGameState;
      }
      // Shop button
      const sx = W/2 - 90, sy = H/2 + 80 + yOff, sw = 180, sh = 44;
      if (mouse.x >= sx && mouse.x <= sx+sw && mouse.y >= sy && mouse.y <= sy+sh) {
        gameState = 'shop';
      }
      // Admin upgrade buttons
      if (adminMode) {
        for (let i = 0; i < 5; i++) {
          const ubx = 55 + i * 142, uby = sy + 95, ubw = 130, ubh = 34;
          if (!statCapped(i, player) && mouse.x >= ubx && mouse.x <= ubx+ubw && mouse.y >= uby && mouse.y <= uby+ubh) {
            applyUpgrade(i, player);
          }
        }
      }
      // Save button
      const svy = adminMode ? sy + 150 : H/2 + 150 + yOff;
      const svx = W/2 - 90, svw = 180, svh = 40;
      if (mouse.x >= svx && mouse.x <= svx+svw && mouse.y >= svy && mouse.y <= svy+svh) {
        saveGame();
      }
      // Exit to Menu button
      const ex = W/2 - 90, ey = svy + 60, ew = 180, eh = 40;
      if (mouse.x >= ex && mouse.x <= ex+ew && mouse.y >= ey && mouse.y <= ey+eh) {
        gameState = 'start';
      }
    }
    return;
  }

  if (gameState === 'shop') {
    const shopTarget = (currentMode === 'teamwork') ? players[teamShopPlayer] : player;
    if (mouseClicked) {
      // Back button
      if (mouse.x >= W/2-60 && mouse.x <= W/2+60 && mouse.y >= H-40 && mouse.y <= H-10) {
        gameState = 'paused';
      } else if (currentMode === 'teamwork') {
        // Player switcher tabs
        for (let pi = 0; pi < players.length; pi++) {
          const tw = 80, tx = 60 + pi * (tw + 8), ty = 100;
          if (mouse.x >= tx && mouse.x <= tx + tw && mouse.y >= ty && mouse.y <= ty + 24) {
            teamShopPlayer = pi;
          }
        }
      }
      if (!(mouse.x >= W/2-60 && mouse.x <= W/2+60 && mouse.y >= H-40 && mouse.y <= H-10)) {
        // Weapon upgrade bar
        const upCost = WEAPON_UPGRADE_COSTS[shopTarget.weaponUpgradeLevel];
        const canUpgrade = shopTarget.weaponUpgradeLevel < 5;
        if (canUpgrade && mouse.x >= 60 && mouse.x <= W-60 && mouse.y >= 518 && mouse.y <= 562) {
          if (coins >= upCost) {
            coins -= upCost;
            shopTarget.weaponUpgradeLevel++;
            shopTarget.weaponDamage += 3;
          }
        } else {
          // Shop items (compact grid)
          for (let i = 0; i < SHOP_ITEMS.length; i++) {
            const col = i % 3, row = Math.floor(i / 3);
            const bx = 60 + col * 230, by = 148 + row * 125, bw = 210, bh = 110;
            if (mouse.x >= bx && mouse.x <= bx+bw && mouse.y >= by && mouse.y <= by+bh) {
              const item = SHOP_ITEMS[i];
              if (coins >= item.cost && canBuyItem(item, shopTarget)) {
                coins -= item.cost;
                applyShopItem(item, shopTarget);
              }
              break;
            }
          }
        }
      }
    }
    return;
  }

  // Pause button click (bottom center)
  if (mouseClicked && (gameState === 'playing' || gameState === 'upgrade')) {
    const pbw = 140, pbh = 28, pbx = W/2 - pbw/2, pby = H - pbh - 8;
    if (mouse.x >= pbx && mouse.x <= pbx+pbw && mouse.y >= pby && mouse.y <= pby+pbh) {
      prevGameState = gameState;
      gameState = 'paused';
    }
  }

  if (gameState === 'upgrade') {
    if (mouseClicked) {
      const upgradePlayer = (currentMode === 'teamwork' && teamUpgradeQueue.length > 0)
        ? players[teamUpgradeQueue[0]] : player;
      for (let i = 0; i < 5; i++) {
        const bx = 10 + i * 156, by = 235, bw = 148, bh = 170;
        if (!statCapped(i, upgradePlayer) && mouse.x >= bx && mouse.x <= bx+bw && mouse.y >= by && mouse.y <= by+bh) {
          applyUpgrade(i, upgradePlayer);
          if (currentMode === 'teamwork') {
            teamUpgradeQueue.shift();
            if (teamUpgradeQueue.length > 0) {
              // Next player picks
              break;
            }
          }
          gameState = 'playing';
          initLevel();
          bannerText = `LEVEL ${level}`;
          subBannerText = '';
          bannerTimer = 2.5;
          break;
        }
      }
    }
    return;
  }

  // --- Playing ---
  if (currentMode === 'teamwork') {
    players.forEach((p, idx) => {
      if (p.permaDead) return;
      if (p.alive && !p.downed && p.hp > 0) {
        updateTeamPlayer(p, idx, dt);
        // Check if this player is near a downed teammate and holding attack key
        const cfg = PLAYER_KEY_CONFIGS[idx];
        const holdingRevive = cfg.attack.some(k => keys[k]);
        if (holdingRevive) {
          const downed = getDownedPlayers();
          for (const d of downed) {
            if (d === p) continue;
            const dist = Math.hypot(d.x - p.x, d.y - p.y);
            if (dist < 50) {
              d.reviveProgress += dt;
              // Show revive particles
              if (Math.random() < 0.3) spawnParticles(d.x, d.y - 10, '#44ff88', 1, 0.8);
              if (d.reviveProgress >= REVIVE_TIME) {
                d.downed = false;
                d.alive = true;
                d.hp = Math.max(1, Math.floor(d.maxHp * 0.3));
                d.invincible = 2.0;
                d.downTimer = 0;
                d.reviveProgress = 0;
                spawnParticles(d.x, d.y, '#44ff88', 20, 3);
                addText(d.x, d.y - 30, `${PLAYER_COLORS[d.playerIndex].name} REVIVED!`, '#44ff88');
              }
              break; // only revive one at a time
            }
          }
        }
      } else if (p.alive && !p.downed && p.hp <= 0) {
        // Player just went down
        spawnDeathAnim(p, true, PLAYER_COLORS[idx]);
        p.downed = true;
        p.downTimer = DOWN_TIMEOUT;
        p.reviveProgress = 0;
        spawnParticles(p.x, p.y, '#ff0000', 12, 2);
        addText(p.x, p.y - 30, `${PLAYER_COLORS[idx].name} DOWN! Revive them!`, '#ff4444');
      } else if (p.downed && !p.permaDead) {
        // Countdown to permanent death
        p.downTimer -= dt;
        // Decay revive progress if nobody is actively reviving
        let beingRevived = false;
        players.forEach((other, oi) => {
          if (oi === idx || other.permaDead || other.downed || !other.alive || other.hp <= 0) return;
          const cfg = PLAYER_KEY_CONFIGS[oi];
          const holding = cfg.attack.some(k => keys[k]);
          if (holding && Math.hypot(p.x - other.x, p.y - other.y) < 50) beingRevived = true;
        });
        if (!beingRevived) p.reviveProgress = Math.max(0, p.reviveProgress - dt * 0.5);
        if (p.downTimer <= 0) {
          p.permaDead = true;
          p.alive = false;
          p.downed = false;
          spawnParticles(p.x, p.y, '#440000', 20, 2);
          addText(p.x, p.y - 30, `${PLAYER_COLORS[idx].name} LOST!`, '#880000');
        }
      }
    });
  } else {
    updatePlayer(dt);
  }
  updateMonsters(dt);
  if (currentMode === 'teamwork') {
    const allDead = players.every(p => p.permaDead || (p.downed && p.downTimer <= 0) || (!p.alive && p.hp <= 0));
    if (allDead) {
      gameState = 'dead';
      return;
    }
  } else if (player.hp <= 0 && gameState === 'playing') {
    spawnDeathAnim(player, true, PLAYER_COLORS[0]);
    if (currentMode === 'endless') {
      pendingScoreLevel = level; pendingScoreCoins = coins; pendingScoreWeapon = player.weapon;
      pendingName = '';
      gameState = 'nameEntry';
    } else {
      gameState = 'dead';
    }
    return;
  }

  if (monsters.length === 0) {
    const done = level;
    level++;
    if ((currentMode === 'endless' || currentMode === 'teamwork') && level > achStats.endlessLevel) {
      achStats.endlessLevel = level; checkAchievements();
    }
    // Vampire life steal on level clear
    if (currentMode === 'teamwork') {
      players.forEach(p => {
        if (p.alive && !p.downed && p.vampireSteal > 0) {
          const heal = p.vampireSteal;
          p.hp = Math.min(p.hp + heal, p.maxHp);
          addText(p.x, p.y - 30, `+${heal} 🧛`, '#ff44aa');
        }
      });
    } else if (player.vampireSteal > 0) {
      const heal = player.vampireSteal;
      player.hp = Math.min(player.hp + heal, player.maxHp);
      addText(player.x, player.y - 30, `+${heal} 🧛`, '#ff44aa');
    }

    if (currentMode === 'story') {
      if (done % 10 === 0) {
        // Chapter boss
        const chIdx = done / 10 - 1;
        player.x = W/2; player.y = H/2;
        player.attackCooldown = 0; player.isAttacking = false; player.invincible = 0;
        particles = []; shockwaves = []; lightningEffects = []; deathAnims = [];
        spawnStoryBoss(chIdx);
        gameState = 'playing';
        bannerText = '⚠ CHAPTER BOSS ⚠';
        subBannerText = monsters[0].bossName;
        bannerTimer = 3;
      } else if (done % 5 === 0) {
        gameState = 'upgrade';
      } else {
        initLevel();
        gameState = 'playing';
        bannerText = `LEVEL ${level}`;
        subBannerText = '';
        bannerTimer = 2.5;
      }
    } else if (currentMode === 'teamwork') {
      // Teamwork endless mode
      if (done % 20 === 0) {
        // Boss fight — reset alive player positions
        players.forEach((p, i) => {
          if (p.alive) { p.attackCooldown = 0; p.isAttacking = false; p.invincible = 0; }
        });
        particles = []; shockwaves = []; lightningEffects = []; deathAnims = [];
        spawnBoss();
        // Downed players stay down — teammate must revive them
        gameState = 'playing';
        bannerText = '⚠ BOSS FIGHT ⚠';
        subBannerText = monsters[0].bossName;
        bannerTimer = 3;
      } else if (done % 5 === 0) {
        // All non-permaDead players get upgrade picks
        teamUpgradeQueue = [];
        for (let i = 0; i < players.length; i++) { if (!players[i].permaDead) teamUpgradeQueue.push(i); }
        gameState = 'upgrade';
      } else {
        initLevel();
        gameState = 'playing';
        bannerText = `LEVEL ${level}`;
        subBannerText = '';
        bannerTimer = 2.5;
      }
    } else {
      // Endless mode
      if (done % 20 === 0) {
        player.x = W/2; player.y = H/2;
        player.attackCooldown = 0; player.isAttacking = false; player.invincible = 0;
        particles = []; shockwaves = []; lightningEffects = []; deathAnims = [];
        spawnBoss();
        gameState = 'playing';
        bannerText = '⚠ BOSS FIGHT ⚠';
        subBannerText = monsters[0].bossName;
        bannerTimer = 3;
      } else if (done % 5 === 0) {
        gameState = 'upgrade';
      } else {
        initLevel();
        gameState = 'playing';
        bannerText = `LEVEL ${level}`;
        subBannerText = '';
        bannerTimer = 2.5;
      }
    }
  }
}

function updatePlayer(dt) {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['W'] || keys['ArrowUp'])    dy -= 1;
  if (keys['s'] || keys['S'] || keys['ArrowDown'])   dy += 1;
  if (keys['a'] || keys['A'] || keys['ArrowLeft'])   dx -= 1;
  if (keys['d'] || keys['D'] || keys['ArrowRight'])  dx += 1;
  // Mobile touch joystick
  if (touchMoveId !== null) { dx += touchMoveDir.x; dy += touchMoveDir.y; }
  const mag = Math.hypot(dx, dy);
  if (mag > 1) { dx /= mag; dy /= mag; }

  player.x = Math.max(ROOM.x + player.w/2, Math.min(ROOM.x + ROOM.w - player.w/2, player.x + dx * player.speed));
  player.y = Math.max(ROOM.y + player.h/2, Math.min(ROOM.y + ROOM.h - player.h/2, player.y + dy * player.speed));

  player.facing = mouse.x >= player.x ? 1 : -1;

  if (player.attackCooldown > 0) player.attackCooldown -= dt;
  if (player.attackTimer > 0) { player.attackTimer -= dt; if (player.attackTimer <= 0) player.isAttacking = false; }
  if (player.invincible > 0) player.invincible -= dt;

  // Find nearest monster for auto-aim
  let nearest = null, nearestDist = Infinity;
  monsters.forEach(m => {
    const d = Math.hypot(m.x - player.x, m.y - player.y);
    if (d < nearestDist) { nearestDist = d; nearest = m; }
  });

  // Manual attack: spacebar only, rate limited by cooldown
  const wd = getWeaponData(player.weaponTier);
  const hitRange = player.attackRange + wd.length * 0.5;
  const shouldAttack = keys[' '] && player.attackCooldown <= 0 && monsters.length > 0;

  if (shouldAttack) {
    // Aim toward nearest monster
    if (nearest) {
      player.attackAngle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
      player.facing = nearest.x >= player.x ? 1 : -1;
    } else {
      player.attackAngle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    }
    player.isAttacking = true;
    player.attackTimer = 0.18;
    player.attackCooldown = 1 / player.attackSpeed;

    // Full 360° circle hitbox — hits ALL monsters within range
    const hitAbility = wd.ability;
    const hitColor = wd.glow || '#cc2200';
    let chainTargets = [];
    monsters = monsters.filter(m => {
      const dist = Math.hypot(m.x - player.x, m.y - player.y);
      if (dist > hitRange) return true;
      return applyHit(m, player.damage, hitAbility, hitColor, chainTargets);
    });
    // Chain lightning — jump to 2 nearby monsters
    if (hitAbility === 'chain' && chainTargets.length > 0) {
      chainTargets.forEach(origin => {
        let chained = 0;
        monsters.forEach(m2 => {
          if (chained >= 2) return;
          const d2 = Math.hypot(m2.x - origin.x, m2.y - origin.y);
          if (d2 < 160) {
            lightningEffects.push({ x1: origin.x, y1: origin.y, x2: m2.x, y2: m2.y, life: 0.25 });
            spawnParticles(m2.x, m2.y, '#ffff44', 4, 2);
            m2.hp -= Math.floor(player.damage * 0.5);
            addText(m2.x, m2.y - 20, `-${Math.floor(player.damage*0.5)}⚡`, '#ffff44');
            chained++;
          }
        });
      });
      monsters = monsters.filter(m => m.hp > 0 || (() => {
        spawnDeathAnim(m);
        spawnParticles(m.x, m.y, '#8B0000', 10);
        const drop = 2 + Math.floor(Math.random()*4) + Math.floor(level/4);
        spawnGroundCoins(m.x, m.y, drop);
        return false;
      })());
    }
    // Shockwave ring visual
    if (hitAbility === 'shockwave') {
      shockwaves.push({ x: player.x, y: player.y, radius: 20, maxRadius: hitRange + 30, life: 1 });
    }
  }
}

function updateTeamPlayer(p, idx, dt) {
  const kc = PLAYER_KEY_CONFIGS[idx];
  let dx = 0, dy = 0;
  if (kc.up.some(k => keys[k]))    dy -= 1;
  if (kc.down.some(k => keys[k]))  dy += 1;
  if (kc.left.some(k => keys[k]))  dx -= 1;
  if (kc.right.some(k => keys[k])) dx += 1;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }

  p.x = Math.max(ROOM.x + p.w/2, Math.min(ROOM.x + ROOM.w - p.w/2, p.x + dx * p.speed));
  p.y = Math.max(ROOM.y + p.h/2, Math.min(ROOM.y + ROOM.h - p.h/2, p.y + dy * p.speed));

  // Face toward nearest monster
  let nearest = null, nearestDist = Infinity;
  monsters.forEach(m => {
    const d = Math.hypot(m.x - p.x, m.y - p.y);
    if (d < nearestDist) { nearestDist = d; nearest = m; }
  });
  if (nearest) p.facing = nearest.x >= p.x ? 1 : -1;
  else if (dx !== 0) p.facing = dx > 0 ? 1 : -1;

  if (p.attackCooldown > 0) p.attackCooldown -= dt;
  if (p.attackTimer > 0) { p.attackTimer -= dt; if (p.attackTimer <= 0) p.isAttacking = false; }
  if (p.invincible > 0) p.invincible -= dt;

  const wd = getWeaponData(p.weaponTier);
  const hitRange = p.attackRange + wd.length * 0.5;
  const shouldAttack = kc.attack.some(k => keys[k]) && p.attackCooldown <= 0 && monsters.length > 0;

  if (shouldAttack) {
    if (nearest) {
      p.attackAngle = Math.atan2(nearest.y - p.y, nearest.x - p.x);
      p.facing = nearest.x >= p.x ? 1 : -1;
    }
    p.isAttacking = true;
    p.attackTimer = 0.18;
    p.attackCooldown = 1 / p.attackSpeed;

    const hitAbility = wd.ability;
    const hitColor = wd.glow || '#cc2200';
    let chainTargets = [];
    monsters = monsters.filter(m => {
      const dist = Math.hypot(m.x - p.x, m.y - p.y);
      if (dist > hitRange) return true;
      return applyHitTeam(m, p, hitAbility, hitColor, chainTargets);
    });
    if (hitAbility === 'chain' && chainTargets.length > 0) {
      chainTargets.forEach(origin => {
        let chained = 0;
        monsters.forEach(m2 => {
          if (chained >= 2) return;
          const d2 = Math.hypot(m2.x - origin.x, m2.y - origin.y);
          if (d2 < 160) {
            lightningEffects.push({ x1: origin.x, y1: origin.y, x2: m2.x, y2: m2.y, life: 0.25 });
            spawnParticles(m2.x, m2.y, '#ffff44', 4, 2);
            m2.hp -= Math.floor(p.damage * 0.5);
            addText(m2.x, m2.y - 20, `-${Math.floor(p.damage*0.5)}`, '#ffff44');
            chained++;
          }
        });
      });
      monsters = monsters.filter(m => m.hp > 0 || (() => {
        spawnDeathAnim(m);
        spawnParticles(m.x, m.y, '#8B0000', 10);
        const drop = 2 + Math.floor(Math.random()*4) + Math.floor(level/4);
        spawnGroundCoins(m.x, m.y, drop);
        return false;
      })());
    }
    if (hitAbility === 'shockwave') {
      shockwaves.push({ x: p.x, y: p.y, radius: 20, maxRadius: hitRange + 30, life: 1 });
    }
  }
}

function applyHitTeam(m, attacker, ability, color, chainTargets) {
  m.hp -= attacker.damage;
  spawnParticles(m.x, m.y - 5, color, 5);
  addText(m.x, m.y - 26, `-${attacker.damage}`, '#ff7777');
  if (ability === 'burn')      { m.burnTimer  = 2.5; spawnParticles(m.x, m.y, '#FF4400', 6, 1.5); }
  if (ability === 'slow')      { m.slowTimer  = 3.0; m.slowMult = 0.35; spawnParticles(m.x, m.y, '#88DDFF', 6, 1.5); }
  if (ability === 'poison')    { m.poisonTimer = 4.5; spawnParticles(m.x, m.y, '#44FF44', 6, 1.5); }
  if (ability === 'knockback') {
    const dx = m.x - attacker.x, dy = m.y - attacker.y;
    const d = Math.hypot(dx, dy) || 1;
    m.kbVx = (dx/d) * 6; m.kbVy = (dy/d) * 6;
    spawnParticles(m.x, m.y, '#aaaaaa', 8, 4);
  }
  if (ability === 'chain') chainTargets.push({ x: m.x, y: m.y });
  if (m.hp <= 0) {
    spawnDeathAnim(m);
    spawnParticles(m.x, m.y, '#8B0000', m.isBoss ? 30 : 10);
    spawnParticles(m.x, m.y, '#ff3300', m.isBoss ? 20 : 5, 3.5);
    const drop = m.isBoss
      ? 60 + Math.floor(level * 2)
      : 2 + Math.floor(Math.random()*4) + Math.floor(level/4);
    spawnGroundCoins(m.x, m.y, drop);
    if (!m.isBoss) { achStats.kills++; checkAchievements(); }
    if (m.isBoss && !m.isStoryBoss) {
      bannerText = '★ BOSS DEFEATED ★';
      subBannerText = `+${drop} coins!`;
      bannerTimer = 3;
    }
    return false;
  }
  return true;
}

function applyHit(m, dmg, ability, color, chainTargets) {
  m.hp -= dmg;
  spawnParticles(m.x, m.y - 5, color, 5);
  addText(m.x, m.y - 26, `-${dmg}`, '#ff7777');
  if (ability === 'burn')      { m.burnTimer  = 2.5; spawnParticles(m.x, m.y, '#FF4400', 6, 1.5); }
  if (ability === 'slow')      { m.slowTimer  = 3.0; m.slowMult = 0.35; spawnParticles(m.x, m.y, '#88DDFF', 6, 1.5); }
  if (ability === 'poison')    { m.poisonTimer = 4.5; spawnParticles(m.x, m.y, '#44FF44', 6, 1.5); }
  if (ability === 'knockback') {
    const dx = m.x - player.x, dy = m.y - player.y;
    const d = Math.hypot(dx, dy) || 1;
    m.kbVx = (dx/d) * 6; m.kbVy = (dy/d) * 6;
    spawnParticles(m.x, m.y, '#aaaaaa', 8, 4);
  }
  if (ability === 'chain') chainTargets.push({ x: m.x, y: m.y });
  if (m.hp <= 0) {
    spawnDeathAnim(m);
    spawnParticles(m.x, m.y, '#8B0000', m.isBoss ? 30 : 10);
    spawnParticles(m.x, m.y, '#ff3300', m.isBoss ? 20 : 5, 3.5);
    const drop = m.isBoss
      ? 60 + Math.floor(level * 2)
      : 2 + Math.floor(Math.random()*4) + Math.floor(level/4);
    spawnGroundCoins(m.x, m.y, drop);
    if (!m.isBoss) { achStats.kills++; checkAchievements(); }
    if (m.isBoss) {
      if (m.isStoryBoss) {
        const chIdx = m.storyBossIdx;
        const isLast = chIdx === 9;
        bannerText = isLast ? '★ VICTORY ★' : '★ CHAPTER COMPLETE ★';
        subBannerText = `+${drop} coins!`;
        bannerTimer = 3;
        postBossTimer = 3.2;
        postBossCallback = () => {
          startCutscene(STORY_OUTRO[chIdx], () => {
            if (isLast) {
              gameState = 'credits'; creditsTimer = 0;
              achStats.storyBeaten = true; checkAchievements();
            } else {
              storyChapter = chIdx + 2;
              storyChapterStartLevel = level;
              startCutscene(STORY_INTRO[chIdx + 1], () => {
                initLevel();
                gameState = 'playing';
                bannerText = `CHAPTER ${storyChapter}`;
                subBannerText = STORY_CHAPTERS[chIdx + 1].name;
                bannerTimer = 3;
              }, chIdx + 1);
            }
          }, chIdx);
        };
      } else {
        bannerText = '★ BOSS DEFEATED ★';
        subBannerText = `+${drop} coins!`;
        bannerTimer = 3;
      }
    }
    return false;
  }
  return true;
}

function updateMonsters(dt) {
  monsters = monsters.filter(m => {
    // Status effects
    if (m.burnTimer > 0) {
      m.burnTimer -= dt; m.burnTick -= dt;
      if (m.burnTick <= 0) { m.burnTick = 0.5; m.hp -= 2; spawnParticles(m.x, m.y-8, '#FF4400', 2, 1); }
    }
    if (m.poisonTimer > 0) {
      m.poisonTimer -= dt; m.poisonTick -= dt;
      if (m.poisonTick <= 0) { m.poisonTick = 0.8; m.hp -= 1; spawnParticles(m.x, m.y-8, '#44FF44', 2, 1); }
    }
    if (m.slowTimer > 0) { m.slowTimer -= dt; m.speed = m.baseSpeed * m.slowMult; }
    else { m.speed = m.baseSpeed; m.slowMult = 1; }
    // Knockback
    if (Math.abs(m.kbVx) > 0.1 || Math.abs(m.kbVy) > 0.1) {
      m.x += m.kbVx; m.y += m.kbVy;
      m.kbVx *= 0.75; m.kbVy *= 0.75;
    }
    // Die from DoT
    if (m.hp <= 0) {
      spawnDeathAnim(m);
      spawnParticles(m.x, m.y, '#8B0000', 8);
      const drop = 2 + Math.floor(Math.random()*4) + Math.floor(level/4);
      spawnGroundCoins(m.x, m.y, drop);
      achStats.kills++; checkAchievements();
      return false;
    }
    // Boss charge attack
    if (m.isBoss) {
      m.chargeTimer -= dt;
      if (m.charging) {
        m.chargeTime -= dt;
        // Charge trail particles
        const trailColor = m.type === 1 ? '#FF2200' : m.type === 0 ? '#cc88ff' : '#44ff44';
        spawnParticles(m.x, m.y, trailColor, 2, 1.5);
        if (m.chargeTime <= 0) {
          m.charging = false; m.speed = m.baseSpeed; m.chargeTimer = 3.5 + Math.random();
          // Slam impact at end of charge
          screenShake = 0.2;
          spawnParticles(m.x, m.y, trailColor, 15, 4);
          shockwaves.push({ x: m.x, y: m.y, radius: 10, maxRadius: 80, life: 0.6 });
        }
      } else if (m.chargeTimer <= 0) {
        m.charging = true; m.chargeTime = 0.7;
        m.speed = m.baseSpeed * 5;
        const chargeColor = m.type === 1 ? '#FF2200' : m.type === 0 ? '#ffffff' : '#44ff44';
        spawnParticles(m.x, m.y, chargeColor, 12, 3);
        screenShake = 0.15;
      }
      // Boss shooting
      m.shootTimer -= dt;
      if (m.shootTimer <= 0 && !m.charging) {
        const tgt = nearestAlivePlayer(m.x, m.y);
        const sdx = tgt.x - m.x, sdy = tgt.y - m.y;
        const sd = Math.hypot(sdx, sdy) || 1;
        const bulletSpeed = 3.5 + level * 0.02;
        const bulletDmg = Math.max(2, Math.floor((m.isBoss ? 5 : 2) + level * 0.15));
        const bulletColor = m.type === 1 ? '#FF4400' : m.type === 0 ? '#bb66ff' : '#88ff44';
        // Fire a burst of 3 shots in a spread
        m.shootBurst++;
        const spread = (m.shootBurst % 2 === 0) ? 0.15 : -0.15;
        const baseAngle = Math.atan2(sdy, sdx);
        for (let s = -1; s <= 1; s++) {
          const a = baseAngle + s * spread;
          bossProjectiles.push({
            x: m.x + (sdx/sd) * 20, y: m.y - 10 + (sdy/sd) * 20,
            vx: Math.cos(a) * bulletSpeed, vy: Math.sin(a) * bulletSpeed,
            dmg: bulletDmg, color: bulletColor, life: 3.0,
          });
        }
        spawnParticles(m.x + (sdx/sd)*20, m.y - 10, bulletColor, 4, 2);
        m.shootTimer = 1.8 + Math.random() * 0.8;
      }
    }
    const target = nearestAlivePlayer(m.x, m.y);
    const dx = target.x - m.x, dy = target.y - m.y;
    const dist = Math.hypot(dx, dy);
    m.wobble += dt * (m.isBoss ? 1.5 : 2.5);
    m.facing = dx >= 0 ? 1 : -1;
    if (dist > (m.isBoss ? 30 : 18)) { m.x += (dx/dist) * m.speed; m.y += (dy/dist) * m.speed; }
    m.x = Math.max(ROOM.x + m.w/2, Math.min(ROOM.x + ROOM.w - m.w/2, m.x));
    m.y = Math.max(ROOM.y + m.h/2, Math.min(ROOM.y + ROOM.h - m.h/2, m.y));
    if (m.atkCooldown > 0) m.atkCooldown -= dt;
    const atkDist = m.isBoss ? 50 : 28;
    const dmgScale = Math.floor(level / 20) * 3;
    const bossDmgScale = Math.floor(level / 20) * 5;
    const atkDmg   = m.isBoss ? 5 + bossDmgScale : 1 + dmgScale;
    // Attack nearest player in range
    if (currentMode === 'teamwork') {
      players.forEach(p => {
        if (!p.alive || p.hp <= 0 || p.invincible > 0) return;
        const pd = Math.hypot(p.x - m.x, p.y - m.y);
        if (pd < atkDist && m.atkCooldown <= 0) {
          p.hp = Math.max(0, p.hp - atkDmg);
          p.invincible = 0.75; m.atkCooldown = m.isBoss ? 1.2 : 1.5;
          addText(p.x, p.y - 36, `-${atkDmg}`, '#ff2200');
          spawnParticles(p.x, p.y - 8, '#ff0000', 3, 1.8);
        }
      });
    } else {
      if (dist < atkDist && m.atkCooldown <= 0 && player.invincible <= 0) {
        player.hp = Math.max(0, player.hp - atkDmg);
        player.invincible = 0.75; m.atkCooldown = m.isBoss ? 1.2 : 1.5;
        addText(player.x, player.y - 36, `-${atkDmg}`, '#ff2200');
        spawnParticles(player.x, player.y - 8, '#ff0000', 3, 1.8);
      }
    }
    return true;
  });
}

// ===================== DRAW =====================

function draw() {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);

  if (gameState === 'start')        { drawStart();        drawAchievementPopup(); return; }
  if (gameState === 'adminCode')    { drawAdminCode();    return; }
  if (gameState === 'adminPanel')   { drawAdminPanel();   return; }
  // teamSelect removed — 2 player only
  if (gameState === 'dead')         { drawDead();         drawAchievementPopup(); return; }
  if (gameState === 'nameEntry')    { drawNameEntry();    return; }
  if (gameState === 'achievements') { drawAchievements(); return; }
  if (gameState === 'leaderboard')  { drawLeaderboard();  return; }
  if (gameState === 'storyIntro')   { drawStoryIntro();   return; }
  if (gameState === 'cutscene')     { drawCutscene();     return; }
  if (gameState === 'credits')      { drawCredits();      drawAchievementPopup(); return; }

  // Screen shake
  if (screenShake > 0) {
    const shakeX = (Math.random() - 0.5) * screenShake * 20;
    const shakeY = (Math.random() - 0.5) * screenShake * 20;
    ctx.save();
    ctx.translate(shakeX, shakeY);
  }
  ctx.drawImage(bgCanvas, 0, 0);
  drawTorch(150, ROOM.y + 6);
  drawTorch(650, ROOM.y + 6);
  drawTorch(150, ROOM.y + ROOM.h - 8);
  drawTorch(650, ROOM.y + ROOM.h - 8);

  // Ground coins
  groundCoins.forEach(c => {
    const bob = Math.sin(Date.now() / 200 + c.bobPhase) * 2;
    ctx.globalAlpha = 1;
    // Coin shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(c.x, c.y + 4, 5, 2, 0, 0, Math.PI * 2); ctx.fill();
    // Coin body
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.ellipse(c.x, c.y + bob, 5, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFF8B0';
    ctx.beginPath(); ctx.ellipse(c.x - 1, c.y + bob - 1, 2, 2, 0, 0, Math.PI * 2); ctx.fill();
    // Value text for large piles
    if (c.value >= 5) {
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
      ctx.fillText(c.value, c.x, c.y + bob - 7);
      ctx.textAlign = 'left';
    }
    ctx.globalAlpha = 1;
  });

  // Death animations (falling/fading corpses)
  deathAnims.forEach(d => {
    const progress = d.timer / d.duration;
    const alpha = 1 - progress;
    const rotation = progress * (Math.PI / 2) * d.facing;
    const dropY = progress * 8;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(d.x, d.y + dropY);
    ctx.rotate(rotation);
    ctx.translate(-d.x, -(d.y + dropY));

    if (d.isPlayer) {
      const fakeP = { x: d.x, y: d.y + dropY, facing: d.facing, invincible: 0, weaponTier: d.weaponTier, isAttacking: false, attackAngle: 0, hp: 1, maxHp: 1, alive: true, downed: false, permaDead: false };
      drawPlayerWithColors(fakeP, d.playerColors);
    } else {
      const fakeM = { x: d.x, y: d.y + dropY, w: d.w, h: d.h, type: d.type, facing: d.facing, isBoss: d.isBoss, wobble: 0, hp: 0, maxHp: 1, isStoryBoss: d.isStoryBoss, storyBossIdx: d.storyBossIdx, bossName: d.bossName, charging: false, burnTimer: 0, slowTimer: 0, poisonTimer: 0, _deathAnim: true };
      drawMonster(fakeM);
    }

    ctx.restore();
  });

  monsters.forEach(m => drawMonster(m));
  if (currentMode === 'teamwork') {
    players.forEach((p, i) => drawPlayerWithColors(p, PLAYER_COLORS[i]));
  } else {
    drawPlayer();
  }

  // Shockwaves
  shockwaves.forEach(s => {
    ctx.globalAlpha = s.life * 0.7;
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;

  // Lightning effects
  lightningEffects.forEach(l => {
    ctx.globalAlpha = l.life;
    ctx.strokeStyle = '#ffff44'; ctx.lineWidth = 2;
    ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 10;
    // Jagged lightning line
    ctx.beginPath();
    ctx.moveTo(l.x1, l.y1);
    const mx = (l.x1+l.x2)/2 + (Math.random()-0.5)*30;
    const my = (l.y1+l.y2)/2 + (Math.random()-0.5)*30;
    ctx.quadraticCurveTo(mx, my, l.x2, l.y2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // Boss projectiles
  bossProjectiles.forEach(b => {
    ctx.shadowColor = b.color; ctx.shadowBlur = 8;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(b.x, b.y, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Floating texts
  floatingTexts.forEach(t => {
    ctx.globalAlpha = Math.min(1, t.life * 1.4);
    ctx.font = 'bold 15px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = t.color;
    ctx.fillText(t.text, t.x, t.y);
  });
  ctx.globalAlpha = 1; ctx.textAlign = 'left';

  // End screen shake
  if (screenShake > 0) ctx.restore();

  drawHUD();
  drawAchievementPopup();

  // Mobile joystick overlay
  if (isMobile && touchMoveOrigin && gameState === 'playing') {
    ctx.globalAlpha = 0.25;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(touchMoveOrigin.x, touchMoveOrigin.y, 40, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(touchMoveOrigin.x + touchMoveDir.x * 30, touchMoveOrigin.y + touchMoveDir.y * 30, 14, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  if (bannerTimer > 0 && gameState === 'playing') {
    const a = Math.min(bannerTimer, 1);
    ctx.globalAlpha = a;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(W/2 - 170, H/2 - 38, 340, subBannerText ? 70 : 52);
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 30px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(bannerText, W/2, H/2);
    if (subBannerText) {
      ctx.fillStyle = '#00CFFF';
      ctx.font = 'bold 14px monospace';
      ctx.fillText(subBannerText, W/2, H/2 + 25);
    }
    ctx.globalAlpha = 1; ctx.textAlign = 'left';
  }

  if (gameState === 'upgrade') drawUpgrade();
  if (gameState === 'paused')  drawPaused();
  if (gameState === 'shop')    drawShop();
}

function drawTorch(x, y) {
  ctx.fillStyle = '#5c3317';
  ctx.fillRect(x - 2, y - 3, 4, 11);
  ctx.fillStyle = '#8B7355';
  ctx.fillRect(x - 5, y - 5, 10, 4);
  const t = Date.now() / 110;
  const fl = Math.sin(t) * 2 + Math.cos(t * 1.7) * 1.5;
  const g = ctx.createRadialGradient(x, y - 15 + fl, 0, x, y - 12, 13);
  g.addColorStop(0,   'rgba(255,220,50,0.95)');
  g.addColorStop(0.4, 'rgba(255,100,0,0.7)');
  g.addColorStop(1,   'rgba(200,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(x, y - 12 + fl/2, 7, 14, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawPlayer() {
  drawPlayerWithColors(player, PLAYER_COLORS[0]);
}

function drawDownedPlayer(p, colors) {
  const x = p.x, y = p.y;
  const pulse = 0.3 + Math.sin(Date.now() / 300) * 0.15;

  // Fallen body (lying flat, semi-transparent)
  ctx.globalAlpha = pulse;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(x, y + 8, 14, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Fallen body shape (horizontal)
  ctx.fillStyle = colors.armor;
  ctx.fillRect(x - 12, y - 2, 24, 8);
  ctx.fillStyle = colors.skin;
  ctx.fillRect(x - 16, y - 1, 5, 6); // head
  ctx.fillStyle = colors.hair;
  ctx.fillRect(x - 16, y - 1, 5, 2);
  ctx.globalAlpha = 1;

  // Timer ring (shows time remaining)
  const pct = Math.max(0, p.downTimer / DOWN_TIMEOUT);
  const ringR = 18;
  // Background ring (dark)
  ctx.strokeStyle = 'rgba(100,0,0,0.5)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(x, y - 4, ringR, 0, Math.PI * 2); ctx.stroke();
  // Remaining time arc (red to yellow based on time left)
  const ringColor = pct > 0.5 ? '#ffaa00' : pct > 0.25 ? '#ff6600' : '#ff2200';
  ctx.strokeStyle = ringColor;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x, y - 4, ringR, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct);
  ctx.stroke();

  // Revive progress bar (green, shows when being revived)
  if (p.reviveProgress > 0) {
    const barW = 30, barH = 4;
    const barX = x - barW / 2, barY = y - 26;
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
    ctx.fillStyle = '#44ff88';
    ctx.fillRect(barX, barY, barW * Math.min(1, p.reviveProgress / REVIVE_TIME), barH);
    ctx.strokeStyle = '#228844'; ctx.lineWidth = 1; ctx.strokeRect(barX - 1, barY - 1, barW + 2, barH + 2);
  }

  // Timer text
  ctx.fillStyle = pct > 0.25 ? '#ffaa00' : '#ff4444';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.ceil(p.downTimer)}s`, x, y - 4 + 3);

  // Name tag
  ctx.fillStyle = '#ff6666';
  ctx.font = 'bold 8px monospace';
  ctx.fillText(colors.name, x, y + 20);
  ctx.textAlign = 'left';
}

function drawPlayerWithColors(p, colors) {
  const x = p.x, y = p.y;
  if (p.invincible > 0 && Math.floor(Date.now() / 75) % 2 === 0) return;
  if (currentMode === 'teamwork' && p.permaDead) return;
  if (currentMode === 'teamwork' && p.downed) {
    drawDownedPlayer(p, colors);
    return;
  }
  if (currentMode === 'teamwork' && (!p.alive || p.hp <= 0)) return;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(x, y+13, 10, 4, 0, 0, Math.PI*2); ctx.fill();

  // Boots
  ctx.fillStyle = '#2d1d0d';
  ctx.fillRect(x-6, y+11, 5, 4);
  ctx.fillRect(x+1, y+11, 5, 4);
  // Legs
  ctx.fillStyle = '#3d2d1a';
  ctx.fillRect(x-5, y+5, 4, 8);
  ctx.fillRect(x+1, y+5, 4, 8);
  // Belt
  ctx.fillStyle = '#4a3020';
  ctx.fillRect(x-6, y+4, 12, 3);
  // Body
  ctx.fillStyle = '#7a5c1e';
  ctx.fillRect(x-6, y-8, 12, 14);
  // Chest armor
  ctx.fillStyle = colors.armor;
  ctx.fillRect(x-5, y-7, 10, 9);
  ctx.fillStyle = colors.chest;
  ctx.fillRect(x-4, y-6, 8, 4);
  // Arms
  ctx.fillStyle = colors.skin;
  ctx.fillRect(x-9, y-7, 3, 11);
  ctx.fillRect(x+6, y-7, 3, 11);
  // Head
  ctx.fillStyle = colors.skin;
  ctx.fillRect(x-5, y-18, 10, 10);
  // Hair
  ctx.fillStyle = colors.hair;
  ctx.fillRect(x-5, y-18, 10, 3);
  ctx.fillRect(x-5, y-16, 2, 4);
  // Eye
  ctx.fillStyle = '#1a1000';
  if (p.facing > 0) ctx.fillRect(x+1, y-14, 2, 2);
  else                   ctx.fillRect(x-3, y-14, 2, 2);

  // Player name tag (teamwork only)
  if (currentMode === 'teamwork') {
    ctx.fillStyle = colors.armor;
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(colors.name, x, y - 22);
    ctx.textAlign = 'left';
  }

  drawWeaponFor(p, x, y);
}

function drawWeaponFor(p, px, py) {
  const wd = getWeaponData(p.weaponTier);
  ctx.save();
  ctx.translate(px, py - 2);
  const angle = p.isAttacking ? p.attackAngle : (p.facing > 0 ? -0.3 : Math.PI + 0.3);
  ctx.rotate(angle);
  if (wd.glow) { ctx.shadowColor = wd.glow; ctx.shadowBlur = 14; }
  const len = wd.length;

  const t = Date.now() / 200;

  if (wd.name === 'Sword') {
    ctx.fillStyle = '#5c3317'; ctx.fillRect(-2, 4, 4, 10);
    ctx.fillStyle = '#888';    ctx.fillRect(-7, 2, 14, 4);
    ctx.fillStyle = wd.color;
    ctx.beginPath(); ctx.moveTo(-2.5,2); ctx.lineTo(2.5,2); ctx.lineTo(0.5,-len); ctx.lineTo(-0.5,-len); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#d8e8ff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(1,2); ctx.lineTo(0.5,-len); ctx.stroke();

  } else if (wd.name === 'Battle Axe') {
    ctx.fillStyle = '#5c3317'; ctx.fillRect(-2, -len, 4, len+8);
    ctx.fillStyle = wd.color;
    ctx.beginPath(); ctx.moveTo(-2,-len+10); ctx.lineTo(-15,-len-6); ctx.lineTo(-15,-len+16); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(2,-len+10);  ctx.lineTo(15,-len-6);  ctx.lineTo(15,-len+16);  ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#e0a050'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-15,-len-6); ctx.lineTo(-15,-len+16); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(15,-len-6);  ctx.lineTo(15,-len+16);  ctx.stroke();

  } else if (wd.name === 'Flaming Sword') {
    ctx.fillStyle = '#3a1a00'; ctx.fillRect(-2, 4, 4, 10);
    ctx.fillStyle = '#aa4400'; ctx.fillRect(-7, 2, 14, 4);
    ctx.fillStyle = wd.color;
    ctx.beginPath(); ctx.moveTo(-3,2); ctx.lineTo(3,2); ctx.lineTo(1,-len); ctx.lineTo(-1,-len); ctx.closePath(); ctx.fill();
    // Animated flame wisps along blade
    ctx.shadowColor = '#FF2200'; ctx.shadowBlur = 18;
    for (let fi = 0; fi < 4; fi++) {
      const fy = -8 - fi * 9;
      const fx = Math.sin(t + fi * 1.5) * 4;
      ctx.fillStyle = `rgba(255,${80+fi*30},0,${0.8 - fi*0.15})`;
      ctx.beginPath(); ctx.ellipse(fx, fy, 4, 7, 0, 0, Math.PI*2); ctx.fill();
    }

  } else if (wd.name === 'Ice Blade') {
    ctx.fillStyle = '#1a2a3a'; ctx.fillRect(-2, 4, 4, 10);
    ctx.fillStyle = '#4488aa'; ctx.fillRect(-8, 2, 16, 4);
    ctx.fillStyle = wd.color;
    ctx.beginPath(); ctx.moveTo(-3,2); ctx.lineTo(3,2); ctx.lineTo(0,-len); ctx.closePath(); ctx.fill();
    // Ice crystal facets
    ctx.strokeStyle = '#ccffff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-3,-len*0.4); ctx.moveTo(0,0); ctx.lineTo(3,-len*0.6); ctx.stroke();
    // Pulsing crystal at tip
    const pulse = 0.7 + Math.sin(t*2) * 0.3;
    ctx.shadowColor = '#00CCFF'; ctx.shadowBlur = 14 * pulse;
    ctx.fillStyle = '#ccffff'; ctx.beginPath(); ctx.ellipse(0, -len, 5*pulse, 5*pulse, 0, 0, Math.PI*2); ctx.fill();

  } else if (wd.name === 'Lightning Sword') {
    ctx.fillStyle = '#2a2a00'; ctx.fillRect(-2, 4, 4, 10);
    ctx.fillStyle = '#888800'; ctx.fillRect(-7, 2, 14, 4);
    // Jagged blade
    ctx.fillStyle = wd.color;
    ctx.beginPath();
    ctx.moveTo(0, 2); ctx.lineTo(4, -len*0.2); ctx.lineTo(-3, -len*0.4);
    ctx.lineTo(4, -len*0.65); ctx.lineTo(-2, -len*0.8); ctx.lineTo(0, -len);
    ctx.lineTo(-2, -len*0.8); ctx.lineTo(3, -len*0.65); ctx.lineTo(-4, -len*0.4);
    ctx.lineTo(3, -len*0.2); ctx.closePath(); ctx.fill();
    // Electric arcs
    if (p.isAttacking || Math.sin(t*3) > 0.5) {
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.moveTo(0,2); ctx.lineTo(3,-len*0.3); ctx.lineTo(-2,-len*0.6); ctx.lineTo(0,-len); ctx.stroke();
    }

  } else if (wd.name === 'Poison Scythe') {
    // === STAFF (pixel art: dark wood + metal rings) ===
    ctx.fillStyle = '#0d1804'; ctx.fillRect(-2, -len, 4, len + 10);   // pole
    ctx.fillStyle = '#1a2e08'; ctx.fillRect(-1, -len+6, 1, len - 8);  // wood grain
    // Metal ferrule rings
    ctx.fillStyle = '#2d5c14';
    ctx.fillRect(-4, -len+12, 8, 3);   // upper ring
    ctx.fillRect(-4,  -6,     8, 3);   // lower ring
    // Bottom spike
    ctx.fillStyle = '#3a6618'; ctx.fillRect(-3, 8, 6, 5);
    ctx.fillStyle = '#1e3a0a'; ctx.fillRect(-2, 12, 4, 4);
    ctx.fillStyle = '#0f1e04'; ctx.fillRect(-1, 15, 2, 3);

    // === BLADE SPINE (dark back edge — blocky pixel layers) ===
    const BL = -len - 2; // blade root Y
    ctx.fillStyle = '#0f2206';
    // Thick spine going up and curving — pixel blocks
    ctx.fillRect(-3, BL,     6,  6);
    ctx.fillRect(-3, BL-8,   5,  8);
    ctx.fillRect(-2, BL-16,  4,  8);
    ctx.fillRect(-1, BL-26,  3,  10);
    ctx.fillRect( 0, BL-36,  2,  10);
    ctx.fillRect( 0, BL-46,  2,  10);  // tip spine

    // === BLADE BODY (mid dark-green, large crescent sweep) ===
    ctx.fillStyle = '#1d6614';
    ctx.beginPath();
    ctx.moveTo(2,  BL + 4);
    ctx.bezierCurveTo(24, BL - 2,  52, BL - 8,  56, BL - 26);
    ctx.bezierCurveTo(60, BL - 46, 42, BL - 62, 20, BL - 60);
    ctx.bezierCurveTo(8,  BL - 58, 0,  BL - 50, 0,  BL - 46);
    ctx.bezierCurveTo(6,  BL - 40, 8,  BL - 34, 8,  BL - 26);
    ctx.bezierCurveTo(10, BL - 16, 6,  BL - 6,  2,  BL + 4);
    ctx.closePath(); ctx.fill();

    // === BLADE HIGHLIGHT (bright cutting edge) ===
    ctx.fillStyle = '#33aa22';
    ctx.beginPath();
    ctx.moveTo(4,  BL + 2);
    ctx.bezierCurveTo(24, BL - 4,  48, BL - 10, 52, BL - 26);
    ctx.bezierCurveTo(56, BL - 44, 40, BL - 58, 22, BL - 56);
    ctx.lineTo(18, BL - 52);
    ctx.bezierCurveTo(34, BL - 50, 46, BL - 38, 42, BL - 26);
    ctx.bezierCurveTo(38, BL - 14, 18, BL - 6,  4,  BL + 2);
    ctx.closePath(); ctx.fill();

    // === PIXEL ART EDGE SHIMMER (lime cutting edge strip) ===
    ctx.fillStyle = '#77ff44';
    ctx.beginPath();
    ctx.moveTo(6, BL + 0);
    ctx.bezierCurveTo(24, BL - 5, 44, BL - 12, 48, BL - 26);
    ctx.bezierCurveTo(50, BL - 38, 38, BL - 52, 24, BL - 52);
    ctx.lineTo(22, BL - 48);
    ctx.bezierCurveTo(34, BL - 46, 42, BL - 36, 40, BL - 26);
    ctx.bezierCurveTo(38, BL - 16, 20, BL - 8,  6,  BL + 0);
    ctx.closePath(); ctx.fill();

    // Pixel highlight dots on edge (FF pixel art detail)
    ctx.fillStyle = '#bbffaa';
    ctx.fillRect(8,  BL - 4,  3, 2);
    ctx.fillRect(22, BL - 12, 3, 2);
    ctx.fillRect(36, BL - 26, 3, 2);
    ctx.fillRect(44, BL - 42, 2, 2);
    ctx.fillRect(22, BL - 52, 3, 2);  // tip highlight

    // Blade tip (bright pointed cap)
    ctx.fillStyle = '#ccffbb';
    ctx.fillRect(20, BL - 60, 4, 4);
    ctx.fillRect(22, BL - 62, 2, 2);

    // === POISON EFFECTS ===
    ctx.shadowColor = '#00ff55'; ctx.shadowBlur = 16;
    // Poison drips at 4 points along cutting edge
    const drips = [
      { x: 8,  y: BL - 6  },
      { x: 22, y: BL - 16 },
      { x: 38, y: BL - 30 },
      { x: 46, y: BL - 46 },
    ];
    drips.forEach((d, i) => {
      const ph = Math.abs(Math.sin(t * 1.3 + i * 1.2));
      const dl = 5 + ph * 9;
      ctx.fillStyle = `rgba(0,220,70,${0.65 + ph * 0.35})`;
      // Drip elongated drop
      ctx.beginPath();
      ctx.ellipse(d.x, d.y + dl * 0.6, 2.5, dl * 0.55 + 1, 0, 0, Math.PI * 2);
      ctx.fill();
      // Round tip of drip
      ctx.beginPath();
      ctx.ellipse(d.x, d.y + dl * 1.15, 2, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    // Poison wisps floating off blade
    for (let wi = 0; wi < 4; wi++) {
      const wf = Math.abs(Math.sin(t * 1.7 + wi));
      ctx.fillStyle = `rgba(40,255,90,${wf * 0.4})`;
      ctx.beginPath();
      ctx.ellipse(8 + wi * 12 + Math.sin(t + wi) * 2, BL - 8 - wi * 12 - wf * 6, 3.5, 5.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

  } else if (wd.name === 'War Hammer') {
    ctx.fillStyle = '#5c3317'; ctx.fillRect(-2, -len, 4, len+8);
    ctx.fillStyle = wd.color;  ctx.fillRect(-13, -len-6, 26, 16);
    ctx.fillStyle = '#d8d8d8'; ctx.fillRect(-11, -len-4, 22, 6);
    ctx.fillStyle = '#888';    ctx.fillRect(-10, -len+5, 5, 5); ctx.fillRect(5, -len+5, 5, 5);
    // Impact glow when attacking
    if (p.isAttacking) { ctx.shadowColor = '#8888aa'; ctx.shadowBlur = 20; }

  } else if (wd.name === 'Legendary Blade') {
    ctx.fillStyle = '#3a2a00'; ctx.fillRect(-2, 4, 4, 12);
    ctx.fillStyle = '#aa8800'; ctx.fillRect(-9, 1, 18, 5);
    ctx.fillStyle = wd.color;
    ctx.beginPath(); ctx.moveTo(-3,2); ctx.lineTo(3,2); ctx.lineTo(1,-len); ctx.lineTo(-1,-len); ctx.closePath(); ctx.fill();
    // Animated golden runes along blade
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 20;
    for (let ri = 0; ri < 4; ri++) {
      const ry = -10 - ri * 10;
      const glow = 0.5 + Math.sin(t + ri) * 0.5;
      ctx.fillStyle = `rgba(255,215,0,${glow})`;
      ctx.fillRect(-2, ry, 4, 3);
    }
    ctx.strokeStyle = '#FFFACD'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(1,2); ctx.lineTo(0.8,-len); ctx.stroke();
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawMonster(m) {
  const wobX = Math.sin(m.wobble) * (m.isBoss ? 2 : 1.5);
  const x = m.x + wobX, y = m.y;

  // Boss: unique hand-drawn design
  if (m.isBoss) {
    if (m.charging) {
      ctx.shadowColor = m.type === 1 ? '#FF2200' : m.type === 0 ? '#cc88ff' : '#88ff44';
      ctx.shadowBlur = 28;
    }
    if (m.isStoryBoss)     drawStoryBoss(x, y, m.facing, m.charging, m.storyBossIdx);
    else if (m.type === 0) drawSkeletonKing(x, y, m.facing, m.charging);
    else if (m.type === 1) drawDemonLord(x, y, m.facing, m.charging);
    else                   drawOrcWarlord(x, y, m.facing, m.charging);
    ctx.shadowBlur = 0;

    if (!m._deathAnim) {
      // Status overlays
      if (m.burnTimer   > 0) { ctx.globalAlpha = 0.3 + Math.sin(Date.now()/80)*0.12;  ctx.fillStyle='#FF3300'; ctx.fillRect(x-24,y-60,48,64); ctx.globalAlpha=1; }
      if (m.slowTimer   > 0) { ctx.globalAlpha = 0.28; ctx.fillStyle='#88DDFF';        ctx.fillRect(x-24,y-60,48,64); ctx.globalAlpha=1; }
      if (m.poisonTimer > 0) { ctx.globalAlpha = 0.3 + Math.sin(Date.now()/120)*0.1;  ctx.fillStyle='#00BB00'; ctx.fillRect(x-24,y-60,48,64); ctx.globalAlpha=1; }

      // Boss name tag
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
      ctx.fillText(m.bossName, x, y - 68);
      ctx.textAlign = 'left';
    }
    return;
  }

  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.beginPath(); ctx.ellipse(x, y+11, 9, 3, 0, 0, Math.PI*2); ctx.fill();

  if      (m.type === 0) drawSkeleton(x, y, m.facing);
  else if (m.type === 1) drawDemon(x, y, m.facing);
  else                   drawOrc(x, y, m.facing);

  // Status effect overlays
  if (m.burnTimer > 0) {
    ctx.globalAlpha = 0.45 + Math.sin(Date.now()/80) * 0.2;
    ctx.fillStyle = '#FF3300';
    ctx.fillRect(x - m.w/2 - 2, y - m.h - 2, m.w + 4, m.h + 4);
    ctx.globalAlpha = 1;
  }
  if (m.slowTimer > 0) {
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#88DDFF';
    ctx.fillRect(x - m.w/2 - 2, y - m.h - 2, m.w + 4, m.h + 4);
    ctx.globalAlpha = 1;
  }
  if (m.poisonTimer > 0) {
    ctx.globalAlpha = 0.4 + Math.sin(Date.now()/120) * 0.15;
    ctx.fillStyle = '#00BB00';
    ctx.fillRect(x - m.w/2 - 2, y - m.h - 2, m.w + 4, m.h + 4);
    ctx.globalAlpha = 1;
  }

  // HP bar (skip for death animations)
  if (m._deathAnim) return;
  const bw = 38, bh = 5, bx = x - bw/2, by = y - 32;
  ctx.fillStyle = '#300000';
  ctx.fillRect(bx, by, bw, bh);
  const pct = m.hp / m.maxHp;
  ctx.fillStyle = pct > 0.6 ? '#00cc44' : pct > 0.3 ? '#ffaa00' : '#ff2200';
  ctx.fillRect(bx, by, bw * pct, bh);
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = '#fff'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
  ctx.fillText(`${m.hp}/${m.maxHp}`, x, by - 1);
  ctx.textAlign = 'left';
}

// ---- BOSS DRAWINGS ----

function drawBossGun(x, y, facing, glowColor) {
  // Gun held in left hand (opposite of facing)
  const gx = facing > 0 ? x - 22 : x + 22;
  const gy = y - 6;
  const dir = facing;
  // Gun body
  ctx.fillStyle = '#333';
  ctx.fillRect(gx - 3*dir, gy - 2, 18*dir, 5);
  // Barrel
  ctx.fillStyle = '#555';
  ctx.fillRect(gx + 12*dir, gy - 1, 8*dir, 3);
  // Handle
  ctx.fillStyle = '#222';
  ctx.fillRect(gx + 2*dir, gy + 3, 4, 7);
  // Muzzle glow
  const pulse = 0.4 + Math.sin(Date.now() / 150) * 0.3;
  ctx.fillStyle = glowColor;
  ctx.globalAlpha = pulse;
  ctx.beginPath(); ctx.arc(gx + 20*dir, gy, 3, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawSkeletonKing(x, y, facing, charging) {
  const t = Date.now() / 150;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(x, y+14, 22, 6, 0, 0, Math.PI*2); ctx.fill();
  // Tattered purple cape (behind body)
  ctx.fillStyle = '#3a0055';
  ctx.beginPath(); ctx.moveTo(x-18, y-30); ctx.lineTo(x-22, y+10); ctx.lineTo(x-8, y+2); ctx.lineTo(x, y+10); ctx.lineTo(x+8, y+2); ctx.lineTo(x+22, y+10); ctx.lineTo(x+18, y-30); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#220033';
  ctx.fillRect(x-4, y-30, 8, 40); // cape center spine
  // Bone legs
  ctx.fillStyle = '#ddd8cc';
  ctx.fillRect(x-9, y+2, 6, 14); ctx.fillRect(x+3, y+2, 6, 14);
  // Foot bones
  ctx.fillRect(x-11, y+13, 8, 4); ctx.fillRect(x+3, y+13, 8, 4);
  // Ribcage
  ctx.fillStyle = '#ddd8cc'; ctx.fillRect(x-12, y-22, 24, 26);
  ctx.fillStyle = '#b0ac9f'; ctx.fillRect(x-2, y-22, 4, 26); // spine
  // Ribs
  ctx.fillStyle = '#ddd8cc';
  for (let r = 0; r < 4; r++) {
    ctx.fillRect(x-12, y-18+r*6, 8, 3);
    ctx.fillRect(x+4,  y-18+r*6, 8, 3);
  }
  // Arms (bone)
  ctx.fillStyle = '#ddd8cc';
  ctx.fillRect(x-20, y-20, 8, 20); ctx.fillRect(x+12, y-20, 8, 20);
  ctx.fillRect(x-22, y-4, 4, 4);   ctx.fillRect(x+18, y-4, 4, 4); // hands
  // Scythe (right side)
  ctx.fillStyle = '#5a3a1a'; ctx.fillRect(x+18, y-55, 5, 60);
  ctx.fillStyle = '#cc3333';
  ctx.beginPath(); ctx.moveTo(x+20, y-55); ctx.quadraticCurveTo(x+50, y-65, x+44, y-38); ctx.quadraticCurveTo(x+36, y-25, x+20, y-30); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#ff5555'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x+20, y-55); ctx.quadraticCurveTo(x+48, y-63, x+43, y-40); ctx.stroke();
  // Neck
  ctx.fillStyle = '#ddd8cc'; ctx.fillRect(x-4, y-28, 8, 8);
  // Skull (large)
  ctx.fillStyle = '#ddd8cc'; ctx.fillRect(x-13, y-50, 26, 24);
  ctx.fillRect(x-10, y-54, 20, 6); // top dome
  // Crown (gold)
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(x-14, y-56, 28, 6);
  ctx.fillRect(x-14, y-60, 5, 6); ctx.fillRect(x-5,  y-63, 5, 9); ctx.fillRect(x+4, y-60, 5, 6);
  ctx.fillStyle = '#ff2200'; // ruby gems
  ctx.fillRect(x-12, y-58, 3, 3); ctx.fillRect(x-2,  y-61, 3, 3); ctx.fillRect(x+9, y-58, 3, 3);
  // Glowing eye sockets
  const eyeGlow = 0.7 + Math.sin(t*2)*0.3;
  ctx.fillStyle = `rgba(180,0,255,${eyeGlow})`;
  if (facing > 0) { ctx.fillRect(x+2, y-44, 6, 6); } else { ctx.fillRect(x-8, y-44, 6, 6); }
  ctx.fillStyle = '#ffffff';
  if (facing > 0) { ctx.fillRect(x+3, y-43, 2, 2); } else { ctx.fillRect(x-7, y-43, 2, 2); }
  // Jaw
  ctx.fillStyle = '#b0ac9f'; ctx.fillRect(x-10, y-28, 20, 4);
  // Teeth
  ctx.fillStyle = '#ddd8cc';
  for (let t2 = 0; t2 < 5; t2++) ctx.fillRect(x-9+t2*4, y-28, 2, 4);
  // Gun
  drawBossGun(x, y, facing, '#bb66ff');
  // Charging effect — purple energy orb
  if (charging) {
    ctx.shadowColor = '#cc00ff'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#cc00ff'; ctx.beginPath(); ctx.arc(x-19*facing, y-8, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(x-18*facing, y-9, 3, 0, Math.PI*2); ctx.fill();
  }
}

function drawDemonLord(x, y, facing, charging) {
  const t = Date.now() / 130;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.beginPath(); ctx.ellipse(x, y+14, 26, 7, 0, 0, Math.PI*2); ctx.fill();
  // Massive wings (behind everything)
  ctx.fillStyle = '#1a0000';
  ctx.beginPath(); ctx.moveTo(x-10,y-30); ctx.lineTo(x-55,y-55); ctx.lineTo(x-48,y-20); ctx.lineTo(x-55,y+10); ctx.lineTo(x-10,y-5); ctx.fill();

  ctx.fillStyle = '#880000'; // trim
  ctx.fillRect(x-13, y-14, 26, 3);
  // Spiked shoulders
  ctx.fillStyle = '#550000';
  ctx.fillRect(x-22, y-26, 10, 12); ctx.fillRect(x+12, y-26, 10, 12);
  ctx.fillStyle = '#880000'; // spikes
  ctx.beginPath(); ctx.moveTo(x-22,y-26); ctx.lineTo(x-18,y-34); ctx.lineTo(x-14,y-26); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+14,y-26); ctx.lineTo(x+18,y-34); ctx.lineTo(x+22,y-26); ctx.fill();

  ctx.beginPath(); ctx.moveTo(x+12,y-46); ctx.quadraticCurveTo(x+28,y-68, x+18,y-72); ctx.quadraticCurveTo(x+8,y-76, x+4,y-52); ctx.closePath(); ctx.fill();
  // Horn ridges

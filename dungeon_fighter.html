// --- Input ---
const keys = {};
const mouse = { x: W/2, y: H/2 };
let mouseDown = false;
let mouseClicked = false;

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top) * (H / r.height);
});
canvas.addEventListener('mousedown', () => { mouseDown = true; mouseClicked = true; });
canvas.addEventListener('mouseup', () => { mouseDown = false; });
document.addEventListener('keydown', e => {
  // Admin code entry
  if (gameState === 'adminCode') {
    if (e.key === 'Escape') { gameState = 'start'; }
    else if (e.key === 'Backspace') { adminCode = adminCode.slice(0, -1); }
    else if (e.key === 'Enter') {
      if (adminCode === 'hihi') { gameState = 'adminPanel'; adminLevel = '1'; adminWeapon = 0; adminField = 'none'; }
      else { adminCode = ''; } // wrong code, clear
    }
    else if (e.key.length === 1 && adminCode.length < 20) { adminCode += e.key; }
    e.preventDefault();
    return;
  }
  // Admin panel level typing
  if (gameState === 'adminPanel' && adminField === 'level') {
    if (e.key === 'Escape' || e.key === 'Enter') { adminField = 'none'; }
    else if (e.key === 'Backspace') { adminLevel = adminLevel.slice(0, -1); }
    else if (e.key >= '0' && e.key <= '9' && adminLevel.length < 5) { adminLevel += e.key; }
    e.preventDefault();
    return;
  }
  // Name entry intercepts all printable input
  if (gameState === 'nameEntry') {
    if (e.key === 'Enter') {
      if (pendingName.trim() === '') pendingName = 'Anonymous';
      lastEndlessRank = submitScore(pendingScoreLevel, pendingScoreCoins, pendingScoreWeapon, pendingName.trim());
      gameState = 'dead';
    } else if (e.key === 'Escape') {
      lastEndlessRank = 0;
      gameState = 'dead';
    } else if (e.key === 'Backspace') {
      pendingName = pendingName.slice(0, -1);
    } else if (e.key.length === 1 && pendingName.length < 16) {
      pendingName += e.key;
    }
    e.preventDefault();
    return;
  }
  keys[e.key] = true;
  if (e.key === ' ' || e.key.startsWith('Arrow')) e.preventDefault();
  if (e.key === 'Shift') {
    e.preventDefault();
    if (gameState === 'playing' || gameState === 'upgrade') {
      prevGameState = gameState;
      gameState = 'paused';
    } else if (gameState === 'paused' || gameState === 'shop') {
      gameState = prevGameState;
    }
    // Shift does nothing during cutscene/credits/dead/start
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// --- Mobile Touch Controls ---
let touchMoveId = null, touchMoveOrigin = null, touchMoveDir = { x: 0, y: 0 };
let touchAttackId = null;
const isMobile = 'ontouchstart' in window;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  for (const t of e.changedTouches) {
    const tx = (t.clientX - r.left) * (W / r.width);
    const ty = (t.clientY - r.top) * (H / r.height);
    if (gameState !== 'playing') {
      // Non-playing states: treat touch as click
      mouse.x = tx; mouse.y = ty;
      mouseClicked = true; mouseDown = true;
      return;
    }
    if (tx < W / 2) {
      // Left side — movement joystick
      touchMoveId = t.identifier;
      touchMoveOrigin = { x: tx, y: ty };
      touchMoveDir = { x: 0, y: 0 };
    } else {
      // Right side — attack
      touchAttackId = t.identifier;
      keys[' '] = true;
      mouse.x = tx; mouse.y = ty;
      mouseClicked = true; mouseDown = true;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  for (const t of e.changedTouches) {
    const tx = (t.clientX - r.left) * (W / r.width);
    const ty = (t.clientY - r.top) * (H / r.height);
    if (t.identifier === touchMoveId && touchMoveOrigin) {
      const dx = tx - touchMoveOrigin.x;
      const dy = ty - touchMoveOrigin.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 10) {
        touchMoveDir = { x: dx / dist, y: dy / dist };
      } else {
        touchMoveDir = { x: 0, y: 0 };
      }
    }
    if (t.identifier === touchAttackId) {
      mouse.x = tx; mouse.y = ty;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchMoveId) {
      touchMoveId = null; touchMoveOrigin = null; touchMoveDir = { x: 0, y: 0 };
    }
    if (t.identifier === touchAttackId) {
      touchAttackId = null; keys[' '] = false; mouseDown = false;
    }
  }
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  touchMoveId = null; touchMoveOrigin = null; touchMoveDir = { x: 0, y: 0 };
  touchAttackId = null; keys[' '] = false; mouseDown = false;
}, { passive: false });

// --- Leaderboard ---
// Unique device ID so you can only delete your own scores
let localDeviceId = localStorage.getItem('df_device_id');
if (!localDeviceId) {
  localDeviceId = 'dev_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  localStorage.setItem('df_device_id', localDeviceId);
}

// Online leaderboard via JSONBlob
const BLOB_URL = 'https://jsonblob.com/api/jsonBlob/019d8c6a-eee5-7912-a9c5-8cdffd9f8b65';
let onlineLeaderboard = [];
let onlineReady = false;

function loadLeaderboard() {
  if (onlineReady) return [...onlineLeaderboard];
  try { return JSON.parse(localStorage.getItem('df_leaderboard') || '[]'); } catch(e) { return []; }
}
function saveLeaderboard(lb) {
  try { localStorage.setItem('df_leaderboard', JSON.stringify(lb)); } catch(e) {}
  onlineLeaderboard = [...lb];
  // Save to online blob (fire and forget)
  fetch(BLOB_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(lb)
  }).catch(() => {});
}

// Fetch online leaderboard on load
fetch(BLOB_URL)
  .then(r => r.json())
  .then(data => {
    if (Array.isArray(data)) {
      onlineLeaderboard = data;
      onlineReady = true;
      // Also update local cache
      try { localStorage.setItem('df_leaderboard', JSON.stringify(data)); } catch(e) {}
    }
  })
  .catch(() => {}); // fall back to local if offline

function submitScore(lvl, coinsEarned, weapon, name) {
  const lb = loadLeaderboard();
  const entry = { name: name || 'Anonymous', level: lvl, coins: coinsEarned, weapon, time: formatTime(playTime), date: new Date().toLocaleDateString(), deviceId: localDeviceId };
  lb.push(entry);
  lb.sort((a, b) => b.level - a.level || b.coins - a.coins);
  lb.splice(10); // keep top 10
  saveLeaderboard(lb);
  const idx = lb.findIndex(e => e.name === entry.name && e.level === lvl && e.coins === coinsEarned && e.date === entry.date);
  return idx + 1;
}

// --- Save / Load ---
function serializePlayer(p) {
  return {
    hp: p.hp, maxHp: p.maxHp, baseSpeed: p.baseSpeed, speedMult: p.speedMult,
    weaponDamage: p.weaponDamage, strengthBonus: p.strengthBonus,
    baseAttackSpeed: p.baseAttackSpeed, attackSpeedMult: p.attackSpeedMult,
    weapon: p.weapon, weaponTier: p.weaponTier, weaponUpgradeLevel: p.weaponUpgradeLevel,
    alive: p.alive, downed: p.downed, permaDead: p.permaDead || false,
    playerIndex: p.playerIndex || 0,
  };
}
function deserializePlayer(data, target) {
  target.hp = data.hp; target.maxHp = data.maxHp;
  target.baseSpeed = data.baseSpeed; target.speedMult = data.speedMult;
  target.weaponDamage = data.weaponDamage; target.strengthBonus = data.strengthBonus;
  target.baseAttackSpeed = data.baseAttackSpeed; target.attackSpeedMult = data.attackSpeedMult;
  target.weapon = data.weapon; target.weaponTier = data.weaponTier;
  target.weaponUpgradeLevel = data.weaponUpgradeLevel;
  target.alive = data.alive; target.downed = false; target.downTimer = 0;
  target.reviveProgress = 0; target.permaDead = data.permaDead || false;
  target.invincible = 0; target.attackCooldown = 0; target.isAttacking = false;
}
function saveGame() {
  const save = {
    level, coins, playTime, currentMode,
    storyChapter, storyChapterStartLevel,
    teamPlayerCount,
  };
  if (currentMode === 'teamwork') {
    save.players = players.map(p => serializePlayer(p));
  } else {
    save.player = serializePlayer(player);
  }
  try { localStorage.setItem('df_savegame', JSON.stringify(save)); } catch(e) {}
  saveFlashTimer = 2.0;
}
function hasSaveGame() {
  return !!localStorage.getItem('df_savegame');
}
function loadGame() {
  let save;
  try { save = JSON.parse(localStorage.getItem('df_savegame')); } catch(e) { return false; }
  if (!save) return false;
  level = save.level; coins = save.coins; playTime = save.playTime || 0;
  currentMode = save.currentMode;
  storyChapter = save.storyChapter || 1;
  storyChapterStartLevel = save.storyChapterStartLevel || 1;
  teamPlayerCount = save.teamPlayerCount || 2;
  if (currentMode === 'teamwork' && save.players) {
    players = [];
    for (let i = 0; i < save.players.length; i++) {
      const p = createPlayer(i);
      deserializePlayer(save.players[i], p);
      players.push(p);
    }
    teamPlayerCount = players.length;
  } else if (save.player) {
    deserializePlayer(save.player, player);
    players = [player];
  }
  bannerText = ''; subBannerText = ''; bannerTimer = 0;
  floatingTexts = []; particles = []; bossProjectiles = []; groundCoins = [];
  deathAnims = []; screenShake = 0; teamUpgradeQueue = []; teamShopPlayer = 0;
  spawnMonsters();
  // Position players
  if (currentMode === 'teamwork') {
    const sp = [{ x:W/2-60,y:H/2-40 },{ x:W/2+60,y:H/2-40 },{ x:W/2-60,y:H/2+40 },{ x:W/2+60,y:H/2+40 }];
    players.forEach((p,i) => { if (!p.permaDead) { p.x = sp[i].x; p.y = sp[i].y; }});
  } else {
    player.x = W/2; player.y = H/2;
  }
  gameState = 'playing';
  return true;
}
function deleteSave() {
  localStorage.removeItem('df_savegame');
}

function createPlayer(index) {
  const spawnPositions = [
    { x: W/2 - 60, y: H/2 - 40 },
    { x: W/2 + 60, y: H/2 - 40 },
    { x: W/2 - 60, y: H/2 + 40 },
    { x: W/2 + 60, y: H/2 + 40 },
  ];
  const pos = spawnPositions[index] || { x: W/2, y: H/2 };
  return {
    x: pos.x, y: pos.y,
    w: 16, h: 24,
    hp: 20, maxHp: 20,
    baseSpeed: 2.5, speedMult: 1,
    weaponDamage: 3, strengthBonus: 0,
    baseAttackSpeed: 1, attackSpeedMult: 1,
    attackCooldown: 0,
    attackRange: 72,
    attackArc: Math.PI * 0.75,
    isAttacking: false,
    attackAngle: 0,
    attackTimer: 0,
    weapon: 'Sword',
    weaponTier: 0,
    weaponUpgradeLevel: 0,
    facing: 1,
    invincible: 0,
    alive: true,
    downed: false,
    downTimer: 0,
    permaDead: false,
    reviveProgress: 0,
    playerIndex: index,
    vampireSteal: 0,
    get speed() { return this.baseSpeed * this.speedMult; },
    get attackSpeed() { return this.baseAttackSpeed * this.attackSpeedMult; },
    get damage() { return this.weaponDamage + this.strengthBonus; },
  };
}

function getAlivePlayers() {
  if (currentMode === 'teamwork') return players.filter(p => p.alive && !p.downed && p.hp > 0);
  return player.hp > 0 ? [player] : [];
}
function getDownedPlayers() {
  if (currentMode !== 'teamwork') return [];
  return players.filter(p => p.downed && !p.permaDead);
}
const REVIVE_TIME = 2.0;   // seconds to hold near teammate to revive
const DOWN_TIMEOUT = 20.0; // seconds before permanent death

function nearestAlivePlayer(x, y) {
  const alive = getAlivePlayers();
  if (alive.length === 0) return player; // fallback
  let best = alive[0], bestDist = Math.hypot(alive[0].x - x, alive[0].y - y);
  for (let i = 1; i < alive.length; i++) {
    const d = Math.hypot(alive[i].x - x, alive[i].y - y);
    if (d < bestDist) { bestDist = d; best = alive[i]; }
  }
  return best;
}

function teamScaleMult() {
  if (currentMode !== 'teamwork') return 1;
  return 1 + (teamPlayerCount - 1) * 0.5;

const bgCtx = bgCanvas.getContext('2d');

function buildBackground() {
  bgCtx.fillStyle = '#0d0d1a';
  bgCtx.fillRect(0, 0, W, H);

  // Floor tiles
  const ts = 40;
  for (let tx = ROOM.x; tx < ROOM.x + ROOM.w; tx += ts) {
    for (let ty = ROOM.y; ty < ROOM.y + ROOM.h; ty += ts) {
      const dark = (((tx - ROOM.x)/ts + (ty - ROOM.y)/ts) % 2 === 0);
      bgCtx.fillStyle = dark ? '#1a1a2e' : '#16213e';
      bgCtx.fillRect(tx, ty, ts, ts);
      bgCtx.strokeStyle = '#0d0d18';
      bgCtx.lineWidth = 1;
      bgCtx.strokeRect(tx, ty, ts, ts);
    }
  }

  // Wall sections
  drawWalls(bgCtx, 0, 0, W, ROOM.y);
  drawWalls(bgCtx, 0, ROOM.y + ROOM.h, W, H - ROOM.y - ROOM.h);
  drawWalls(bgCtx, 0, ROOM.y, ROOM.x, ROOM.h);
  drawWalls(bgCtx, ROOM.x + ROOM.w, ROOM.y, W - ROOM.x - ROOM.w, ROOM.h);

  // Room border
  bgCtx.strokeStyle = '#3d1a00';
  bgCtx.lineWidth = 3;
  bgCtx.strokeRect(ROOM.x, ROOM.y, ROOM.w, ROOM.h);
}

function drawWalls(c, x, y, w, h) {
  if (w <= 0 || h <= 0) return;
  c.fillStyle = '#140a00';
  c.fillRect(x, y, w, h);
  const stoneColors = ['#2d1a08', '#3a2510', '#251508', '#4a3015', '#221205'];
  const sw = 32, sh = 18;
  for (let sy = y; sy < y + h; sy += sh) {
    const offset = (Math.floor((sy - y) / sh) % 2) * (sw / 2);
    for (let sx = x - offset; sx < x + w; sx += sw) {
      const ax = Math.max(sx, x), ay = Math.max(sy, y);
      const aw = Math.min(sx + sw - 2, x + w) - ax;
      const ah = Math.min(sy + sh - 2, y + h) - ay;
      if (aw <= 0 || ah <= 0) continue;
      const seed = Math.abs((sx * 7 + sy * 13)) % stoneColors.length;
      c.fillStyle = stoneColors[seed];
      c.fillRect(ax, ay, aw, ah);
      c.strokeStyle = '#0a0500';
      c.lineWidth = 1;
      c.strokeRect(ax, ay, aw, ah);
    }
  }
}

function createMonster(lvl) {
  // Spawn anywhere in the room, just not overlapping any player (80px buffer)
  let x, y, tries = 0;
  do {
    x = ROOM.x + 20 + Math.random() * (ROOM.w - 40);
    y = ROOM.y + 20 + Math.random() * (ROOM.h - 40);
    tries++;
  } while (tries < 80 && (currentMode === 'teamwork'
    ? players.some(p => p.alive && Math.hypot(x - p.x, y - p.y) < 80)
    : Math.hypot(x - player.x, y - player.y) < 80));

  const hp = getMonsterMaxHp(lvl);
  const type = Math.floor(Math.random() * 3);
  // Base speed scales with level. Player speed is 2.5.
  // skeleton = slow (below player), orc = medium (near player), demon = fast (above player)
  const baseSpeed = 1.5 + lvl * 0.05;
  const speedMults = [0.5, 1.7, 1.0]; // skeleton, demon, orc
  const randomFactor = 0.8 + Math.random() * 0.4; // 0.8x to 1.2x variance per monster
  const speed = Math.min(baseSpeed * speedMults[type] * randomFactor, 4.0);
  const finalHp = type === 1 ? Math.max(1, hp - 3) : hp; // demons have 3 less hp
  return {
    x, y, w: 16, h: 20,
    hp: finalHp, maxHp: finalHp,
    speed, baseSpeed: speed,
    atkCooldown: 0.5 + Math.random() * 0.5,
    wobble: Math.random() * Math.PI * 2,
    type, facing: -1,
    burnTimer: 0, burnTick: 0,
    slowTimer: 0, slowMult: 1,
    poisonTimer: 0, poisonTick: 0,
    kbVx: 0, kbVy: 0,
  };
}

function initIntroAudio() {
  try {
    introACtx = new (window.AudioContext || window.webkitAudioContext)();
    const sr = introACtx.sampleRate;
    // Looping filtered noise = fire crackle
    const buf = introACtx.createBuffer(1, sr * 3, sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    introFireSrc = introACtx.createBufferSource();
    introFireSrc.buffer = buf; introFireSrc.loop = true;
    const bp  = introACtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 380; bp.Q.value = 0.45;
    const lp  = introACtx.createBiquadFilter(); lp.type = 'lowpass';  lp.frequency.value = 900;
    introFireGain = introACtx.createGain(); introFireGain.gain.value = 0.13;
    introFireSrc.connect(bp); bp.connect(lp); lp.connect(introFireGain); introFireGain.connect(introACtx.destination);
    introFireSrc.start();
  } catch(e) { introACtx = null; }
}

function playStepSound() {
  if (!introACtx) return;
  const t = introACtx.currentTime;
  const o  = introACtx.createOscillator(), g  = introACtx.createGain();
  o.type = 'sine'; o.frequency.value = 52;
  g.gain.setValueAtTime(0.55, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  o.connect(g); g.connect(introACtx.destination); o.start(t); o.stop(t + 0.2);
  const o2 = introACtx.createOscillator(), g2 = introACtx.createGain();
  o2.type = 'square'; o2.frequency.setValueAtTime(110, t); o2.frequency.exponentialRampToValueAtTime(38, t + 0.07);
  g2.gain.setValueAtTime(0.28, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
  o2.connect(g2); g2.connect(introACtx.destination); o2.start(t); o2.stop(t + 0.12);
}

function playLaughSound() {
  if (!introACtx) return;
  const t = introACtx.currentTime;
  [0, 0.17, 0.32, 0.54, 0.69, 0.84, 1.04, 1.26].forEach((off, i) => {
    const o = introACtx.createOscillator(), g = introACtx.createGain();
    const lp = introACtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 650;
    o.type = 'sawtooth'; o.frequency.value = 158 - i * 5;
    const st = t + off;
    const vol = i < 6 ? 0.30 : 0.48, dec = i < 6 ? 0.14 : 0.42;
    g.gain.setValueAtTime(0, st); g.gain.linearRampToValueAtTime(vol, st + 0.035);
    g.gain.exponentialRampToValueAtTime(0.001, st + dec);
    o.connect(lp); lp.connect(g); g.connect(introACtx.destination);
    o.start(st); o.stop(st + dec + 0.05);
  });
}

function playFlyAwaySound() {
  if (!introACtx) return;
  const t = introACtx.currentTime;
  // Wing flap thumps
  for (let i = 0; i < 4; i++) {
    const sr = introACtx.sampleRate, sz = Math.floor(sr * 0.12);
    const wb = introACtx.createBuffer(1, sz, sr);
    const wd = wb.getChannelData(0);
    for (let j = 0; j < sz; j++) wd[j] = (Math.random()*2-1) * Math.exp(-j/(sr*0.028));
    const ws = introACtx.createBufferSource(); ws.buffer = wb;
    const wg = introACtx.createGain(); const st = t + i * 0.23;
    wg.gain.setValueAtTime(0.6 - i*0.1, st); wg.gain.exponentialRampToValueAtTime(0.001, st + 0.12);
    ws.connect(wg); wg.connect(introACtx.destination); ws.start(st); ws.stop(st + 0.15);
  }
  // Rising whoosh
  const o = introACtx.createOscillator(), g = introACtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(140, t + 1.0); o.frequency.exponentialRampToValueAtTime(1400, t + 3.8);
  g.gain.setValueAtTime(0.28, t + 1.0); g.gain.exponentialRampToValueAtTime(0.001, t + 3.9);
  o.connect(g); g.connect(introACtx.destination); o.start(t + 1.0); o.stop(t + 4.0);
  if (introFireGain) {
    introFireGain.gain.setValueAtTime(0.13, t + 0.8);
    introFireGain.gain.linearRampToValueAtTime(0.0, t + 3.8);
  }
}

function stopIntroAudio() {
  if (introFireSrc) { try { introFireSrc.stop(); } catch(e) {} introFireSrc = null; }
  if (introACtx)    { try { introACtx.close();   } catch(e) {} introACtx = null; }
}

function updateStoryIntro(dt) {
  if (mouseClicked || keys[' ']) { keys[' '] = false; endStoryIntro(); return; }

  introTimer += dt; introPhaseTimer += dt;

  // Falling ash emitter
  if (Math.random() < 0.5) {
    introAshParts.push({ x: introCamX + Math.random() * (W + 120), y: -8,
      vx: (Math.random()-0.55)*0.65, vy: 0.55 + Math.random()*1.1,
      size: 1 + Math.floor(Math.random()*2), life: 1 });
  }
  introAshParts.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= dt * 0.17; });
  introAshParts = introAshParts.filter(p => p.life > 0 && p.y < INTRO_GY + 15);

  switch (introPhase) {
    case 0: if (introPhaseTimer >= 1.8) { introPhase = 1; introPhaseTimer = 0; } break;

    case 1:
      introDemonX += 188 * dt;
      introCamX += (Math.max(0, introDemonX - 265) - introCamX) * Math.min(1, dt * 3.8);
      if (introTimer - introLastStep > 0.43) { introLastStep = introTimer; playStepSound(); }
      if (introDemonX >= 1545) { introDemonX = 1545; introPhase = 2; introPhaseTimer = 0; }
      break;

    case 2:
      if (introPhaseTimer >= 2.1) {
        introPhase = 3; introPhaseTimer = 0;
        if (!introLaughPlayed) { introLaughPlayed = true; playLaughSound(); }
      }
      break;

    case 3:
      if (introPhaseTimer > 0.55) introDialogChar = Math.min(INTRO_DIALOG.length, introDialogChar + dt * 35);
      if (introPhaseTimer >= 7.2) {
        introPhase = 4; introPhaseTimer = 0;
        if (!introFlyPlayed) { introFlyPlayed = true; playFlyAwaySound(); }
      }
      break;

    case 4:
      introDemonFlyY  += dt * 140;
      introDemonFlyDX += dt * 100;
      if (introPhaseTimer >= 3.6) { introPhase = 5; introPhaseTimer = 0; }
      break;

    case 5:
      if (introPhaseTimer >= 1.5) endStoryIntro();
      break;
  }
}

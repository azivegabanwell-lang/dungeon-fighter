<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawlers</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a0a12; color: #fff;
    font-family: 'Courier New', monospace;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #wrap { position: relative; }
  canvas {
    display: block;
    background: #1a1f2e;
    border: 3px solid #333;
    box-shadow: 0 0 40px rgba(0,0,0,0.7);
    image-rendering: pixelated;
  }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    background: rgba(8,10,18,0.86);
    gap: 14px;
  }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: 48px; margin: 0; letter-spacing: 4px; text-shadow: 0 0 18px #4af; }
  .overlay h2 { font-size: 26px; margin: 6px 0; }
  .overlay p  { margin: 4px 0; color: #aab; font-size: 14px; line-height: 1.5; }
  .btn {
    font-family: inherit; font-size: 18px; font-weight: bold;
    padding: 10px 26px; margin: 4px;
    background: #2b3147; color: #fff;
    border: 2px solid #55607f; border-radius: 8px;
    cursor: pointer; transition: all 0.12s;
  }
  .btn:hover { background: #3d4768; border-color: #88a; transform: translateY(-2px); }
  .row { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; max-width: 840px; }
  .charBtn {
    width: 94px; padding: 6px 4px;
    background: #20263a; border: 2px solid #444f70; border-radius: 8px;
    cursor: pointer; transition: all 0.12s;
  }
  .charBtn:hover { transform: translateY(-2px); border-color: #fff; }
  .charBtn .nm { font-size: 13px; font-weight: bold; }
  .charBtn .st { font-size: 9px; color: #9aa; margin-top: 2px; min-height: 34px; line-height: 1.25; }
  .charBtn .sp { font-size: 9px; margin-top: 3px; color: #ffd76b; }
  .swatch { width: 18px; height: 18px; border-radius: 50%; margin: 3px auto; }
  .small { font-size: 12px; color: #889; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="900" height="540"></canvas>

  <!-- TITLE -->
  <div class="overlay" id="titleScreen">
    <h1>BRAWLERS</h1>
    <p>5 fighters &middot; unique specials &middot; 1v1 or 2v2</p>
    <div class="row">
      <button class="btn" id="btn1v1">1 v 1</button>
      <button class="btn" id="btn2v2">2 v 2</button>
      <button class="btn" id="btnOnline">Online 2P</button>
    </div>
    <p class="small">Move: A / D &nbsp; Jump: W &nbsp; Block: S &nbsp; Punch: J &nbsp; Kick: K &nbsp; Special: L</p>
  </div>

  <!-- CHARACTER SELECT -->
  <div class="overlay hidden" id="selectScreen">
    <h2 id="selTitle">CHOOSE YOUR FIGHTER</h2>
    <div class="row" id="charRow"></div>
    <button class="btn" id="btnBack">&larr; Back</button>
  </div>

  <!-- PAUSE -->
  <div class="overlay hidden" id="pauseScreen">
    <h1>PAUSED</h1>
    <div class="row">
      <button class="btn" id="btnResume">Resume</button>
      <button class="btn" id="btnQuit">Main Menu</button>
    </div>
    <p class="small">Press P or Esc to resume</p>
  </div>

  <!-- ONLINE 2P LOBBY (content filled in by renderOnlineUI) -->
  <div class="overlay hidden" id="onlineScreen"></div>

  <!-- MATCH OVER -->
  <div class="overlay hidden" id="matchScreen">
    <h1 id="matchText">YOU WIN!</h1>
    <p id="matchSub"></p>
    <div class="row">
      <button class="btn" id="btnAgain">Play Again</button>
      <button class="btn" id="btnMenu">Main Menu</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// =====================================================================
// STICK BRAWLERS — a single-file 2D fighting game
// Modes: 1v1 vs CPU, and 2v2 (you + AI ally vs 2 AI). Stickman fighters,
// 5 characters each with a unique special. Meter fills as you fight.
// =====================================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 900, H = 540;

// ---- world constants ----
const GROUND_Y = 470;      // the floor line; a fighter's y is its FEET
const GRAV = 2200;         // px/s^2
const JUMP_V = -780;       // base jump velocity (per-char multiplier applied)
const MAX_FALL = 1400;
const WALL_L = 40, WALL_R = W - 40;
const ROUND_TIME = 60;     // seconds per round
const ROUNDS_TO_WIN = 3;   // first to 3 round wins takes the match
const MAX_HP = 100;
const MAX_METER = 100;
const HITSTOP = 0.05;      // brief global freeze on a clean hit (juice)
const DEBUG = false;       // set true to draw hitboxes

// =====================================================================
// INPUT
// =====================================================================
const keys = {};
const justPressed = new Set();   // edge-triggered (so holding a key doesn't auto-repeat attacks)
addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  if (!keys[e.code]) justPressed.add(e.code);
  keys[e.code] = true;
});
addEventListener('keyup', e => { keys[e.code] = false; });
function clearJustPressed() { justPressed.clear(); }

// Mouse (for the on-screen pause button)
const mouse = { x: 0, y: 0 };
let mouseClicked = false;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top) * (H / r.height);
});
canvas.addEventListener('mousedown', () => { mouseClicked = true; });
const PAUSE_BTN = { x: W / 2 - 17, y: 6, w: 34, h: 22 };
function inPauseBtn() {
  return mouse.x >= PAUSE_BTN.x && mouse.x <= PAUSE_BTN.x + PAUSE_BTN.w &&
         mouse.y >= PAUSE_BTN.y && mouse.y <= PAUSE_BTN.y + PAUSE_BTN.h;
}

// =====================================================================
// CHARACTER DATA — 5 fighters, each a distinct style + unique special
// =====================================================================
const CHARS = [
  { name: 'Blaze', color: '#ff5533', style: 'Zoner. Sears an instant flame beam across the lane.',
    walkSpeed: 200, jumpMul: 1.0,  maxHp: 95,  punchDmg: 6, punchRange: 38, kickDmg: 11, kickRange: 52,
    special: 'beam', specialName: 'FLAME BEAM' },
  { name: 'Nyx', color: '#a06bff', style: 'Rushdown. Vampiric strike that heals on hit.',
    walkSpeed: 270, jumpMul: 1.05, maxHp: 90,  punchDmg: 5, punchRange: 34, kickDmg: 9,  kickRange: 46,
    special: 'lifesteal', specialName: 'DRAIN FANG' },
  { name: 'Titan', color: '#3fa9f5', style: 'Heavyweight. Enrages for big damage & speed.',
    walkSpeed: 150, jumpMul: 0.85, maxHp: 120, punchDmg: 8, punchRange: 40, kickDmg: 15, kickRange: 50,
    special: 'berserk', specialName: 'BERSERK' },
  { name: 'Vex', color: '#2ecc71', style: 'Trickster. Freezes a foe solid to combo them.',
    walkSpeed: 220, jumpMul: 1.15, maxHp: 100, punchDmg: 6, punchRange: 36, kickDmg: 10, kickRange: 48,
    special: 'freeze', specialName: 'STASIS' },
  { name: 'Echo', color: '#f1c40f', style: 'Lancer. Hurls a piercing javelin from afar.',
    walkSpeed: 210, jumpMul: 0.95, maxHp: 100, punchDmg: 6, punchRange: 46, kickDmg: 12, kickRange: 60,
    special: 'javelin', specialName: 'JAVELIN' },
  { name: 'Mirror', color: '#c9d2e0', style: 'Counter. Parries the next hit, then punishes hard.',
    walkSpeed: 205, jumpMul: 1.0,  maxHp: 100, punchDmg: 6, punchRange: 38, kickDmg: 11, kickRange: 50,
    special: 'counter', specialName: 'RIPOSTE' },
  { name: 'Sage', color: '#23c7a7', style: 'Survivor. Meditates to heal — but is defenseless.',
    walkSpeed: 195, jumpMul: 0.95, maxHp: 95,  punchDmg: 6, punchRange: 38, kickDmg: 10, kickRange: 48,
    special: 'heal', specialName: 'MEDITATE' },
  { name: 'Crush', color: '#e2792a', style: 'Grappler. Unblockable grab that ignores guard.',
    walkSpeed: 165, jumpMul: 0.85, maxHp: 115, punchDmg: 7, punchRange: 38, kickDmg: 13, kickRange: 48,
    special: 'grab', specialName: 'SEISMIC GRAB' },
  { name: 'Phantom', color: '#6a5cff', style: 'Trickster. Blinks behind the foe for a backstab.',
    walkSpeed: 235, jumpMul: 1.1,  maxHp: 92,  punchDmg: 6, punchRange: 36, kickDmg: 10, kickRange: 46,
    special: 'teleport', specialName: 'SHADOW STEP' },
  { name: 'Rune', color: '#ff4fcf', style: 'Trapper. Lays a rune that detonates on contact.',
    walkSpeed: 210, jumpMul: 1.0,  maxHp: 98,  punchDmg: 6, punchRange: 40, kickDmg: 11, kickRange: 50,
    special: 'trap', specialName: 'RUNE TRAP' },
  { name: 'Bastion', color: '#4d80b0', style: 'Defender. Raises a shield of total invulnerability.',
    walkSpeed: 175, jumpMul: 0.9,  maxHp: 115, punchDmg: 7, punchRange: 38, kickDmg: 13, kickRange: 50,
    special: 'shield', specialName: 'AEGIS' },
  { name: 'Gale', color: '#8fd9c8', style: 'Spacer. A gust that hurls foes far away.',
    walkSpeed: 250, jumpMul: 1.2,  maxHp: 92,  punchDmg: 6, punchRange: 36, kickDmg: 10, kickRange: 48,
    special: 'repel', specialName: 'GUST' },
  { name: 'Toxin', color: '#a4d61e', style: 'Poisoner. A venom strike that rots health over time.',
    walkSpeed: 200, jumpMul: 1.0,  maxHp: 95,  punchDmg: 6, punchRange: 42, kickDmg: 11, kickRange: 54,
    special: 'venom', specialName: 'VENOM' },
  { name: 'Chrono', color: '#b9c6ff', style: 'Controller. Warps time to slow a foe to a crawl.',
    walkSpeed: 205, jumpMul: 1.0,  maxHp: 98,  punchDmg: 6, punchRange: 38, kickDmg: 11, kickRange: 50,
    special: 'slow', specialName: 'TIME WARP' },
  { name: 'Bramble', color: '#7a8b3a', style: 'Bruiser. Thorns reflect damage back to attackers.',
    walkSpeed: 170, jumpMul: 0.85, maxHp: 120, punchDmg: 8, punchRange: 40, kickDmg: 14, kickRange: 50,
    special: 'thorns', specialName: 'BRAMBLE' },
];

// Normal attacks. Per-char damage/range overrides come from CHARS.
const MOVES = {
  punch: { startup: 0.06, active: 0.05, recovery: 0.14, boxW: 26, boxH: 22, boxYOffset: 50,
           hitstun: 0.28, knockbackVx: 160, knockbackVy: -120, chipMul: 0.25,
           meterOnHit: 8, meterOnBlock: 4, pushOnBlock: 120, sfx: 'hit' },
  kick:  { startup: 0.10, active: 0.07, recovery: 0.22, boxW: 32, boxH: 26, boxYOffset: 30,
           hitstun: 0.40, knockbackVx: 320, knockbackVy: -260, chipMul: 0.30,
           meterOnHit: 12, meterOnBlock: 6, pushOnBlock: 200, sfx: 'kick' },
};

// Special timings (durations in seconds)
const SPECIALS = {
  beam:        { dur: 0.50, startup: 0.20 },
  lifesteal:   { dur: 0.45, startup: 0.10 },
  berserk:     { dur: 0.40 },
  freeze:      { dur: 0.40, startup: 0.12 },
  javelin:     { dur: 0.40, startup: 0.14 },
  counter:     { dur: 0.55 },
  heal:        { dur: 0.80 },
  grab:        { dur: 0.45, startup: 0.10 },
  teleport:    { dur: 0.45, startup: 0.12 },
  trap:        { dur: 0.35 },
  shield:      { dur: 0.30 },
  repel:       { dur: 0.35 },
  venom:       { dur: 0.45, startup: 0.10 },
  slow:        { dur: 0.35, startup: 0.10 },
  thorns:      { dur: 0.30 },
};
// Specials that fight at range — the AI keeps distance and zones with these.
const ZONER_SPECIALS = new Set(['beam', 'javelin']);

// =====================================================================
// SMALL HELPERS
// =====================================================================
function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function feetToBodyRect(f) {
  const h = (f.state === 'block') ? f.h * 0.7 : f.h;
  return { x: f.x - f.w / 2, y: f.y - h, w: f.w, h: h };
}
function nearestOpponent(f) {
  let best = null, bd = Infinity;
  for (const o of state.fighters) {
    if (o.team === f.team || o.state === 'ko') continue;
    const d = Math.abs(o.x - f.x);
    if (d < bd) { bd = d; best = o; }
  }
  return best;
}
function teamHp(fighters, team) {
  return fighters.filter(f => f.team === team).reduce((s, f) => s + f.hp, 0);
}
function teamName(team) {
  const ns = state.fighters.filter(f => f.team === team).map(f => f.name);
  return ns.join(' & ');
}

// =====================================================================
// EFFECTS: particles, floating damage text, audio
// =====================================================================
function spawnParticles(x, y, color, n, spd = 2.4) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = spd * (0.5 + Math.random());
    state.particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1.2,
      life: 0.5, maxLife: 0.5, size: 2 + Math.random() * 2, color });
  }
}
function floatText(x, y, text, color) {
  state.floatTexts.push({ x, y, text: String(text), color, life: 0.8, maxLife: 0.8 });
}
function updateParticles(dt) {
  for (const p of state.particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life -= dt; }
  state.particles = state.particles.filter(p => p.life > 0);
}
function updateFloatTexts(dt) {
  for (const t of state.floatTexts) { t.y -= 60 * dt; t.life -= dt; }
  state.floatTexts = state.floatTexts.filter(t => t.life > 0);
}

let actx = null;
const lastSfx = {};
function sfx(name) {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    const now = actx.currentTime;
    if (lastSfx[name] && now - lastSfx[name] < 0.03) return;
    lastSfx[name] = now;
    const R = ({
      hit:     { type: 'sawtooth', f: 300, f2: 90,  dur: 0.10, vol: 0.20 },
      kick:    { type: 'square',   f: 160, f2: 70,  dur: 0.12, vol: 0.22 },
      block:   { type: 'triangle', f: 520, f2: 480, dur: 0.06, vol: 0.16 },
      special: { type: 'sawtooth', f: 120, f2: 600, dur: 0.30, vol: 0.25 },
      ko:      { type: 'square',   f: 90,  f2: 30,  dur: 0.45, vol: 0.30 },
      jump:    { type: 'sine',     f: 300, f2: 520, dur: 0.10, vol: 0.12 },
    })[name] || { type: 'square', f: 200, f2: 100, dur: 0.1, vol: 0.15 };
    const o = actx.createOscillator(), g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type = R.type;
    o.frequency.setValueAtTime(R.f, now);
    o.frequency.exponentialRampToValueAtTime(R.f2, now + R.dur);
    g.gain.setValueAtTime(R.vol, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + R.dur);
    o.start(now); o.stop(now + R.dur);
  } catch (e) { /* audio not available */ }
}

// =====================================================================
// GAME STATE
// =====================================================================
let state = null;
function freshState() {
  return {
    mode: 'title',           // title | select | fight | roundOver | matchOver
    is2v2: false,
    lineup: [],              // [{charId, team, isPlayer, x, facing}]
    fighters: [],
    projectiles: [], shockwaves: [], traps: [], particles: [], floatTexts: [],
    roundTime: ROUND_TIME, roundNum: 1, teamRounds: [0, 0],
    banner: '', roundOverTimer: 0, lastWinner: -1,
    shake: 0, hitstop: 0,
    countdown: 0, online_over: false, online_matchWon: -1,
  };
}
state = freshState();
let lastDt = 1 / 60;

// =====================================================================
// FIGHTER FACTORY & ROUND SETUP
// =====================================================================
function makeFighter(spec) {
  const ch = CHARS[spec.charId];
  return {
    charId: spec.charId, team: spec.team, isPlayer: !!spec.isPlayer, isCPU: !spec.isPlayer,
    controller: spec.controller || (spec.isPlayer ? 'local' : 'cpu'), // 'local' | 'remote' | 'cpu'
    name: ch.name, color: ch.color,
    x: spec.x, y: GROUND_Y, vx: 0, vy: 0, facing: spec.facing, onGround: true,
    w: 34, h: 86,
    hp: ch.maxHp, maxHp: ch.maxHp, meter: 0, maxMeter: MAX_METER, roundsWon: 0,
    state: 'idle', stateTimer: 0, attackName: null, specialName: null,
    hasHit: false, facingLocked: false, blockHeld: false,
    invuln: 0, hitFlash: 0, recoil: 0, hitstunDur: 0,
    walkPhase: 0, bobPhase: Math.random() * 6,
    spawnedProj: false, shockDone: false, flurryTick: 1, countering: false, tpDone: false,
    buffTimer: 0, frozen: 0, poisonTimer: 0, poisonTick: 0, slowTimer: 0, shieldTimer: 0, thornsTimer: 0, kickCooldown: 0,
    ai: { decideTimer: 0, attackCooldown: 0, blockTimer: 0, aggression: 0.3 + Math.random() * 0.5,
          desiredDir: 0, wantJump: false, wantBlock: false, wantPunch: false, wantKick: false, wantSpecial: false },
  };
}
function buildLineup(charId, is2v2) {
  const used = new Set([charId]);
  const pick = () => { let c; do { c = Math.floor(Math.random() * CHARS.length); } while (used.has(c)); used.add(c); return c; };
  if (!is2v2) {
    return [
      { charId, team: 0, isPlayer: true, x: 300, facing: 1 },
      { charId: pick(), team: 1, isPlayer: false, x: 600, facing: -1 },
    ];
  }
  return [
    { charId, team: 0, isPlayer: true, x: 230, facing: 1 },
    { charId: pick(), team: 0, isPlayer: false, x: 360, facing: 1 },
    { charId: pick(), team: 1, isPlayer: false, x: 540, facing: -1 },
    { charId: pick(), team: 1, isPlayer: false, x: 670, facing: -1 },
  ];
}
function setupRound() {
  state.fighters = state.lineup.map(makeFighter);
  state.projectiles = []; state.shockwaves = []; state.traps = []; state.particles = []; state.floatTexts = [];
  state.roundTime = ROUND_TIME; state.hitstop = 0; state.shake = 0;
}
function startMatch(charId, is2v2) {
  state.is2v2 = is2v2;
  state.lineup = buildLineup(charId, is2v2);
  state.teamRounds = [0, 0];
  state.roundNum = 1;
  setupRound();
  state.mode = 'fight';
  hideOverlays();
}

// =====================================================================
// COMBAT
// =====================================================================
function computeHitbox(f) {
  if (f.attackName === 'special') return specialHitbox(f);
  if (f.attackName !== 'punch' && f.attackName !== 'kick') return null;
  const m = MOVES[f.attackName];
  if (f.stateTimer < m.startup || f.stateTimer > m.startup + m.active) return null;
  const ch = CHARS[f.charId];
  const range = f.attackName === 'punch' ? ch.punchRange : ch.kickRange;
  const dmg = (f.attackName === 'punch' ? ch.punchDmg : ch.kickDmg) * (f.buffTimer > 0 ? 1.6 : 1);
  const front = f.x + f.facing * (f.w / 2);
  const w = m.boxW + range;
  const bx = f.facing > 0 ? front : front - w;
  return { x: bx, y: f.y - m.boxYOffset - m.boxH / 2, w, h: m.boxH, dmg, move: m };
}
function specialHitbox(f) {
  const ch = CHARS[f.charId], t = f.stateTimer, fc = f.facing, name = f.specialName;
  function box(reach, w, yOff, h, dmg, mv) {
    const front = f.x + fc * (f.w / 2);
    const fullW = w + reach;
    const bx = fc > 0 ? front : front - fullW;
    return { x: bx, y: f.y - yOff - h / 2, w: fullW, h, dmg, move: mv };
  }
  if (name === 'beam') {
    if (t < SPECIALS.beam.startup || t > SPECIALS.beam.startup + 0.16) return null;
    return box(360, 30, 56, 30, 20,  // long instant lane
      { hitstun: 0.4, knockbackVx: 300, knockbackVy: -160, chipMul: 0.4, meterOnHit: 4, meterOnBlock: 5, pushOnBlock: 150, sfx: 'special' });
  }
  if (name === 'lifesteal') {
    if (t < SPECIALS.lifesteal.startup || t > SPECIALS.lifesteal.startup + 0.12) return null;
    return box(ch.kickRange * 0.4, 34, 52, 40, 16,
      { hitstun: 0.4, knockbackVx: 200, knockbackVy: -160, chipMul: 0.2, meterOnHit: 4, meterOnBlock: 4, pushOnBlock: 120, sfx: 'special', lifesteal: 0.7 });
  }
  if (name === 'venom') {
    if (t < SPECIALS.venom.startup || t > SPECIALS.venom.startup + 0.12) return null;
    return box(ch.kickRange * 0.4, 34, 52, 40, 8,
      { hitstun: 0.3, knockbackVx: 120, knockbackVy: -100, chipMul: 0.2, meterOnHit: 4, meterOnBlock: 4, pushOnBlock: 100, sfx: 'special', poison: 4.0 });
  }
  if (name === 'grab') {
    if (t < SPECIALS.grab.startup || t > SPECIALS.grab.startup + 0.12) return null;
    const b = box(8, 30, 50, 60, 24,
      { hitstun: 0.5, knockbackVx: 120, knockbackVy: -360, chipMul: 0, meterOnHit: 4, meterOnBlock: 0, pushOnBlock: 0, sfx: 'special', unblockable: true });
    b.isGrab = true;
    return b;
  }
  if (name === 'teleport') {
    if (!f.tpDone || t > SPECIALS.teleport.startup + 0.14) return null;
    return box(10, 30, 52, 46, 17,
      { hitstun: 0.45, knockbackVx: 300, knockbackVy: -200, chipMul: 0.25, meterOnHit: 4, meterOnBlock: 4, pushOnBlock: 150, sfx: 'special' });
  }
  return null; // berserk (buff), freeze (on activation), pull (vortex), counter, heal, trap — no direct hitbox
}

function isBlocking(t, a) {
  if (!t.blockHeld || !t.onGround) return false;
  const toward = a.x >= t.x ? 1 : -1;
  return t.facing === toward;
}
// Pure damage math (no audio/particles) so it can be unit-tested headlessly.
function resolveHit(a, t, box) {
  const m = box.move;
  t.hp = Math.max(0, t.hp - box.dmg);
  t.state = 'hitstun'; t.stateTimer = 0; t.hitstunDur = m.hitstun;
  t.attackName = null; t.specialName = null; t.hasHit = false; t.facingLocked = false;
  const away = (t.x < a.x) ? -1 : 1;
  t.vx = away * m.knockbackVx; t.vy = m.knockbackVy;

    teamName(0).toUpperCase() + '  ' + state.teamRounds[0] + ' — ' + state.teamRounds[1] + '  ' + teamName(1).toUpperCase();
  document.getElementById('matchScreen').classList.remove('hidden');
}

// =====================================================================
// RENDERING
// =====================================================================
function limb(x1, y1, x2, y2) { ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); }
// Darken a #rrggbb color (fr<1 → darker) for trim/shading.
function darken(hex, fr) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, ((n >> 16) & 255) * fr | 0);
  const g = Math.max(0, ((n >> 8) & 255) * fr | 0);
  const b = Math.max(0, (n & 255) * fr | 0);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}
// Begin a rounded-rect path (call ctx.fill()/ctx.stroke() after).
function rpath(x, y, w, h, r) {
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x, y, w, h, r); else ctx.rect(x, y, w, h);
}
// A chunky limb: a thick rounded stroke with a round cap (fist or shoe).
function drawLimb(x1, y1, x2, y2, limbCol, capCol, capR) {
  ctx.strokeStyle = limbCol; ctx.lineWidth = 8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  if (capCol) {
    ctx.fillStyle = capCol; ctx.beginPath(); ctx.arc(x2, y2, capR, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.stroke();
  }
}
function attackExt(f, name) {
  const m = MOVES[name], t = f.stateTimer;
  let frac;
  if (t < m.startup) frac = t / m.startup * 0.6;
  else if (t < m.startup + m.active) frac = 1;
  else frac = Math.max(0, 1 - (t - m.startup - m.active) / m.recovery);
  const reach = name === 'punch' ? CHARS[f.charId].punchRange : CHARS[f.charId].kickRange;
  return frac * (reach * 0.5 + 12);
}
function drawKO(f, col, skin) {
  skin = skin || '#f1c197';
  const x = f.x, y = GROUND_Y;
  ctx.save(); ctx.translate(x, y - 7); ctx.rotate(f.facing * 0.05);
  rpath(-15, -9, 30, 15, 6); ctx.fillStyle = col; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.stroke();         // body lying
  rpath(-27, -9, 15, 15, 5); ctx.fillStyle = skin; ctx.fill(); ctx.stroke();    // head
  drawLimb(10, -2, 19, 5, col, skin, 4);                                        // legs sprawled
  drawLimb(10, -2, 19, -8, col, skin, 4);
  drawLimb(-4, 4, 4, 12, col, skin, 4);                                         // arm
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;                                // X eye
  ctx.beginPath(); ctx.moveTo(-23, -4); ctx.lineTo(-19, 0); ctx.moveTo(-19, -4); ctx.lineTo(-23, 0); ctx.stroke();
  ctx.restore();
}
function drawSpecialArms(f, sx, armY, fc) {
  limb(sx, armY, sx + fc * 18, armY - 4);
  limb(sx, armY, sx + fc * 16, armY + 7);
  ctx.save(); ctx.globalAlpha = 0.55; ctx.fillStyle = f.color;
  ctx.beginPath(); ctx.arc(sx + fc * 22, armY, 8, 0, Math.PI * 2); ctx.fill(); ctx.restore();
}
function drawFighter(f) {
  const fc = f.facing, col = f.color, x = f.x;
  const skin = '#f1c197', trim = darken(col, 0.55);

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  const airH = GROUND_Y - f.y;
  ctx.beginPath(); ctx.ellipse(x, GROUND_Y + 3, Math.max(9, 18 - airH * 0.03), 5, 0, 0, Math.PI * 2); ctx.fill();

  if (f.state === 'ko') { drawKO(f, col, skin); return; }

  // Berserk aura (Titan)
  if (f.buffTimer > 0) {
    ctx.save(); ctx.globalAlpha = 0.25 + Math.sin(Date.now() / 80) * 0.12;
    ctx.strokeStyle = col; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(f.x, f.y - 40, 26, 46, 0, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
  }

  const crouch = (f.state === 'block') ? 12 : 0;
  const y = f.y;
  const bob = (f.state === 'idle') ? Math.sin(f.bobPhase) * 1.2 : 0;
  const lean = (f.state === 'hitstun') ? f.recoil * 7 : 0;
  const cx = x + lean;
  const hipY = y - 22 + crouch;
  const torsoTop = y - 52 + crouch + bob;
  const shoulderY = torsoTop + 6;
  const headTop = torsoTop - 18;

  // ---- LEGS (drawn first, behind torso) ----
  const swing = (f.state === 'walk' && f.onGround) ? Math.sin(f.walkPhase) * 7 : 0;
  if (f.attackName === 'kick') {
    const e = attackExt(f, 'kick');
    drawLimb(x - fc * 4, hipY, x - fc * 8, y - 3, col, trim, 5);          // support leg
    drawLimb(x, hipY, x + fc * (16 + e), hipY - 8, col, trim, 6);         // kicking leg
  } else if (f.state === 'jump') {
    drawLimb(x - 5, hipY, x - 10, y - 16, col, trim, 5);
    drawLimb(x + 5, hipY, x + 11, y - 14, col, trim, 5);
  } else {
    drawLimb(x - 6, hipY, x - 7 + swing, y - 3, col, trim, 5);
    drawLimb(x + 6, hipY, x + 7 - swing, y - 3, col, trim, 5);
  }

  // ---- TORSO ----
  rpath(cx - 14, torsoTop, 28, 30, 6); ctx.fillStyle = col; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.14)'; ctx.fillRect(cx - 11, torsoTop + 4, 9, 12); // chest highlight
  ctx.fillStyle = trim; ctx.fillRect(cx - 14, torsoTop + 22, 28, 5);                    // belt

  // ---- ARMS (over torso) ----
  const aSwing = (f.state === 'walk') ? Math.sin(f.walkPhase) * 6 : 0;
  if (f.attackName === 'punch') {
    const e = attackExt(f, 'punch');
    drawLimb(cx - fc * 6, shoulderY + 2, cx - fc * 9, shoulderY + 13, col, skin, 5);    // rear guard
    drawLimb(cx + fc * 6, shoulderY, cx + fc * (18 + e), shoulderY + 1, col, skin, 6);  // punch
  } else if (f.attackName === 'special') {
    drawLimb(cx + fc * 5, shoulderY, cx + fc * 18, shoulderY - 3, col, skin, 6);
    drawLimb(cx + fc * 5, shoulderY + 4, cx + fc * 17, shoulderY + 8, col, skin, 6);
    ctx.save(); ctx.globalAlpha = 0.55; ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(cx + fc * 24, shoulderY + 2, 9, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  } else if (f.state === 'block') {
    drawLimb(cx + fc * 4, shoulderY, cx + fc * 12, shoulderY - 3, col, skin, 5);
    drawLimb(cx + fc * 4, shoulderY + 6, cx + fc * 13, shoulderY + 8, col, skin, 5);
  } else if (f.state === 'jump') {
    drawLimb(cx - fc * 5, shoulderY, cx - fc * 9, shoulderY - 10, col, skin, 5);
    drawLimb(cx + fc * 5, shoulderY, cx + fc * 10, shoulderY - 9, col, skin, 5);
  } else {
    drawLimb(cx - fc * 5, shoulderY + 1, cx - fc * 7 + aSwing, shoulderY + 13, col, skin, 5);
    drawLimb(cx + fc * 5, shoulderY + 1, cx + fc * 9 - aSwing, shoulderY + 7, col, skin, 5); // guard fist
  }

  // ---- HEAD ----
  rpath(cx - 9, headTop, 18, 18, 5); ctx.fillStyle = skin; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.stroke();
  ctx.fillStyle = col; ctx.fillRect(cx - 9, headTop + 2, 18, 4);                          // headband
  if (fc > 0) ctx.fillRect(cx - 13, headTop + 3, 5, 9); else ctx.fillRect(cx + 8, headTop + 3, 5, 9); // band tail
  // face (eyes + brow, facing direction)
  const ex = cx + fc * 1;
  ctx.fillStyle = '#222';
  ctx.fillRect(ex + fc * 1, headTop + 9, 2, 3);
  ctx.fillRect(ex + fc * 5, headTop + 9, 2, 3);
  ctx.lineWidth = 1.5; ctx.strokeStyle = '#222';
  ctx.beginPath(); ctx.moveTo(ex, headTop + 8); ctx.lineTo(ex + fc * 7, headTop + 9); ctx.stroke();

  // ---- hit flash ----
  if (f.hitFlash > 0) {
    ctx.globalAlpha = Math.min(1, f.hitFlash / 0.12) * 0.6;
    ctx.fillStyle = '#fff';
    rpath(cx - 14, torsoTop, 28, 30, 6); ctx.fill();
    rpath(cx - 9, headTop, 18, 18, 5); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // ---- frozen (Vex's Stasis) ----
  if (f.frozen > 0) {
    ctx.save();
    ctx.globalAlpha = 0.5; ctx.fillStyle = '#aef0ff';
    ctx.fillRect(f.x - 19, headTop - 4, 38, (y + 2) - (headTop - 4));
    ctx.globalAlpha = 0.9; ctx.strokeStyle = '#e6fbff'; ctx.lineWidth = 2;
    ctx.strokeRect(f.x - 19, headTop - 4, 38, (y + 2) - (headTop - 4));
    ctx.restore();
  }
  // ---- poison tint (Toxin's Venom) ----
  if (f.poisonTimer > 0) {
    ctx.save(); ctx.globalAlpha = 0.18 + Math.sin(Date.now() / 150) * 0.08;
    ctx.fillStyle = '#a4d61e'; ctx.fillRect(f.x - 16, headTop, 32, (y) - headTop); ctx.restore();
  }
  // ---- shield bubble (Bastion's Aegis) ----
  if (f.shieldTimer > 0) {
    ctx.save();
    ctx.globalAlpha = 0.18 + Math.sin(Date.now() / 100) * 0.08; ctx.fillStyle = '#bfe9ff';
    ctx.beginPath(); ctx.arc(f.x, f.y - 40, 34, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.7; ctx.strokeStyle = '#dff3ff'; ctx.lineWidth = 3; ctx.stroke();
    ctx.restore();
  }
}
function drawMarker(f) {
  const x = f.x, y = f.y - (f.state === 'ko' ? 0 : 96);
  if (f.state === 'ko') return;
  ctx.fillStyle = '#ffe04a';
  ctx.beginPath(); ctx.moveTo(x, y + 8); ctx.lineTo(x - 7, y); ctx.lineTo(x + 7, y); ctx.closePath(); ctx.fill();
}
function drawBeams() {
  for (const f of state.fighters) {
    if (f.attackName !== 'special' || f.specialName !== 'beam') continue;
    const t = f.stateTimer;
    if (t < SPECIALS.beam.startup || t > SPECIALS.beam.startup + 0.16) continue;
    const fc = f.facing, w = 30 + 360, front = f.x + fc * (f.w / 2);
    const bx = fc > 0 ? front : front - w, by = f.y - 56 - 15;
    ctx.save();
    ctx.shadowColor = f.color; ctx.shadowBlur = 22;
    ctx.globalAlpha = 0.55 + Math.random() * 0.3; ctx.fillStyle = f.color;
    ctx.fillRect(bx, by, w, 30);
    ctx.globalAlpha = 0.5; ctx.fillStyle = '#fff';
    ctx.fillRect(bx, by + 11, w, 8);
    ctx.restore();
  }
}
function drawProjectiles() {
  for (const p of state.projectiles) {
    ctx.save();
    ctx.shadowColor = p.color; ctx.shadowBlur = 14;
    if (p.kind === 'spear') {
      const d = p.dir || (p.vx >= 0 ? 1 : -1);
      ctx.strokeStyle = '#cda86a'; ctx.lineWidth = 4; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(p.x - d * 16, p.y); ctx.lineTo(p.x + d * 12, p.y); ctx.stroke(); // shaft
      ctx.fillStyle = p.color; // spear tip
      ctx.beginPath(); ctx.moveTo(p.x + d * 22, p.y); ctx.lineTo(p.x + d * 10, p.y - 5); ctx.lineTo(p.x + d * 10, p.y + 5); ctx.closePath(); ctx.fill();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.8;
      ctx.beginPath(); ctx.arc(p.x - p.vx * 0.004, p.y, p.r * 0.45, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}
function drawTraps() {
  for (const tr of state.traps) {
    const pulse = tr.arm > 0 ? 0.4 : 0.6 + Math.sin(Date.now() / 120) * 0.3;
    ctx.save(); ctx.globalAlpha = Math.max(0.2, pulse);
    ctx.strokeStyle = tr.color; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(tr.x, GROUND_Y, 18, 7, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = pulse * 0.5; ctx.fillStyle = tr.color;
    ctx.beginPath(); ctx.ellipse(tr.x, GROUND_Y, 9, 3.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}
function drawShockwaves() {
  for (const s of state.shockwaves) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, s.life / 0.5) * 0.8;
    ctx.strokeStyle = s.color; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.ellipse(s.x, s.y, s.r, s.r * 0.4, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
}
function drawParticles() {
  for (const p of state.particles) {
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}
function drawFloatTexts() {
  ctx.font = 'bold 20px Courier New'; ctx.textAlign = 'center';
  for (const t of state.floatTexts) {
    ctx.globalAlpha = Math.min(1, t.life / t.maxLife);
    ctx.fillStyle = '#000'; ctx.fillText(t.text, t.x + 1, t.y + 1);
    ctx.fillStyle = t.color; ctx.fillText(t.text, t.x, t.y);
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}
function drawBackground() {
  // sky
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#2a3050'); g.addColorStop(1, '#4a4060');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, GROUND_Y);
  // distant buildings
  ctx.fillStyle = '#232842';
  for (let i = 0; i < 9; i++) {
    const bw = 70, bx = i * 100 + 10, bh = 120 + (i * 53 % 90);
    ctx.fillRect(bx, GROUND_Y - bh, bw, bh);
  }
  // ground
  ctx.fillStyle = '#2b2436'; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = '#3c3450'; ctx.fillRect(0, GROUND_Y, W, 5);
}
function drawBar(x, y, w, h, pct, color, align) {
  ctx.fillStyle = '#1a1a26'; ctx.fillRect(x, y, w, h);
  const fw = w * clamp(pct, 0, 1);
  ctx.fillStyle = color;
  if (align === 'right') ctx.fillRect(x + w - fw, y, fw, h);
  else ctx.fillRect(x, y, fw, h);
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
}
function drawSideHud(team, side) {
  const barW = 320, x = side === 'left' ? 20 : W - 20 - barW;
  let y = 18;
  for (const f of team) {
    drawBar(x, y, barW, 18, f.hp / f.maxHp, f.color, side === 'left' ? 'left' : 'right');
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Courier New';
    ctx.textAlign = side === 'left' ? 'left' : 'right';
    ctx.fillText(f.name, side === 'left' ? x : x + barW, y + 33);
    const full = f.meter >= f.maxMeter;
    drawBar(x, y + 22, barW, 6, f.meter / f.maxMeter, full ? '#fff' : '#3a9bf0', side === 'left' ? 'left' : 'right');
    if (full) {
      ctx.fillStyle = '#ffd76b'; ctx.font = 'bold 10px Courier New';
      ctx.textAlign = side === 'left' ? 'right' : 'left';
      ctx.fillText('SPECIAL!', side === 'left' ? x + barW : x, y + 31);
    }
    y += 46;
  }
  ctx.textAlign = 'left';
}
function drawPips(team, cx, cy, right) {
  for (let i = 0; i < ROUNDS_TO_WIN; i++) {
    const px = cx + (right ? 1 : -1) * (i * 18);
    ctx.beginPath(); ctx.arc(px, cy, 6, 0, Math.PI * 2);
    ctx.fillStyle = i < state.teamRounds[team] ? '#ffd76b' : '#444';
    ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.stroke();
  }
}
function drawHUD() {
  const t0 = state.fighters.filter(f => f.team === 0);
  const t1 = state.fighters.filter(f => f.team === 1);
  drawSideHud(t0, 'left'); drawSideHud(t1, 'right');
  // timer
  ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Courier New'; ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(Math.max(0, state.roundTime)), W / 2, 62);
  // round pips
  drawPips(0, W / 2 - 60, 44, false);
  drawPips(1, W / 2 + 60, 44, true);
  ctx.textAlign = 'left';
  drawPauseButton();
}
function drawPauseButton() {
  if (state.mode !== 'fight' || (net && net.active)) return; // no pausing in online play
  const b = PAUSE_BTN;
  ctx.fillStyle = inPauseBtn() ? 'rgba(80,90,130,0.85)' : 'rgba(0,0,0,0.45)';
  ctx.fillRect(b.x, b.y, b.w, b.h);
  ctx.strokeStyle = '#8890b8'; ctx.lineWidth = 2; ctx.strokeRect(b.x, b.y, b.w, b.h);
  ctx.fillStyle = '#fff';
  ctx.fillRect(b.x + 11, b.y + 6, 4, b.h - 12);
  ctx.fillRect(b.x + 19, b.y + 6, 4, b.h - 12);
}
function drawBanner() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, H / 2 - 50, W, 100);
  ctx.fillStyle = '#ffd76b'; ctx.font = 'bold 38px Courier New'; ctx.textAlign = 'center';
  ctx.fillText(state.banner, W / 2, H / 2 + 12);
  ctx.textAlign = 'left';
}
function drawHitboxes() {
  ctx.strokeStyle = '#f0f'; ctx.lineWidth = 1;
  for (const f of state.fighters) {
    const b = feetToBodyRect(f); ctx.strokeStyle = '#0f0'; ctx.strokeRect(b.x, b.y, b.w, b.h);
    const hb = computeHitbox(f); if (hb) { ctx.strokeStyle = '#f00'; ctx.strokeRect(hb.x, hb.y, hb.w, hb.h); }
  }
}
function draw() {
  let shx = 0, shy = 0;
  if (state.shake > 0) { shx = (Math.random() - 0.5) * state.shake; shy = (Math.random() - 0.5) * state.shake; }
  ctx.save(); ctx.translate(shx, shy);
  drawBackground();
  drawTraps();
  if (state.fighters.length) {
    for (const f of state.fighters) drawFighter(f);
    for (const f of state.fighters) if ((net && net.active) ? f.team === net.myTeam : f.isPlayer) drawMarker(f);
    drawBeams(); drawShockwaves(); drawProjectiles(); drawParticles(); drawFloatTexts();
  }
  ctx.restore();
  if (state.mode === 'fight' || state.mode === 'roundOver' || state.mode === 'paused') drawHUD();
  if (state.mode === 'roundOver') drawBanner();
  if (net && net.active && state.countdown > 0 && !state.online_over) {
    const c = state.countdown;
    const txt = c > 2.4 ? '3' : c > 1.4 ? '2' : c > 0.4 ? '1' : 'GO!';
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0, H / 2 - 60, W, 120);
    ctx.fillStyle = '#ffd76b'; ctx.font = 'bold 80px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(txt, W / 2, H / 2 + 28); ctx.textAlign = 'left';
  }
  if (DEBUG && state.fighters.length) drawHitboxes();
}

// =====================================================================
// MAIN LOOP
// =====================================================================
function update(dt) {
  lastDt = dt;

  // Online play runs its own loop (host simulates, guest renders snapshots).
  if (net && net.active) { updateOnline(dt); return; }

  // Pause toggle (P / Esc key, or clicking the on-screen pause button)
  const pausePressed = justPressed.has('KeyP') || justPressed.has('Escape') ||
                       (mouseClicked && state.mode === 'fight' && inPauseBtn());
  if (pausePressed) {
    if (state.mode === 'fight') { pauseGame(); clearJustPressed(); mouseClicked = false; return; }
    if (state.mode === 'paused') { resumeGame(); clearJustPressed(); mouseClicked = false; return; }
  }
  if (state.mode === 'paused') { clearJustPressed(); mouseClicked = false; return; }

  if (state.shake > 0) state.shake = Math.max(0, state.shake - dt * 30);
  updateParticles(dt); updateFloatTexts(dt);
  mouseClicked = false;

  if (state.mode === 'roundOver') {
    state.roundOverTimer -= dt;
    if (state.roundOverTimer <= 0) nextRound();
    clearJustPressed(); return;
  }
  if (state.mode !== 'fight') { clearJustPressed(); return; }
  if (state.hitstop > 0) { state.hitstop -= dt; clearJustPressed(); return; }

  state.roundTime -= dt;
  for (const f of state.fighters) updateFighter(f, dt);
  resolveCombat();
  updateProjectiles(dt); updateShockwaves(dt); updateTraps(dt);

  const r = checkRoundOver(state.fighters);
  if (r !== -1) endRound(r);
  else if (state.roundTime <= 0) endRound(timeoutWinner());

  clearJustPressed();
}
let lastT = 0;
function gameLoop(t) {
  const dt = Math.min((t - lastT) / 1000 || 0, 0.05);
  lastT = t;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

function buildCharRow() {

      '<div class="swatch" style="background:' + ch.color + '"></div>' +
      '<div class="nm" style="color:' + ch.color + '">' + ch.name + '</div>' +
      '<div class="st">' + ch.style + '</div>' +
      '<div class="sp">★ ' + ch.specialName + '</div>';
    b.onclick = () => startMatch(i, pendingMode);
    row.appendChild(b);
  });
}
document.getElementById('btn1v1').onclick = () => showSelect(false);
document.getElementById('btn2v2').onclick = () => showSelect(true);
document.getElementById('btnBack').onclick = () => showTitle();
document.getElementById('btnAgain').onclick = () => showSelect(state.is2v2);
document.getElementById('btnMenu').onclick = () => showTitle();
document.getElementById('btnResume').onclick = () => resumeGame();
document.getElementById('btnQuit').onclick = () => showTitle();
document.getElementById('btnOnline').onclick = () => onlineOpen();

// =====================================================================
// ONLINE 2-PLAYER (peer-to-peer via WebRTC / PeerJS)
// The host runs the authoritative match and streams snapshots; the guest
// sends its input and renders what it receives. Players join by a code.
// =====================================================================
let net = null;
const NO_INTENT = { left: false, right: false, jump: false, block: false, punch: false, kick: false, special: false };

function genCode() {
  const cs = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = ''; for (let i = 0; i < 4; i++) s += cs[Math.floor(Math.random() * cs.length)];
  return s;
}
function baseNet() {
  return { active: false, isHost: false, code: '', peer: null, conn: null, connected: false,
    phase: 'menu', myTeam: 0, localReady: false, remoteReady: false, remoteInput: NO_INTENT, error: '', lineup: null,
    localChar: null, remoteChar: null };
}
function send(obj) { try { if (net && net.conn && net.conn.open) net.conn.send(obj); } catch (e) {} }
function notify(msg) { if (typeof alert === 'function') alert(msg); }

function onlineOpen() {
  teardownNet(); net = baseNet(); net.phase = 'menu';
  state = freshState(); state.mode = 'onlineMenu';
  hideOverlays(); renderOnlineUI();
}
function peerErr(e) {
  const t = (e && e.type) || '';
  if (t === 'unavailable-id') return 'That code is taken — try Create again.';
  if (t === 'peer-unavailable') return 'No game found with that code.';
  if (t === 'network' || t === 'server-error') return 'Network problem reaching the connection service.';
  return 'Connection error' + (t ? (': ' + t) : '.');
}
function onlineCreate() {
  if (typeof Peer === 'undefined') { net.phase = 'error'; net.error = 'Networking failed to load (check your internet).'; renderOnlineUI(); return; }
  net.isHost = true; net.myTeam = 0; net.code = genCode(); net.phase = 'connecting'; net.error = ''; renderOnlineUI();
  try {
    net.peer = new Peer('sbrawl-' + net.code);
    net.peer.on('open', () => { net.phase = 'waiting'; renderOnlineUI(); });
    net.peer.on('connection', c => setupConn(c));
    net.peer.on('error', e => { net.phase = 'error'; net.error = peerErr(e); renderOnlineUI(); });
  } catch (e) { net.phase = 'error'; net.error = String(e); renderOnlineUI(); }
}
function onlineJoin() {
  if (typeof Peer === 'undefined') { net.phase = 'error'; net.error = 'Networking failed to load (check your internet).'; renderOnlineUI(); return; }
  const inp = document.getElementById('joinCode');
  const code = (inp ? inp.value : '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 4);
  if (code.length < 4) { net.error = 'Enter the 4-character code.'; renderOnlineUI(); return; }
  net.isHost = false; net.myTeam = 1; net.code = code; net.phase = 'connecting'; net.error = ''; renderOnlineUI();
  try {
    net.peer = new Peer();
    net.peer.on('open', () => {
      setupConn(net.peer.connect('sbrawl-' + code, { reliable: true }));
      setTimeout(() => { if (net && !net.connected && net.phase === 'connecting') { net.phase = 'error'; net.error = 'Could not find that game. Check the code.'; renderOnlineUI(); } }, 9000);
    });
    net.peer.on('error', e => { net.phase = 'error'; net.error = peerErr(e); renderOnlineUI(); });
  } catch (e) { net.phase = 'error'; net.error = String(e); renderOnlineUI(); }
}
// ---- Quick Match (codeless auto-pairing via shared matchmaking slots) ----
const MM_SLOTS = 6;
function shuffleSlots() {
  const a = []; for (let i = 0; i < MM_SLOTS; i++) a.push(i);
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}
function quickMatch() {
  teardownNet(); net = baseNet(); net.phase = 'searching';
  state = freshState(); state.mode = 'onlineMenu';
  hideOverlays(); document.getElementById('onlineScreen').classList.remove('hidden');
  if (typeof Peer === 'undefined') { net.phase = 'error'; net.error = 'Networking failed to load (check your internet).'; renderOnlineUI(); return; }
  net.mmRounds = 0;
  renderOnlineUI();
  mmSeek();
}
function mmSeek() { // look for a player already waiting in a slot
  if (!net || net.phase !== 'searching') return;
  trySeekSlot(shuffleSlots(), 0);
}
function trySeekSlot(slots, i) {
  if (!net || net.phase !== 'searching') return;
  if (i >= slots.length) { mmHost(); return; }   // none waiting → become a host
  let gp; try { gp = new Peer(); } catch (e) { mmHost(); return; }
  net.peer = gp;
  let done = false;
  const next = () => { if (done) return; done = true; try { gp.destroy(); } catch (e) {} trySeekSlot(slots, i + 1); };
  gp.on('open', () => {
    let c; try { c = gp.connect('sbrawl-mm-' + slots[i], { reliable: true }); } catch (e) { next(); return; }
    const to = setTimeout(() => { if (!net || !net.connected) next(); }, 3000);
    c.on('open', () => {
      c.on('data', m => {
        if (done || !m) return;
        if (m.type === 'paired') { done = true; clearTimeout(to); mmPaired(c, gp, false); }
        else if (m.type === 'busy') { clearTimeout(to); next(); }
      });
    });
    c.on('error', () => { clearTimeout(to); next(); });
  });
  gp.on('error', () => next());
}
function mmHost() { // claim a free slot and wait for someone to join
  if (!net || net.phase !== 'searching') return;
  net.mmRounds++;
  if (net.mmRounds > 10) { net.phase = 'error'; net.error = 'Could not find an opponent. Please try again.'; renderOnlineUI(); return; }
  tryHostSlot(shuffleSlots(), 0);
}
function tryHostSlot(slots, i) {
  if (!net || net.phase !== 'searching') return;
  if (i >= slots.length) { setTimeout(() => { if (net && net.phase === 'searching') mmSeek(); }, 700); return; } // all busy → re-seek
  let hp; try { hp = new Peer('sbrawl-mm-' + slots[i]); } catch (e) { tryHostSlot(slots, i + 1); return; }
  net.peer = hp;
  hp.on('open', () => {
    net.isHost = true; net.myTeam = 0;
    // If nobody joins, flip back to seeking so two waiting hosts eventually find each other.
    const reseek = setTimeout(() => {
      if (net && net.phase === 'searching' && !net.connected) { try { hp.destroy(); } catch (e) {} mmSeek(); }
    }, 5000 + Math.random() * 3000);
    hp.on('connection', c => {
      if (net.connected) { c.on('open', () => { try { c.send({ type: 'busy' }); } catch (e) {} }); return; }
      clearTimeout(reseek);
      c.on('open', () => { try { c.send({ type: 'paired' }); } catch (e) {} mmPaired(c, hp, true); });
    });
  });
  hp.on('error', e => {
    const t = (e && e.type) || '';
    try { hp.destroy(); } catch (_) {}
    if (t === 'unavailable-id') tryHostSlot(slots, i + 1); // slot already taken
    else { net.phase = 'error'; net.error = peerErr(e); renderOnlineUI(); }
  });
}
function mmPaired(c, peer, isHost) { // matched! hand off to the normal lobby flow
  if (!net) return;
  net.peer = peer; net.conn = c; net.isHost = isHost; net.myTeam = isHost ? 0 : 1;
  net.connected = true; net.phase = 'lobby'; net.localReady = false; net.remoteReady = false;
  net.localChar = null; net.remoteChar = null;
  c.on('data', onData);
  c.on('close', onPeerLeft);
  c.on('error', onPeerLeft);
  renderOnlineUI();
}

function setupConn(c) {
  net.conn = c;
  c.on('open', () => { net.connected = true; net.phase = 'lobby'; net.localReady = false; net.remoteReady = false; renderOnlineUI(); });
  c.on('data', onData);
  c.on('close', onPeerLeft);
  c.on('error', onPeerLeft);
}
function onData(msg) {
  if (!msg || !net) return;
  if (msg.type === 'ready') { net.remoteReady = true; maybeStart(); renderOnlineUI(); }
  else if (msg.type === 'char') { net.remoteChar = msg.id; renderOnlineUI(); }
  else if (msg.type === 'start') { setupOnlineRound(msg.lineup); net.phase = 'fight'; renderOnlineUI(); }
  else if (msg.type === 'input') { net.remoteInput = msg.i || NO_INTENT; }
  else if (msg.type === 'snap') { if (!net.isHost) applySnapshot(msg.s); }
  else if (msg.type === 'leave') { notify('Your friend left the game.'); teardownNet(); showTitle(); }
}
function onPeerLeft() {
  if (!net) return;
  if (net.active || net.connected) { teardownNet(); showTitle(); notify('Connection to your friend was lost.'); }
}
function maybeStart() {
  if (net.isHost && net.localReady && net.remoteReady) {
    if (state.online_matchWon >= 0) { state.teamRounds = [0, 0]; state.online_matchWon = -1; }
    net.lineup = makeOnlineLineup(); // built from each player's chosen fighter
    setupOnlineRound(net.lineup);
    net.phase = 'fight';
    send({ type: 'start', lineup: net.lineup });
    renderOnlineUI();
  }
}
function onlineReady() {
  if (!net || net.localReady) return;
  if (net.phase === 'lobby' && net.localChar == null) return; // must pick a fighter first
  net.localReady = true; send({ type: 'ready' }); maybeStart(); renderOnlineUI();
}
function onlinePickChar(i) {
  if (!net || net.localReady) return;     // locked once you're ready
  if (net.phase !== 'lobby' && net.phase !== 'rematch') return; // only between rounds, never mid-fight
  net.localChar = i; send({ type: 'char', id: i }); renderOnlineUI();
}
function onlineCharGridHTML() {
  let grid = '<div class="row" style="max-width:780px;gap:5px;">';
  for (let i = 0; i < CHARS.length; i++) {
    const c = CHARS[i], sel = (i === net.localChar);
    grid += '<button class="btn" style="font-size:12px;padding:6px 9px;' +
      (sel ? 'background:' + c.color + ';color:#111;border-color:#fff;' : 'border-color:' + c.color + ';') +
      '" onclick="onlinePickChar(' + i + ')">' + c.name + '</button>';
  }
  return grid + '</div>';
}
function onlineLeave() { send({ type: 'leave' }); teardownNet(); showTitle(); }
function teardownNet() {
  if (net) {
    try { if (net.conn) net.conn.close(); } catch (e) {}
    try { if (net.peer) net.peer.destroy(); } catch (e) {}
  }
  net = null;
}
function makeOnlineLineup() {
  const a = (net.localChar != null) ? net.localChar : 0;   // host's pick (team 0)
  const b = (net.remoteChar != null) ? net.remoteChar : 0; // guest's pick (team 1)
  return [ { charId: a, team: 0, controller: 'local',  x: 300, facing: 1 },
           { charId: b, team: 1, controller: 'remote', x: 600, facing: -1 } ];
}
function setupOnlineRound(lineup) {
  state.lineup = lineup;
  state.fighters = lineup.map(makeFighter);
  state.projectiles = []; state.shockwaves = []; state.traps = []; state.particles = []; state.floatTexts = [];
  state.countdown = 3.4; state.roundTime = ROUND_TIME; state.banner = ''; state.online_over = false;
  state.mode = 'fight';
  net.active = true; net.localReady = false; net.remoteReady = false;
  hideOverlays(); renderOnlineUI();
}
function updateOnline(dt) {
  if (net.isHost) updateOnlineHost(dt); else updateOnlineGuest(dt);
  clearJustPressed(); mouseClicked = false;
}
function updateOnlineHost(dt) {
  if (state.shake > 0) state.shake = Math.max(0, state.shake - dt * 30);
  if (net.phase !== 'fight' || state.online_over) return;
  if (state.countdown > 0) {
    state.countdown -= dt;
    for (const f of state.fighters) f.bobPhase += dt * 4;
  } else {
    state.roundTime -= dt;
    updateParticles(dt); updateFloatTexts(dt);
    for (const f of state.fighters) updateFighter(f, dt);
    resolveCombat();
    updateProjectiles(dt); updateShockwaves(dt); updateTraps(dt);
    const r = checkRoundOver(state.fighters);
    if (r !== -1 || state.roundTime <= 0) {
      const w = (r === -1) ? timeoutWinner() : r;
      if (w !== 'draw') state.teamRounds[w]++;
      const sc = state.teamRounds[0] + ' - ' + state.teamRounds[1];
      if (w !== 'draw' && state.teamRounds[w] >= ROUNDS_TO_WIN) {
        state.online_matchWon = w;
        state.banner = teamName(w).toUpperCase() + ' WINS THE MATCH!  (' + sc + ')';
      } else {
        state.online_matchWon = -1;
        state.banner = (w === 'draw' ? 'DRAW' : teamName(w).toUpperCase() + ' WINS THE ROUND') + '  (' + sc + ')';
      }
      state.online_over = true; net.phase = 'rematch'; net.localReady = false; net.remoteReady = false;
      renderOnlineUI();
    }
  }
  send({ type: 'snap', s: serializeSnapshot() });
}
function updateOnlineGuest(dt) {
  if (state.shake > 0) state.shake = Math.max(0, state.shake - dt * 30);
  if (net.phase === 'fight' && state.countdown <= 0 && !state.online_over) send({ type: 'input', i: humanIntent() });
  updateParticles(dt); updateFloatTexts(dt);
}
function serializeSnapshot() {
  return {
    phase: state.online_over ? 'over' : (state.countdown > 0 ? 'count' : 'fight'),
    countdown: state.countdown, roundTime: state.roundTime, banner: state.banner,
    teamRounds: state.teamRounds.slice(), matchWon: state.online_matchWon,
    fighters: state.fighters.map(f => ({ charId: f.charId, team: f.team, x: f.x, y: f.y, facing: f.facing,
      state: f.state, attackName: f.attackName, specialName: f.specialName, stateTimer: f.stateTimer,
      hp: f.hp, maxHp: f.maxHp, meter: f.meter, onGround: f.onGround, hitFlash: f.hitFlash, recoil: f.recoil,
      walkPhase: f.walkPhase, bobPhase: f.bobPhase, countering: f.countering, buffTimer: f.buffTimer, frozen: f.frozen,
      poisonTimer: f.poisonTimer, slowTimer: f.slowTimer, shieldTimer: f.shieldTimer, thornsTimer: f.thornsTimer })),
    projectiles: state.projectiles.map(p => ({ x: p.x, y: p.y, r: p.r, color: p.color, kind: p.kind, dir: p.dir })),
    shockwaves: state.shockwaves.map(s => ({ x: s.x, r: s.r, life: s.life, color: s.color })),
    traps: state.traps.map(t => ({ x: t.x, arm: t.arm, color: t.color })),
    floatTexts: state.floatTexts.map(t => ({ x: t.x, y: t.y, text: t.text, color: t.color, life: t.life, maxLife: t.maxLife })),
  };
}
function applySnapshot(s) {
  if (!s) return;
  state.countdown = s.countdown; state.roundTime = s.roundTime; state.banner = s.banner;
  state.online_over = (s.phase === 'over');
  if (s.teamRounds) state.teamRounds = s.teamRounds;
  if (s.matchWon !== undefined) state.online_matchWon = s.matchWon;
  if (state.fighters.length === s.fighters.length) {
    s.fighters.forEach((sf, i) => Object.assign(state.fighters[i], sf));
  } else {
    state.fighters = s.fighters.map(sf => { const f = makeFighter({ charId: sf.charId, team: sf.team, x: sf.x, facing: sf.facing }); Object.assign(f, sf); return f; });
  }
  state.projectiles = s.projectiles.map(p => ({ x: p.x, y: p.y, r: p.r, color: p.color, vx: 0, kind: p.kind, dir: p.dir }));
  state.shockwaves = s.shockwaves.map(w => ({ x: w.x, y: GROUND_Y, r: w.r, maxR: w.r, life: w.life, color: w.color }));
  state.traps = s.traps.map(t => ({ x: t.x, y: GROUND_Y, arm: t.arm, color: t.color, life: 1 }));
  state.floatTexts = s.floatTexts.map(t => ({ x: t.x, y: t.y, text: t.text, color: t.color, life: t.life, maxLife: t.maxLife }));
  state.mode = 'fight';
  if (s.phase === 'over' && net.phase === 'fight') { net.phase = 'rematch'; net.localReady = false; net.remoteReady = false; renderOnlineUI(); }
  if (s.phase !== 'over' && net.phase === 'rematch') { net.phase = 'fight'; renderOnlineUI(); }
}
function renderOnlineUI() {
  const el = document.getElementById('onlineScreen');
  if (!net || net.phase === 'fight' || net.phase === 'count') { el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  const leaveBtn = '<button class="btn" onclick="onlineLeave()">Leave</button>';
  const backBtn = '<button class="btn" onclick="showTitle()">Back</button>';
  let h = '';
  if (net.phase === 'menu') {
    h = '<h2>ONLINE 2-PLAYER</h2>' +
        '<button class="btn" onclick="quickMatch()">&#9889; Quick Match</button>' +
        '<p class="small">instantly pair with another player who is online</p>' +
        '<p>&mdash; or play with a friend by code &mdash;</p>' +
        '<button class="btn" onclick="onlineCreate()">Create Game</button>' +
        '<div class="row"><input id="joinCode" maxlength="4" placeholder="CODE" style="font-family:inherit;font-size:22px;text-transform:uppercase;width:130px;text-align:center;padding:8px;border-radius:8px;border:2px solid #55607f;background:#1a1f2e;color:#fff;">' +
        '<button class="btn" onclick="onlineJoin()">Join</button></div>' +
        (net.error ? '<p style="color:#f88">' + net.error + '</p>' : '') + backBtn;
  } else if (net.phase === 'searching') {
    h = '<h2>Searching for an opponent&hellip;</h2>' +
        '<p class="small">Pairing you with another player who is online right now.</p>' +
        '<button class="btn" onclick="onlineLeave()">Cancel</button>';
  } else if (net.phase === 'connecting') {
    h = '<h2>Connecting&hellip;</h2>' + leaveBtn;
  } else if (net.phase === 'waiting') {
    h = '<h2>Your code is</h2><h1 style="letter-spacing:10px;font-size:64px">' + net.code + '</h1>' +
        '<p>Tell your friend this code, then wait for them to join&hellip;</p>' + leaveBtn;
  } else if (net.phase === 'lobby') {
    const cnt = (net.localReady ? 1 : 0) + (net.remoteReady ? 1 : 0);
    const opp = net.remoteChar != null ? CHARS[net.remoteChar].name : '…';
    const ready = (net.localChar == null) ? '<p>Pick your fighter above.</p>'
      : (net.localReady ? '<p>Ready! Waiting for your friend&hellip; (' + cnt + '/2)</p>'
        : '<button class="btn" onclick="onlineReady()">Ready</button><p>' + cnt + '/2 ready</p>');
    h = '<h2>Choose your fighter</h2>' + onlineCharGridHTML() + '<p>Opponent picked: <b>' + opp + '</b></p>' + ready + leaveBtn;
  } else if (net.phase === 'rematch') {
    const cnt = (net.localReady ? 1 : 0) + (net.remoteReady ? 1 : 0);
    const opp = net.remoteChar != null ? CHARS[net.remoteChar].name : '…';
    const btn = net.localReady
      ? '<p>Waiting for your friend&hellip; (' + cnt + '/2 ready)</p>'
      : '<button class="btn" onclick="onlineReady()">Play Again</button><p>' + cnt + '/2 ready</p>';
    h = '<h2>' + (state.banner || '') + '</h2><p>Change fighter, or play again:</p>' + onlineCharGridHTML() +
        '<p>Opponent: <b>' + opp + '</b></p>' + btn + leaveBtn;
  } else if (net.phase === 'error') {
    h = '<h2>Connection problem</h2><p style="color:#f88">' + (net.error || '') + '</p>' +
        '<button class="btn" onclick="onlineOpen()">Try Again</button><button class="btn" onclick="showTitle()">Main Menu</button>';
  }
  el.innerHTML = h;
}

buildCharRow();
requestAnimationFrame(gameLoop);

}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stickman Jump</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  #wrap {
    position: relative;
    width: 1000px;
    height: 600px;
    border: 2px solid #444;
    box-shadow: 0 0 30px #222;
    background: #050810;
  }
  canvas { display: block; background: linear-gradient(180deg, #0a1428 0%, #1a2848 100%); }
  #hud {
    position: absolute;
    top: 10px; left: 10px;
    font-size: 18px;
    text-shadow: 2px 2px 0 #000;
    z-index: 5;
  }
  #hud span { color: #fc4; margin-right: 18px; }
  #hud b { color: #f55; }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(5, 10, 25, 0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 80px;
    color: #fff;
    text-shadow: 4px 4px 0 #f55, 8px 8px 0 #420;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }
  .overlay h2 {
    font-size: 22px;
    color: #fc4;
    margin-bottom: 30px;
  }
  .btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 18px 50px;
    margin: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 22px;
    font-weight: bold;
    transition: all 0.15s;
  }
  .btn:hover { background: #fc4; transform: scale(1.05); }
  .controls {
    margin-top: 24px;
    font-size: 13px;
    color: #aaa;
    text-align: center;
    line-height: 1.6;
  }
  .controls b { color: #fc4; }
  .death-msg { font-size: 48px; color: #f55; text-shadow: 0 0 12px #f00; margin-bottom: 20px; }
  .win-msg { font-size: 48px; color: #5f5; text-shadow: 0 0 12px #2f0; margin-bottom: 20px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="1000" height="600"></canvas>

  <div id="hud">
    <span>LIVES <b id="lives">3</b></span>
    <span>COINS <b id="coins">0</b></span>
    <span>LEVEL <b id="level">1</b>/5</span>
  </div>

  <div class="overlay" id="titleScreen">
    <h1>STICKMAN JUMP</h1>
    <h2>JUMP. DODGE. SURVIVE.</h2>
    <button class="btn" id="startBtn">START</button>
    <div class="controls">
      <b>A / D</b> or <b>← →</b> — Move<br>
      <b>W</b> or <b>SPACE</b> or <b>↑</b> — Jump (press again to double-jump)<br>
      <b>R</b> — Restart level<br>
      Stomp monsters from above &nbsp; • &nbsp; Avoid red spikes &nbsp; • &nbsp; Reach the flag
    </div>
  </div>

  <div class="overlay hidden" id="endScreen">
    <div id="endMsg" class="win-msg">VICTORY</div>
    <button class="btn" id="restartBtn">PLAY AGAIN</button>
  </div>
</div>

<script>
// ============================================================
// STICKMAN JUMP
// ============================================================
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const W = 1000, H = 600;
const CELL = 40;
const GRAV = 1500;
const JUMP_V = -540;
const WALK_SPEED = 230;
const ACCEL = 1800;
const FRICTION = 1500;
const MAX_FALL = 900;

// ============================================================
// LEVEL DATA  (each row = 40px tall; total 15 rows = 600px)
// chars: . empty  # solid  ^ spike  S slime  B bat  C coin  P player  G goal
// ============================================================
const LEVELS = [
  // Level 1 — gentle intro
  [
    "..................................................",
    "..................................................",
    "..................................................",
    "..................................................",
    "...........CCC....................................",
    "..........######..................................",
    "..................................................",
    ".....C................C..........C................",
    "....###..............####.......#####.........G...",
    "................................................###",
    "..................................................",
    ".....................S....................S......",
    "##########..####...########..#####....#############",
    ".........^......^^........^^......^^^.............",
    "P.................................................",
    "##########.#####.##########.#######.##############",
  ],
  // Level 2 — vertical, bats
  [
    "..................................................",
    "...............................................G..",
    "..............................................####",
    "...........................CCC..................##",
    "..........................######................##",
    "..................................................",
    ".......B...............B...........B..............",
    "...........C........................C.............",
    "..........####....................####............",
    "..................................................",
    "....C..............C.................C............",
    "...####...........####...............####.........",
    "..................................................",
    "........S.......S..............S......S...........",
    "P###################^^^###############^###########",
    "##################################################",
  ],
  // Level 3 — gap jumps
  [
    "..................................................",
    "..................................................",
    "..............C........C...........C.............G",
    ".............####.....####........####..........##",
    "..................................................",
    "..................................................",
    "....CC.............................CC..............",
    "...####............S..............####............",
    "...........B.....######.......B...................",
    "..............C..........C........................",
    "....S........####.......###..........S............",
    "..^####^...........................^####^.........",
    "..................................................",
    "..........^^^^...........^^^^^...........^^^^^....",
    "P.................................................",
    "########.##########.######.##########.############",
  ],
  // Level 4 — spike maze
  [
    "..................................................",
    ".................................................G",
    "..............................................####",
    "............................CCC...................",
    "...........................######.................",
    "..................................................",
    ".....C......B...........C........C................",
    "....####.............########...####..............",
    "..................................................",
    "..S.....S.........S...........S........S..S.......",
    "########.#####.######.######.######..##############",
    ".....^........^^......^^^.........^^..............",
    "...........C..............C............C..........",
    "..........####...........####.........####........",
    "P.....................^^^.........^^^.............",
    "###############^^^####################^^^#########",
  ],
  // Level 5 — boss gauntlet
  [
    "..................................................",
    "..................................................",
    ".............................................G....",
    "............................................####..",
    "...................................CCC............",
    "..................................######..........",
    "...........B...B....B...B...........B...B..........",
    "............C.......C.......C......................",
    "..........####....####....####.....................",
    ".....S...........................S..S..S..S.......",
    "..######.....C..............C.....################",
    "...........#####...........####...................",
    ".....^^^........^^^^.....^^^......................",
    ".................B.........B......................",
    "P............S.........S.......S................S.",
    "######^^####^^####^^####^^####^^####^^####^^######",
  ],
];

// ============================================================
// STATE
// ============================================================
let state = {
  level: 0,
  lives: 3,
  coins: 0,
  player: null,
  tiles: [],
  spikes: [],
  coinList: [],
  enemies: [],
  goal: null,
  camX: 0,
  particles: [],
  worldW: 0,
  worldH: 0,
  starting: false,
  finishing: false,
  flashTime: 0,
  flashMsg: '',
  gameOver: false,
  mode: 'title',  // 'title' | 'playing' | 'end'
};

// ============================================================
// INPUT
// ============================================================
const keys = {};
document.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (state.mode === 'playing' && e.code === 'KeyR') {
    loadLevel(state.level);
  }
  // jump buffer on key press
  if ((e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') && state.player) {
    state.player.jumpBuffer = 0.12;
    e.preventDefault();
  }
});
document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
  if ((e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') && state.player) {
    // shorten jump if released early
    if (state.player.vy < -180) state.player.vy = -180;
  }
});

document.getElementById('startBtn').addEventListener('click', () => startGame());
document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('titleScreen').classList.remove('hidden');
  state.mode = 'title';
});

// ============================================================
// LEVEL LOADING
// ============================================================
function loadLevel(idx) {
  const level = LEVELS[idx];
  state.tiles = [];
  state.spikes = [];
  state.coinList = [];
  state.enemies = [];
  state.particles = [];
  state.goal = null;
  state.worldW = level[0].length * CELL;
  state.worldH = level.length * CELL;

  for (let y = 0; y < level.length; y++) {
    const row = level[y];
    for (let x = 0; x < row.length; x++) {
      const c = row[x];
      const px = x * CELL;
      const py = y * CELL;
      if (c === '#') {
        state.tiles.push({ x: px, y: py, w: CELL, h: CELL });
      } else if (c === '^') {
        state.spikes.push({ x: px, y: py, w: CELL, h: CELL });
      } else if (c === 'C') {
        state.coinList.push({ x: px + CELL/2, y: py + CELL/2, r: 9, taken: false, phase: Math.random() * Math.PI * 2 });
      } else if (c === 'S') {
        state.enemies.push({
          type: 'slime', x: px + CELL/2, y: py + CELL - 14, vx: 60, vy: 0,
          w: 30, h: 22, alive: true, dir: 1, sx: px + CELL/2, range: 80,
        });
      } else if (c === 'B') {
        state.enemies.push({
          type: 'bat', x: px + CELL/2, y: py + CELL/2, vx: 0, vy: 0,
          w: 28, h: 18, alive: true, sx: px + CELL/2, sy: py + CELL/2,
          phase: Math.random() * Math.PI * 2,
        });
      } else if (c === 'P') {
        state.player = {
          x: px + CELL/2, y: py + CELL - 18, vx: 0, vy: 0,
          w: 18, h: 36, facing: 1,
          onGround: false, canDouble: true,
          jumpBuffer: 0, coyote: 0,
          dead: false, deadTimer: 0,
          spawnX: px + CELL/2, spawnY: py + CELL - 18,
        };
      } else if (c === 'G') {
        state.goal = { x: px + CELL/2, y: py + CELL - 16, phase: 0 };
      }
    }
  }
  state.camX = 0;
  state.level = idx;
  document.getElementById('level').textContent = idx + 1;
}

// ============================================================
// PHYSICS HELPERS
// ============================================================
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function playerRect() {
  const p = state.player;
  return { x: p.x - p.w/2, y: p.y - p.h, w: p.w, h: p.h };
}

function solveCollisions(entity, prevX, prevY) {
  // Resolve against tiles using axis separation
  let er = { x: entity.x - entity.w/2, y: entity.y - entity.h, w: entity.w, h: entity.h };
  let landedOn = false;
  // X axis
  er = { x: entity.x - entity.w/2, y: prevY - entity.h, w: entity.w, h: entity.h };
  for (const t of state.tiles) {
    if (rectsOverlap(er, t)) {
      if (entity.vx > 0) entity.x = t.x - entity.w/2;
      else if (entity.vx < 0) entity.x = t.x + t.w + entity.w/2;
      entity.vx = 0;
      er.x = entity.x - entity.w/2;
    }
  }
  // Y axis
  er = { x: entity.x - entity.w/2, y: entity.y - entity.h, w: entity.w, h: entity.h };
  for (const t of state.tiles) {
    if (rectsOverlap(er, t)) {
      if (entity.vy > 0) {
        entity.y = t.y;
        entity.vy = 0;
        landedOn = true;
      } else if (entity.vy < 0) {
        entity.y = t.y + t.h + entity.h;
        entity.vy = 0;
      }
      er.y = entity.y - entity.h;
    }
  }
  return landedOn;
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  if (state.mode !== 'playing') return;
  const p = state.player;
  if (!p) return;

  if (p.dead) {
    p.deadTimer -= dt;
    if (p.deadTimer <= 0) {
      state.lives--;
      document.getElementById('lives').textContent = state.lives;
      if (state.lives <= 0) {
        gameOver(false);
        return;
      }
      loadLevel(state.level);
    }
    // particles falling
    for (const pt of state.particles) {
      pt.vy += GRAV * dt * 0.5;
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      pt.life -= dt;
    }
    state.particles = state.particles.filter(pt => pt.life > 0);
    return;
  }

  // Input
  const left = keys['KeyA'] || keys['ArrowLeft'];
  const right = keys['KeyD'] || keys['ArrowRight'];

  if (left && !right) {
    p.vx -= ACCEL * dt;
    p.facing = -1;
  } else if (right && !left) {
    p.vx += ACCEL * dt;
    p.facing = 1;
  } else {
    // friction
    if (p.vx > 0) p.vx = Math.max(0, p.vx - FRICTION * dt);
    else if (p.vx < 0) p.vx = Math.min(0, p.vx + FRICTION * dt);
  }
  p.vx = Math.max(-WALK_SPEED, Math.min(WALK_SPEED, p.vx));

  // Jump (buffered + coyote)
  p.jumpBuffer -= dt;
  p.coyote -= dt;
  if (p.jumpBuffer > 0) {
    if (p.onGround || p.coyote > 0) {
      p.vy = JUMP_V;
      p.jumpBuffer = 0;
      p.coyote = 0;
      p.onGround = false;
      p.canDouble = true;
      spawnDust(p.x, p.y, 5);
    } else if (p.canDouble) {
      p.vy = JUMP_V * 0.9;
      p.canDouble = false;
      p.jumpBuffer = 0;
      spawnDust(p.x, p.y - 10, 8);
    }
  }

  // Gravity
  p.vy += GRAV * dt;
  if (p.vy > MAX_FALL) p.vy = MAX_FALL;

  // Movement
  const prevX = p.x, prevY = p.y;
  p.x += p.vx * dt;
  p.y += p.vy * dt;

  const wasGround = p.onGround;
  p.onGround = solveCollisions(p, prevX, prevY);
  if (wasGround && !p.onGround && p.vy >= 0) p.coyote = 0.1;

  // Out of bounds → death
  if (p.y > state.worldH + 100 || p.x < -50 || p.x > state.worldW + 50) {
    killPlayer();
    return;
  }

  // Spike collision
  const pr = playerRect();
  for (const s of state.spikes) {
    // tighter hitbox for spikes
    const sb = { x: s.x + 4, y: s.y + 14, w: s.w - 8, h: s.h - 14 };
    if (rectsOverlap(pr, sb)) { killPlayer(); return; }
  }

  // Coin collection
  for (const c of state.coinList) {
    if (c.taken) continue;
    const dx = p.x - c.x;
    const dy = (p.y - p.h/2) - c.y;
    if (dx*dx + dy*dy < (c.r + 16) * (c.r + 16)) {
      c.taken = true;
      state.coins++;
      document.getElementById('coins').textContent = state.coins;
      spawnSparkles(c.x, c.y, '#fc4');
    }
    c.phase += dt * 4;
  }

  // Enemies
  for (const e of state.enemies) {
    if (!e.alive) continue;
    if (e.type === 'slime') {
      e.vy += GRAV * dt;
      if (e.vy > MAX_FALL) e.vy = MAX_FALL;
      e.x += e.vx * dt;
      e.y += e.vy * dt;
      const grounded = solveCollisions(e, e.x - e.vx * dt, e.y - e.vy * dt);
      if (!grounded) e.vy = e.vy;
      // patrol bounds
      if (e.x < e.sx - e.range) { e.x = e.sx - e.range; e.vx = Math.abs(e.vx); e.dir = 1; }
      if (e.x > e.sx + e.range) { e.x = e.sx + e.range; e.vx = -Math.abs(e.vx); e.dir = -1; }
    } else if (e.type === 'bat') {
      e.phase += dt * 2.5;
      e.x = e.sx + Math.cos(e.phase) * 60;
      e.y = e.sy + Math.sin(e.phase * 1.5) * 20;
    }
    // collision with player
    const er = { x: e.x - e.w/2, y: e.y - e.h, w: e.w, h: e.h };
    if (rectsOverlap(pr, er)) {
      const playerBottom = p.y;
      const enemyTop = e.y - e.h;
      if (p.vy > 50 && playerBottom < enemyTop + 14) {
        // stomp!
        e.alive = false;
        p.vy = -380;
        p.canDouble = true;
        state.coins += 2;
        document.getElementById('coins').textContent = state.coins;
        spawnSparkles(e.x, e.y - e.h/2, e.type === 'slime' ? '#5f5' : '#a4a');
      } else {
        killPlayer();
        return;
      }
    }
  }

  // Goal
  if (state.goal) {
    const g = state.goal;
    g.phase += dt * 3;
    const gr = { x: g.x - 14, y: g.y - 28, w: 28, h: 40 };
    if (rectsOverlap(pr, gr)) {
      if (state.level + 1 >= LEVELS.length) {
        gameOver(true);
      } else {
        flashMsg('LEVEL ' + (state.level + 1) + ' COMPLETE!');
        loadLevel(state.level + 1);
      }
      return;
    }
  }

  // Camera follows player
  const targetCam = Math.max(0, Math.min(state.worldW - W, p.x - W / 2));
  state.camX += (targetCam - state.camX) * Math.min(1, dt * 6);

  // Particles
  for (const pt of state.particles) {
    pt.vy += GRAV * dt * 0.3;
    pt.x += pt.vx * dt;
    pt.y += pt.vy * dt;
    pt.life -= dt;
  }
  state.particles = state.particles.filter(pt => pt.life > 0);

  if (state.flashTime > 0) state.flashTime -= dt;
}

function killPlayer() {
  const p = state.player;
  if (p.dead) return;
  p.dead = true;
  p.deadTimer = 1.2;
  // explosion particles
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 120 + Math.random() * 180;
    state.particles.push({
      x: p.x, y: p.y - p.h/2,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 100,
      life: 0.8 + Math.random() * 0.4, maxLife: 1.2,
      color: '#fff', size: 2 + Math.random() * 2,
    });
  }
}

function spawnDust(x, y, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI - Math.PI;
    const sp = 40 + Math.random() * 60;
    state.particles.push({
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 20,
      life: 0.3 + Math.random() * 0.2, maxLife: 0.5,
      color: '#aaa', size: 2 + Math.random() * 1.5,
    });
  }
}

function spawnSparkles(x, y, color) {
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 80 + Math.random() * 120;
    state.particles.push({
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0.4 + Math.random() * 0.3, maxLife: 0.7,
      color, size: 2 + Math.random() * 2,
    });
  }
}

function flashMsg(msg) {
  state.flashMsg = msg;
  state.flashTime = 1.5;
}

// ============================================================
// DRAW
// ============================================================
function draw() {
  ctx.clearRect(0, 0, W, H);
  if (state.mode !== 'playing') return;

  const cam = Math.floor(state.camX);

  // parallax stars
  drawStars(cam);

  // tiles
  for (const t of state.tiles) {
    const sx = t.x - cam;
    if (sx + t.w < 0 || sx > W) continue;
    ctx.fillStyle = '#2a3458';
    ctx.fillRect(sx, t.y, t.w, t.h);
    ctx.fillStyle = '#3f4a7a';
    ctx.fillRect(sx, t.y, t.w, 4);
    ctx.strokeStyle = '#1a2040';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx + 0.5, t.y + 0.5, t.w - 1, t.h - 1);
  }

  // spikes
  for (const s of state.spikes) {
    const sx = s.x - cam;
    if (sx + s.w < 0 || sx > W) continue;
    ctx.fillStyle = '#d33';
    ctx.strokeStyle = '#600';
    ctx.lineWidth = 1.5;
    const baseY = s.y + s.h;
    const tipY = s.y + 8;
    const spikes = 3;
    for (let i = 0; i < spikes; i++) {
      const x0 = sx + (i / spikes) * s.w;
      const x1 = sx + ((i + 1) / spikes) * s.w;
      const xmid = (x0 + x1) / 2;
      ctx.beginPath();
      ctx.moveTo(x0, baseY);
      ctx.lineTo(xmid, tipY);
      ctx.lineTo(x1, baseY);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }
  }

  // coins
  for (const c of state.coinList) {
    if (c.taken) continue;
    const sx = c.x - cam;
    if (sx + 20 < 0 || sx - 20 > W) continue;
    const wob = Math.cos(c.phase);
    ctx.fillStyle = '#fc4';
    ctx.strokeStyle = '#fa0';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(sx, c.y, Math.abs(wob) * 8 + 1, 9, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    if (Math.abs(wob) > 0.5) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(sx - 1, c.y - 4, 2, 8);
    }
  }

  // enemies
  for (const e of state.enemies) {
    if (!e.alive) continue;
    const sx = e.x - cam;
    if (sx + 30 < 0 || sx - 30 > W) continue;
    if (e.type === 'slime') drawSlime(sx, e.y);
    else if (e.type === 'bat') drawBat(sx, e.y, e.phase);
  }

  // goal flag
  if (state.goal) {
    const g = state.goal;
    const sx = g.x - cam;
    // pole
    ctx.fillStyle = '#aaa';
    ctx.fillRect(sx - 2, g.y - 40, 4, 40);
    // flag
    ctx.fillStyle = '#5f5';
    ctx.beginPath();
    ctx.moveTo(sx + 2, g.y - 40);
    ctx.lineTo(sx + 24 + Math.cos(g.phase) * 3, g.y - 30 + Math.sin(g.phase) * 2);
    ctx.lineTo(sx + 2, g.y - 20);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#020';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // player
  const p = state.player;
  if (p && !p.dead) {
    drawStickman(p.x - cam, p.y, p);
  }

  // particles
  for (const pt of state.particles) {
    ctx.globalAlpha = Math.max(0, pt.life / pt.maxLife);
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    ctx.arc(pt.x - cam, pt.y, pt.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // flash message
  if (state.flashTime > 0) {
    ctx.fillStyle = `rgba(252, 196, 64, ${Math.min(1, state.flashTime)})`;
    ctx.font = 'bold 36px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(state.flashMsg, W / 2, 120);
  }
}

function drawStars(cam) {
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 80; i++) {
    const x = ((i * 137) % state.worldW) - cam * 0.3;
    const y = (i * 53) % H;
    const xx = ((x % W) + W) % W;
    ctx.globalAlpha = 0.3 + 0.4 * Math.abs(Math.sin(i + performance.now() * 0.001));
    ctx.fillRect(xx, y, 1.5, 1.5);
  }
  ctx.globalAlpha = 1;
}

function drawStickman(x, y, p) {
  const lineColor = '#fff';
  ctx.strokeStyle = lineColor;
  ctx.fillStyle = lineColor;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';

  const headR = 7;
  const headY = y - 28;
  const bodyTop = headY + headR;
  const bodyBot = y - 12;
  const isJump = !p.onGround;
  const isWalk = Math.abs(p.vx) > 30 && p.onGround;
  const t = performance.now() / 90;
  const wave = isWalk ? Math.sin(t) : 0;

  // head
  ctx.beginPath();
  ctx.arc(x, headY, headR, 0, Math.PI * 2);
  ctx.stroke();
  // eye
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x + p.facing * 2, headY, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // body
  ctx.beginPath();
  ctx.moveTo(x, bodyTop);
  ctx.lineTo(x, bodyBot);
  ctx.stroke();

  // arms
  ctx.beginPath();
  if (isJump) {
    const up = p.vy < 0 ? 1 : 0.4;
    ctx.moveTo(x, bodyTop + 4);
    ctx.lineTo(x - 8, bodyTop - 6 * up);
    ctx.moveTo(x, bodyTop + 4);
    ctx.lineTo(x + 8, bodyTop - 6 * up);
  } else if (isWalk) {
    ctx.moveTo(x, bodyTop + 4);
    ctx.lineTo(x - 7, bodyTop + 12 + wave * 4);
    ctx.moveTo(x, bodyTop + 4);
    ctx.lineTo(x + 7, bodyTop + 12 - wave * 4);
  } else {
    ctx.moveTo(x, bodyTop + 4);
    ctx.lineTo(x - 7, bodyTop + 14);
    ctx.moveTo(x, bodyTop + 4);
    ctx.lineTo(x + 7, bodyTop + 14);
  }
  ctx.stroke();

  // legs
  ctx.beginPath();
  if (isJump) {
    ctx.moveTo(x, bodyBot);
    ctx.lineTo(x - 5, y - 2);
    ctx.moveTo(x, bodyBot);
    ctx.lineTo(x + 5, y - 2);
  } else if (isWalk) {
    ctx.moveTo(x, bodyBot);
    ctx.lineTo(x - 6 + wave * 4, y);
    ctx.moveTo(x, bodyBot);
    ctx.lineTo(x + 6 - wave * 4, y);
  } else {
    ctx.moveTo(x, bodyBot);
    ctx.lineTo(x - 5, y);
    ctx.moveTo(x, bodyBot);
    ctx.lineTo(x + 5, y);
  }
  ctx.stroke();
}

function drawSlime(x, y) {
  const t = performance.now() / 200;
  const wob = Math.sin(t) * 2;
  ctx.fillStyle = '#5d5';
  ctx.strokeStyle = '#080';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(x, y - 8 - wob/2, 14, 10 + wob, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x - 4, y - 10, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 4, y - 10, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(x - 4, y - 10, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 4, y - 10, 1, 0, Math.PI * 2); ctx.fill();
}

function drawBat(x, y, phase) {
  const flap = Math.sin(phase * 4);
  ctx.fillStyle = '#622a8a';
  ctx.strokeStyle = '#200';
  ctx.lineWidth = 1.5;
  // body
  ctx.beginPath();
  ctx.ellipse(x, y, 5, 7, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // wings
  const wingY = y - 2;
  const wingH = 8 + flap * 4;
  ctx.beginPath();
  ctx.moveTo(x - 4, wingY);
  ctx.lineTo(x - 16, wingY - wingH);
  ctx.lineTo(x - 12, wingY + 2);
  ctx.lineTo(x - 4, wingY + 3);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 4, wingY);
  ctx.lineTo(x + 16, wingY - wingH);
  ctx.lineTo(x + 12, wingY + 2);
  ctx.lineTo(x + 4, wingY + 3);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // eyes
  ctx.fillStyle = '#f55';
  ctx.beginPath(); ctx.arc(x - 2, y - 2, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 2, y - 2, 1, 0, Math.PI * 2); ctx.fill();
}

// ============================================================
// FLOW
// ============================================================
function startGame() {
  state.lives = 3;
  state.coins = 0;
  state.mode = 'playing';
  document.getElementById('lives').textContent = state.lives;
  document.getElementById('coins').textContent = state.coins;
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  loadLevel(0);
}

function gameOver(won) {
  state.mode = 'end';
  const screen = document.getElementById('endScreen');
  const msg = document.getElementById('endMsg');
  if (won) {
    msg.className = 'win-msg';
    msg.textContent = 'YOU WIN! Coins: ' + state.coins;
  } else {
    msg.className = 'death-msg';
    msg.textContent = 'GAME OVER';
  }
  screen.classList.remove('hidden');
}

// ============================================================
// LOOP
// ============================================================
let lastT = 0;
function loop(t) {
  const dt = Math.min(0.033, (t - lastT) / 1000 || 0);
  lastT = t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
